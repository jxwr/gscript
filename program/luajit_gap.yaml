# program/luajit_gap.yaml — per-benchmark gap trajectory, append-only.
#
# Written by Step 6 (Verify) of every round that re-runs a benchmark.
# Complements program/ledger.yaml (which is hypothesis-class-organized).
# Grep by benchmark to see that benchmark's progress across rounds.
#
# Schema: list of rows with these fields:
#   round             — integer round number (0 = frozen reference)
#   date              — YYYY-MM-DD (round date)
#   bench             — benchmark name (matches benchmarks/suite/<bench>.gs)
#   gscript_jit_sec   — median-of-N (5 for publish, 3 for mid-round)
#   luajit_sec        — LuaJIT time (null if unavailable)
#   gap_factor        — gscript_jit_sec / luajit_sec (null if LuaJIT N/A)
#   notes             — optional short comment
#
# Directional guidance: the gap_factor is the primary steering signal.
# "Which benchmark has the widest gap?" → `awk` / sort by gap_factor.
# "Has bench X been stuck for N rounds?" → filter by bench name, check
# trajectory.

