# program/targets.yaml — per-benchmark wall-time goals (Wave 2).
#
# Read by Step 3 (Direction) when selecting a target benchmark. Per-
# benchmark budgets bound how much wall-time a single round may spend
# on compile + bench + iterate. Target gaps are the LuaJIT delta (where
# LuaJIT numbers exist in reference.json); rounds that close a gap
# update `best_so_far`.
#
# This file is append-and-edit (unlike round cards, which are append-
# only). Budgets may be renegotiated as the project learns.

version: 1
updated: 2026-04-17
schema_notes: >
  - current_wall_sec is set from `benchmarks/data/latest.json` at
    targets.yaml touch time; not auto-refreshed.
  - luajit_wall_sec is NULL for benchmarks where LuaJIT doesn't run
    the workload (GScript-only semantics).
  - round_budget_hours is the 3-hour hard rule by default; shorter
    budgets apply to rounds explicitly marked diagnostic or kb.

benchmarks:

  object_creation:
    status: active
    current_wall_sec: 0.990        # after R9
    reference_wall_sec: 0.764
    luajit_wall_sec: null
    gap_to_reference_pct: 29.6     # (current - ref) / ref
    next_hypothesis_classes: [runtime-allocation-path, escape-analysis-scalar-replacement]
    round_budget_hours: 3

