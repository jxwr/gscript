# --- new forward classes surfaced by Wave 2 ---

forward_classes_addenda:
  - name: tier2-inline-cache
    description: >
      Per-PC cached monomorphic dispatch for GetField / SetField /
      GetTable / SetTable sites — LuaJIT-style inline caches. R3's
      diagnostic showed emit-layer optimization cannot close the sieve
      8.8× gap; IC-style dispatch is the structural answer.
    status: proposed
    proposed_round: R11+
    expected_targets: [sieve, method_dispatch, matmul]
    known_risks:
      - Cache invalidation on shape change; must compose with R5's Tier 0 gate
      - Guard code size balloon risk — must keep Tier 2 emit < threshold
    prerequisite_mitigation: >
      Requires an ADR (architecture round). R11 or later should be
      architecture-type + KB update, not immediate tactical.

round_policy:
  tactical_default_budget_hours: 3
  diagnostic_default_budget_hours: 1
  meta_default_budget_hours: 2
  # Budget violation → round auto-revert (hard rule #18).
