# program/ledger.yaml — hypothesis-class register, aggregated across all rounds.
#
# Written by Step 7 (Close) of every round. Read by Step 0 (Recap) and Step 3
# (Direction) of every round. This is the cross-round memory that v4 lacked.
#
# Each entry aggregates one hypothesis class. A class is a family of hypotheses
# with a shared mechanism — not a specific change. R1 and R2 were different
# changes, same class.
#
# prior_reject_rate = reverts / attempts  (NOT reverts / (reverts + wins),
# because hold/diagnostic/kb outcomes are neither wins nor reverts).
#
# When a round's Step 3 lookup finds prior_reject_rate > 0.5 AND attempts >= 3,
# the round card's class_gate.mitigation_required is forced to true. Without
# an explicit mitigation_description, the round type flips to `strategy`.
#
# ============================================================================
# Taxonomy note (R49, 2026-04-18):
#
# Rounds <= R48 use legacy outcome taxonomy: {win | revert | hold |
# null-result}. The `wins` counter below may mix bench-moving wins
# with ADR-wins — inflated for architecture/meta/strategy/kb classes.
#
# Rounds >= R49 use post-R49 taxonomy (rule 24): {bench-win | adr-win |
# revert | no-win} plus orthogonal shipped_code bool. For post-R49
# rounds, the counters below split into bench_wins and adr_wins.
#
# The class-gate formula (rule 21) under the new taxonomy is:
#   prior_reject_rate = reverts / (bench_wins + reverts + shipped_no_wins)
# ADR-wins and no-code halts do NOT dilute the denominator.
# ============================================================================

