  - name: tier2-typed-array-ic
    description: >
      Per-site ArrayKind cache for Tier 2 GetTable / SetTable emits.
      When a site always hits ArrayInt (or ArrayFloat, etc.), emit a
      shape-guarded inline load of t.intArray[key] and skip the
      arrayKind switch.
    status: proposed
    proposed_round: null            # depends on tier2-inline-cache ADR first
    proposed_in: R11 diagnostic
    expected_targets: [sort, matmul, spectral_norm]
    known_risks:
      - Composes with R5's Tier 0 gate? GetTable sites in Tier 0 paths unaffected.
      - Deopt when arrayKind changes mid-run (demoteToMixed path). Must invalidate.

  # tier2-inline-cache: promoted to classes{} in R13 after ADR accepted.

  - name: tier2-intbinmod-correctness
    description: >
      Latent correctness bug in Tier 2 emit for intBinMod. R12
      attempted to fix the "unresolved label" side effect; R15
      showed a deeper bug: under the R12-enabled emit, collatz-style
      int-int mod hot loops produce incorrect results (infinite
      loop in math_intensive). Root cause is unknown; the symptom is
      masked by keeping the original early-return in emitFloatBinOp.
    status: proposed
    proposed_round: null      # next correctness-priority round
    proposed_in: R15 revert autopsy
    expected_targets: [math_intensive, gcd-style functions]
    known_risks:
      - Re-fixing naively re-enables the hang. Any new fix must pass
        the math_intensive production-scale regression.

  - name: escape-analysis-scalar-replacement
    description: >
      Detect NEWTABLE whose result does not escape and replace it with
      scalar registers. Follows `runtime-allocation-path` (doesn't
      replace it): SR applies where objects DON'T escape, bump alloc
      applies regardless.
    status: deferred
    proposed_round: null     # wait until after R8
    expected_targets: [method_dispatch, object_creation partial]
    known_risks:
      - binary_trees escapes (tree nodes stored into parent) — SR useless there
      - Unsound EA → silent corruption; must compose with validator

  - name: cross-call-shape-specialization
    description: >
      Propagate shape feedback from caller into inlined callee so
      per-access shape guards become unconditional loads.
    status: deferred
    proposed_round: null
    expected_targets: [method_dispatch, matmul, sieve]
    known_risks:
      - Small predicted gain (TypeSpec already handles most inlined cases)
