  - name: tier2-recursion-closure
    description: >
      Tier 2 optimizations for call-heavy / recursive hot paths:
      self-call specialization, typed calling convention, recursion
      inlining, tail-call optimization. Target: fib, ackermann,
      mutual_recursion. See adr-tier2-recursion-closure.md.
    attempts: 2
    wins: 1                      # R20 ADR
    reverts: 1                   # R22: bounds-check skip broke deep recursion
    holds: 0
    prior_reject_rate: 0.5       # attempts < 3; rule 21 not yet triggered
    mitigation_required: false
    mitigation_description: >
      **Bounds check is not redundant for self-calls** (R22 lesson):
      the Tier 2 bounds check tests `mRegRegs + calleeBaseOff +
      calleeMaxStack*8 <= RegsEnd`, not MaxStack parity. Deep self-
      recursion advances mRegRegs each level; skipping the check
      causes register-file overflow → SIGSEGV. Any future step-3.1
      self-call specialization must preserve the bounds check OR
      replace it with a per-level depth limit that's checked once
      per recursion chain.
    historical_rounds: [20, 22]
    key_negative_evidence: >
      R22 attempted to skip the bounds check on self-calls and
      regressed sort (quicksort crashed with SIGSEGV at recursion
      depth ~16). The "savings" (5 insns per call) were already
      noise-level on fib; the correctness cost was total.
    key_positive_evidence: >
      ADR projects fib 59× → 21× if R22-R25 land their combined
      strategy. R22's revert leaves the ADR valid but the first
      implementation step needs a different approach.

  - name: tier2-tight-loop
    description: >
      Tier 2 type-propagation + raw-FPR residency for numeric tight
      loops. Targets sieve/nbody/spectral_norm/matmul/fannkuch.
      Fix the typespec gap where typed-array loads (ArrayFloat/
      ArrayInt) return `any` instead of float/int to downstream arith.
      See adr-tier2-tight-loop.md.
    attempts: 3
    wins: 1                    # R21 ADR
    reverts: 0
    holds: 2                   # R23 (held), R24 (diagnostic)
    prior_reject_rate: 0.0
    mitigation_required: false
    mitigation_description: >
      **R21 ADR's typespec-gap premise is DISPROVEN by R24 data.**
      In production, matmul/nbody hot-loop GetTable/GetField sites
      ALREADY have Res=FBFloat populated; the existing
      feedbackToIRType path ALREADY inserts OpGuardType TypeFloat;
      typespec ALREADY rewrites Mul→MulFloat; emit ALREADY uses the
      raw-FPR fast path. The 5-8× LuaJIT gaps remain because the
      bottleneck is ELSEWHERE:
        (a) nested-table memory indirection (matmul's table-of-tables)
        (b) per-iteration row-table pointer refresh
        (c) arrayKind 4-way dispatch inside emit_table_array
        (d) cache-unfriendly column walks

      R25+ tactical work in this class should target (a)-(d), not
      typespec. The R21 ADR's projection (matmul 5.5× → 3.3×) is
      invalidated; a replacement ADR is needed.

      **R23 regression finding**: R23's spot-check showed 8-12%
      regression. Per R24 data, the regression was NOISE because
      R23's extra branch would have fired on ZERO matmul sites.
    historical_rounds: [21, 23, 24]
    key_negative_evidence: >
      R23: blanket Kind-based guard insertion regressed matmul
      spot-check — turns out that was noise. R24 confirms all
      target benchmarks already have Res-Float feedback, so the
      existing pipeline catches them. R21 ADR's 40% projection
      was based on the wrong bottleneck.
    key_positive_evidence: >
      R24 diagnostic found that existing typespec infrastructure is
      MORE EFFECTIVE in production than the ADR assumed. Disarming
      a misallocated round of tactical work.

