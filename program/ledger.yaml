  - name: runtime-allocation-path
    description: >
      Replace Go-heap NEWTABLE allocation with bump allocation on a
      preallocated slab of *Table pointers. Arrays are already arena-
      backed (mmap, bypasses GC); this class targets the residual
      Go mallocgc cost of the `&Table{}` struct itself.
    attempts: 3
    wins: 2
    reverts: 0
    holds: 1
    prior_reject_rate: 0.0
    mitigation_required: false
    mitigation_description: >
      **Pre-flight metric framing** (from R8, validated in R9+R14): pre-
      flight acceptance must include an ABSOLUTE wall-time clause, not a
      lone per-alloc ratio. R9 and R14 both used dual-clause.

      **Positive compose pattern** (from R9): runtime-level primitives
      (allocator swaps, constructor changes) compose across all tiers
      automatically.

      **Multi-round exhaustion** (from R14): after the biggest single
      cost (R9's Table struct) is eliminated, remaining wins in this
      class are smaller (R14's skeys ≈ 3-10% predicted vs R9's 5-15%).
      Expect diminishing returns; budget future rounds accordingly.
    historical_rounds: [8, 9, 14]
    key_negative_evidence: null
    key_positive_evidence: >
      R9: bump-slab for *Table eliminated 1 alloc/op per NEWTABLE.
      Median-of-5: object_creation -6.3%, binary_trees -11.7%,
      table_field_access -11.9%, method_dispatch -3.1%.
      R14: skeys slab eliminated 2nd mallocgc per NEWTABLE for
      hashHint>0 tables. Microbench: make→slab 2.50× per-op.
      Median-of-5: object_creation -4.4%, binary_trees -6.3% (compounded
      from R9), method_dispatch -8.5%, fibonacci_iterative -3.8%.
      No regressions.

