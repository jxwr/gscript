  - name: tier2-bounded-recursive-inline
    description: >
      Bounded recursive inlining with depth budget K (initial K=2,
      aspirational K=3). Attacks fib/ackermann call overhead by
      reducing call count via compile-time unrolling. Current inline
      pass explicitly excludes recursive callees; this class lifts
      that restriction under size + depth bounds. See adr-tier2-bounded-
      recursive-inline.md.
    attempts: 3
    wins: 1                      # R31 ADR
    reverts: 1                   # R35: Tier 2 promotion of small self-recursive caused broad regressions
    holds: 1                     # R34 partial-step
    prior_reject_rate: 0.33      # 1/3 — below threshold
    mitigation_required: false
    mitigation_description: >
      **Loosening promotion gate is DANGEROUS** (R35 revert):
      promoting small self-recursive functions to Tier 2 gave
      -14% on fib (target) but +47% on mutual_recursion, +20%
      on fib_recursive, +13% on binary_trees. Net: heavily
      negative across the suite. Any future attempt in this
      class MUST bench the full suite AS PART OF pre-flight
      (not just the target benchmark). Add fib_recursive +
      mutual_recursion + binary_trees to production-scale
      regression harness.
    historical_rounds: [31, 34, 35]
    key_negative_evidence: >
      R34: relaxed findInlineableGetGlobal; fib IR + bench unchanged.
      Root cause: fib stays at Tier 1 because shouldPromoteTier2
      returns false for call-heavy-no-loop functions. Inline pass
      never runs on fib.
    key_positive_evidence: >
      The R34 relaxation is semantically correct (aligns with the
      inline pass's MaxRecursion=2 bound). Unblocks future rounds
      without changing current behavior.

  - name: tier2-dense-matrix-kind
    description: >
      DenseMatrix: table-of-tables where all rows share ONE flat
      []float64 backing. Phase 1 (R42) implemented as a JIT-compatible
      factory via matrix.dense(r, c) — outer is ArrayMixed, rows are
      ArrayFloat sub-slices. Phase 2+ (future) can add JIT-level fast
      path for single-load t[i][j] direct into flat backing.
    attempts: 10
    wins: 7                      # R30 ADR + R42 + R43 + R44 + R45 + R50 ADR + R51 bench-win
    bench_wins: 5                # R42 R43 R44 R45 R51 (post-R49 taxonomy)
    adr_wins: 2                  # R30 R50 (post-R49 taxonomy)
    reverts: 0
    holds: 2                     # R46 RowPtr wiring reverted; R47 FMA Phi-accumulator skip
    null_results: 1              # R48 sum-splitting pre-flight disproven
    prior_reject_rate: 0.0
    mitigation_required: false
    mitigation_description: >
      **ARM64 pipeline effects dominate insn-count savings on tight
      inner loops** (R46 + R47 + R48 lessons). Three concrete gotchas:
        (a) Strength reduction via explicit LSL/MOV can regress when
            LDRreg's built-in address-scale already folds MUL+ADD
            (R46: 0.035→0.037s).
        (b) FMA fusion on loop-carried Phi accumulators serializes
            the dependency chain; separated FMUL+FADD lets FMUL
            execute speculatively (R47: 0.035→0.042s without skip).
        (c) Source-level sum-splitting (or 2-way unroll) regresses
            matmul_dense by +83% because doubling getf call count
            doubles per-call MatrixLoadFAt guard/addr-compute cost,
            which dominates the dep-chain savings (R48 pre-flight).
      Future rounds must bench before wiring. Control-test any
      dep-chain hypothesis by including a same-dep-chain variant
      with equal extra work (R48's unroll2 pattern).
    historical_rounds: [30, 42, 43, 44, 45, 46, 47, 48, 50, 51]
    key_negative_evidence: >
      R46 + R47 both hit ARM64 pipeline counter-effects: the inner
      matmul loop is near the machine's throughput limit, so
      dependency-chain depth and speculative-execution headroom
      matter more than raw insn count.
    key_positive_evidence: >
      Multi-session cumulative win on matmul vs LuaJIT:
        R42 Phase 1 (shared flat backing): 0.116 → 0.095 s  (-18.1%)
        R43 Phase 2 (JIT intrinsic getf/setf): 0.095 → 0.046 s  (-51.6%)
        R44 Phase 2b (tableVerified/dmVerified cache): neutral (infra)
        R45 Phase 2c (IR split + LICM hoist Flat/Stride): 0.046 → 0.035 s  (-23.9%)
        R46 Phase 2d (RowPtr IR ops): wiring reverted — ops stay available
        R47 FMA fusion: Phi-accumulator skip keeps matmul at 0.035s; non-reduction paths can still fuse
      Cumulative: 0.117 → 0.035 = -70.1%.
      LuaJIT gap: 5.5× → 1.67× across 4 winning rounds in 3 sessions.
      85% of the original matmul-vs-LuaJIT gap closed.
      Demonstrates method-JIT + IC + OptJIT can approach trace-JIT
      perf on tight numeric loops via runtime-type + IR design.

  - name: correctness-bug-fix
    description: >
      Direct fixes to emitter / runtime correctness bugs surfaced by
      diagnostics, test failures, or user reports. Exempt from pre-flight
      (rule #2 — correctness first).
    attempts: 5
    wins: 4                   # R15 revert + R17 framework + R36 extension + R52 Matrix store DCE fix
    reverts: 1                # R12 was REVERTED by R15
    holds: 0
    prior_reject_rate: 0.20   # 1/5 after R52; below 0.5 threshold
    mitigation_required: false
    mitigation_description: >
      **Test-coverage depth** (from R15 revert of R12): fixes in this
      class MUST be verified with production-scale iteration counts,
      not token 2-call regression tests. R12's gcd(20,8) test passed;
      math_intensive's million-iteration collatz hung indefinitely.
      Future fixes must add at least one benchmark-scale regression
      case before claiming win.

      **Defensive vs genuine compile failures** (from R15): a tier-2
      "unresolved label" is often DEFENSIVE — it prevents a deeper
      tier-2 emit bug from reaching runtime. Before fixing, check
      whether the failure guards a deeper bug; search for latent
      issues in the same code path.
    historical_rounds: [12, 15, 17, 36, 52]
    key_negative_evidence: >
      R12 (reverted): removed early return in emitFloatBinOp intBinMod
      to fix "unresolved label arith_done". But the fix exposed a
      latent tier-2 correctness bug in intBinMod emit that made
      collatz's int-int mod loop infinite (amplified over 1M
      iterations). math_intensive hung at 100% CPU for 3+ min.
    key_positive_evidence: >
      R15: reverted R12 cleanly. math_intensive back to 0.065 s.
      Root cause of the underlying tier-2 intBinMod bug deferred
      to forward class tier2-intbinmod-correctness.

  - name: tier-routing-gate
    description: >
      Route specific bytecode shapes to a different tier (typically keep
      at Tier 0) when exit-resume overhead dominates the native-template
      win at Tier 1.
    attempts: 2
    wins: 1
    reverts: 1
    holds: 0
    prior_reject_rate: 0.5
    mitigation_required: false     # rate exactly 0.5, attempts < 3 → not forced
    mitigation_description: >
      **Composability constraint** (from R6): a Tier 0 routing gate works
      only when the caller is ALSO skipped or when the caller is not
      Tier 1. If the caller is Tier 1 and reaches the gated callee via
      native BLR, the slow-path exit (~500 ns) exceeds the saved
      exit-resume cost. Self-recursive callees (R5 `makeTree`) satisfy
      this automatically. Leaf allocators called by Tier 1 functions
      (R6 `new_point`) do not.

      Any future tier-routing-gate attempt must include a Tier 1 caller →
      gated callee BLR cost microbench in pre-flight evidence.
    historical_rounds: [5, 6]
    key_negative_evidence: >
      R6 Gate B: predicted 100 ns callee cost, actual 700 ns due to caller
      slow-path exit. Cost-model error from missing the caller's codepath.

