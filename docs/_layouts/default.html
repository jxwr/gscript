<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} - Beyond LuaJIT</title>
<style>
  body {
    font-family: Georgia, 'Times New Roman', serif;
    max-width: 680px;
    margin: 80px auto;
    padding: 0 20px;
    color: #333;
    line-height: 1.8;
    background: #fff;
  }
  .back {
    color: #999;
    text-decoration: none;
    font-size: 0.9em;
    display: inline-block;
    margin-bottom: 32px;
  }
  .back:hover { color: #0066cc; }
  h1 {
    font-size: 1.8em;
    font-weight: normal;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .meta {
    color: #999;
    font-size: 0.9em;
    margin-bottom: 48px;
  }
  h2 {
    font-size: 1.3em;
    font-weight: bold;
    color: #333;
    margin-top: 48px;
    margin-bottom: 16px;
  }
  h3 {
    font-size: 1.1em;
    font-weight: bold;
    color: #444;
    margin-top: 32px;
    margin-bottom: 12px;
  }
  p {
    margin: 16px 0;
  }
  a { color: #0066cc; text-decoration: none; }
  a:hover { text-decoration: underline; }
  blockquote {
    border-left: 3px solid #ddd;
    margin: 24px 0;
    padding: 4px 20px;
    color: #555;
    font-style: italic;
  }
  blockquote p { margin: 8px 0; }
  code {
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 0.88em;
    background: #f6f6f6;
    padding: 2px 5px;
    border-radius: 3px;
  }
  pre {
    background: #f6f6f6;
    padding: 16px 20px;
    border-radius: 4px;
    overflow-x: auto;
    line-height: 1.5;
    margin: 24px 0;
  }
  pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 0.92em;
  }
  th {
    text-align: left;
    font-weight: bold;
    color: #555;
    border-bottom: 2px solid #ddd;
    padding: 8px 12px 8px 0;
  }
  td {
    padding: 8px 12px 8px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  img {
    max-width: 100%;
    height: auto;
    margin: 24px 0;
  }
  ul, ol {
    padding-left: 24px;
  }
  li {
    margin: 6px 0;
  }
  hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 48px 0;
  }
  strong { font-weight: bold; }
  em { font-style: italic; }
  footer {
    margin-top: 64px;
    padding-top: 16px;
    border-top: 1px solid #eee;
    color: #999;
    font-size: 0.85em;
  }
  footer a { color: #666; }
</style>
</head>
<body>

<a class="back" href="{{ site.baseurl }}/">&larr; Beyond LuaJIT</a>

{{ content }}

<footer>
  <a href="https://github.com/jxwr/gscript">github.com/jxwr/gscript</a>
</footer>

</body>
</html>
