# R55: sort DenseMatrix port pre-flight — disproven.
round: 55
date: 2026-04-18
follows: 54

type: diagnostic

target:
  benchmark: sort
  current_wall_sec: 0.050
  luajit_wall_sec: 0.011
  gap_factor: 4.55

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Port sort.gs to use matrix.dense(N, 1) backing for the pivot
    array. LCG values (< 2^31) fit exactly in float64; comparisons
    on the integer subset of float64 are bit-identical. Expect
    DenseMatrix pattern to give -30 to -50% like matmul / nbody /
    spectral_norm.
  expected_gain_pct: [30, 50]
  expected_gain_mechanism: >
    arr[j] access: table-array-dispatch (~5 insns) → matrix.getf
    flat LDR (~2 insns). For quicksort N=50K × log(N) × constant,
    inner loop is dominated by comparison + swap (3 arr accesses).
  counterfactual_check: >
    Float-based comparison on integer values should preserve
    ordering. Risk: float comparison has longer latency than
    int comparison on some microarchitectures; float-int conversion
    on arr[i] = arr[j] may add hidden cost.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: false      # small pre-flight round

pre_flight:
  required:
    - description: sort_dense must not regress vs sort
      acceptance: sort_dense <= sort + 5%
      halt_on_fail: true
  result: >
    sort_dense: 0.067s (median-of-5)
    sort:       0.050s
    Delta: +34% REGRESSION. Pre-flight fails. sort_dense.gs deleted.
  passed: false

outcome:
  status: no-win                # pre-flight disproved hypothesis; no code shipped
  bench_deltas:
    sort: {r53: 0.050, r55: 0.050, pct: 0}
  regressions: []
  shipped_code: false
  commit: null
  deliverables: []

revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: >
  Predicted -30 to -50%. Measured +34%. Cost model assumed
  float-backed int access would be strictly-faster-or-equal; ignored
  that comparison + conversion has cost beyond raw memory access.
revert_prevention: >
  DenseMatrix pattern's wins to date (matmul/nbody/spectral_norm)
  are on genuinely float-arithmetic workloads where the FPR path
  is the natural target. For int-heavy workloads (sort, sieve,
  fannkuch), a separate IntDense backing with raw int64 LDR/STR
  would be needed, along with OpMatrixGetI/SetI intrinsic rewrite.
  That's a multi-round project; defer.

ledger_update:
  classes_touched: [tier2-dense-matrix-kind]
  new_class_introduced: null
  sub_pattern_learned: >
    DenseMatrix (float-backed) IS NOT a drop-in replacement for
    integer-heavy benchmarks. int→float conversion per access +
    FP-comparison latency outweigh the flat-backing win. For
    int-heavy targets (sort, sieve), either:
      (a) extend with IntDense (int64-backed matrix) — runtime +
          JIT work, multiple rounds
      (b) leave as-is; pursue a different architectural lever
          (typed-array IC, generic LICM improvements, etc.)

notes: >
  4 rounds remain (R56-R59). Candidates:
    - IntDense runtime + JIT (R56-R57 project)
    - LDP/STP pairing for adjacent nbody_dense loads (architecturally
      interesting, real but modest wins)
    - Force-inline advance() into main for nbody call-overhead
      elimination (could save ~50ms on nbody_dense)
    - Port mandelbrot to matrix.dense (mandelbrot has pixel-grid
      float output; natural DenseMatrix fit)
