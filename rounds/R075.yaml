  current_state_audit_summary: >
    Reduced repro chain:
      (1) LCG alone (tight for-loop in main): JIT==VM, correct values.
      (2) LCG in function, N=8..1000: JIT==VM, correct values.
      (3) qs on handcrafted descending array: JIT==VM, correct.
      (4) qs on LCG-produced array, N=50000: DIVERGES starting arr[1].
      (5) qs on LCG-produced array inline (no make_random_array): STILL diverges.
      (6) qs on LCG-produced array, N=20: DIVERGES.
      (7) qs on LCG-produced array, N=11: DIVERGES.
      (8) qs on LCG-produced array, N=10: correct.
      (9) qs on LCG-produced array, N=17: correct (!).

    R74 hypothesis REJECTED: bug is NOT in intbinmod emit. LCG values
    are computed correctly (JIT matches VM before sort). The bug is
    in **quicksort's Tier 2 codegen** for specific N where JIT's
    call-count threshold puts quicksort at Tier 2 on inputs with
    pseudorandom recursion-pattern.

    At N=20 (JIT):
      first 10 positions: completely wrong (random order)
      last 5 positions: correctly sorted
    So T2 quicksort fails on ~70% of positions — not a subtle bug.

    IR inspection: quicksort.ir.txt has unusual v56 Phi self-reference
    (v56 = Phi[B7:v60, B3:v56, B4:v29]). This "pass-through on B3→B5
    edge" Phi might be emitting incorrectly. Root cause
    likely in emitPhiMoves or regalloc for Phi with its own result
    as one input.

