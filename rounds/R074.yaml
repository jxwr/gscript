hypothesis:
  class: correctness-bug-fix
  claim: >
    R73 surfaced a blocker: Tier 2 main-with-call-in-loop produces wrong
    output / crashes. Root cause hypothesis (R73): hasCallInLoop gate
    hides a Tier 2 codegen bug.

    R74 actual finding (via reduced repro): the blocker is not in
    main compilation — it's a PRE-EXISTING bug in emitFloatBinOp's
    intBinMod case. emitDeopt returns without emitting the shared
    `done` label, causing `asm.B(done)` from the int-success path
    to dangle. Functions containing mixed int/float mod fail
    Tier 2 compile with "unresolved label arith_done" and silently
    stay at Tier 1.

    Fixing the label by emitting it before emitDeopt exposes a
    DEEPER latent bug: Tier 2's int48-overflow + deopt pipeline
    miscomputes make_random_array's LCG (large-int MUL + MOD),
    producing different values than VM. This is the
    `tier2-intbinmod-correctness` forward class (proposed R15,
    never implemented).
  expected_gain_pct: null
  expected_gain_mechanism: null
  counterfactual_check: null

