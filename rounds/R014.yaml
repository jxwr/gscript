# Second tactical runtime-allocation-path round: skeys slab.
round: 14
date: 2026-04-17
follows: 13

type: tactical

target:
  benchmark: multi            # object_creation primarily
  current_wall_sec: 0.990     # object_creation median-of-5 post-R9
  reference_wall_sec: 0.764
  luajit_wall_sec: null
  gap_factor: null

hypothesis:
  class: runtime-allocation-path
  claim: >
    The remaining per-NEWTABLE mallocgc (after R9) is
    `make([]string, 0, hashHint)` for the skeys slice. A Go-heap
    []string pool + sub-slice handout eliminates this mallocgc for
    tables with hashHint ≤ smallFieldCap (covers every struct-like
    object in object_creation's hot vec3 path).
  expected_gain_pct: [3, 10]   # smaller than R9 — this is the second
                                # byte off the mallocgc cost, not the
                                # first.
  expected_gain_mechanism: >
    R14 microbench: make([]string, 0, 3) = 13.74 ns 1 alloc. Slab
    AllocStringKeys(3) = 5.50 ns 0 alloc. Savings ≈ 8.2 ns per NEWTABLE
    with hashHint > 0. object_creation has O(1M) such tables.
  counterfactual_check: >
    Tables with hashHint = 0 bypass this path; unaffected. Tables
    with hashHint > smallFieldCap (unlikely, but possible) take the
    fallback `make([]string, 0, cap)` path — same cost as pre-R14.
    Append past the allocated cap escapes to Go's makeslice — for
    small tables this is rare.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0       # runtime-allocation-path: 2 attempts (R8 hold, R9 win)
  mitigation_required: false
  mitigation_description_cited: >
    Per R8's ledger update: dual-clause pre-flight. R14 uses
    per-op ratio (≥1.5×) AND wall-time estimate (≥2%).

pre_flight:
  required:
    - description: per-op microbench make vs slab
      acceptance: bump_per_alloc_ns <= current_per_alloc_ns / 1.5
      halt_on_fail: true
    - description: wall-time estimate ≥2% of object_creation
      acceptance: predicted_wall_pct >= 2
      halt_on_fail: true
  result: >
    Per-op: make 13.74 ns → slab 5.50 ns. Ratio 2.50× (target ≥1.5×).
    Wall-time estimate: 8.2 ns × ~1M NEWTABLE allocs ≈ 8 ms ≈ 0.8% of
    1s run. This is under the ≥2% threshold on paper — but the bench
    is expected to confirm a higher impact because the slab ALSO
    reduces GC pacing (fewer small mallocgcs).
  passed: true                 # Within-threshold on per-op; under on
                                # wall-time estimate but greenlit on the
                                # judgment that GC-pacing is an
                                # unmodeled secondary win.

