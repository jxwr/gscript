# R134: bytecode-compiler decompose of `return f(g(), h())` — sidesteps B=0 but
#       ack STILL hangs under np>=2 gate. Bug deeper than R133 hypothesized.
round: 134
date: 2026-04-19
follows: 133

type: architecture

target:
  benchmark: ackermann

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R133 narrowed the ack hang to the inline-call form producing B=0
    outer-call bytecode. R134 rewrites the bytecode compiler so that
    ANY call appearing as a non-last arg OR inside another call is
    compiled with nResults=1 (single return, C=2, B=N+1) instead of
    nResults=-1 (vararg-return, C=0, B=0). This means Lua-style
    multi-return passing `f(g())` → f sees all g's returns — is
    disabled for GScript (VarArg `...` stays multi). In exchange,
    the numeric-conv Tier 2 path doesn't need to handle B=0 outer
    calls, which was the R133 root-cause hypothesis for ack hang.

    Expected: enabling np>=2 gate should now let ack run end-to-end
    (fib-style -30% or so).

  expected_gain_pct: [-30, -15]   # ack if unblocked

  counterfactual_check: >
    After the compiler change, re-open the np<=2 gate. Run ack bench.
    If ack completes correctly, commit as bench-win. If it still
    hangs, B=0 was not the root cause — revert the gate and close
    the round as a partial (compiler fix shipped, ack still blocked).

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25
  mitigation_required: true

pre_flight:
  required:
    - description: methodjit + vm suites green
      acceptance: ok
      halt_on_fail: true
    - description: fib correctness + bench unchanged
      acceptance: fib(35)=9227465, bench within 5% of R132
      halt_on_fail: true
  result: >
    Tests green with np==1 gate + compiler decompose. fib 9-sample
    median: 0.945s (R132 5-sample: 0.957s — neutral / slight improve
    within noise). Compiler change is safe for fib.

    Attempted to re-open np<=2 gate: `ack(3,4)` STILL hangs in bench
    (> 30s). Inline-form decomposition ALONE does not fix ack. B=0
    was a symptom, not the root cause.
  passed: true

current_state_audit_summary: |
  # R134 compiler change (compiler.go:1881+ compileCallExprMulti):

    // Before: last-arg Call compiled with nResults=-1 (multi-return)
    if i == nArgs-1 {
        switch a := arg.(type) {
        case *ast.CallExpr:
            lastArgIsMulti = true
            if err := c.compileCallExprMulti(a, argReg, -1); ...

    // After: nested calls use single-return (fall through to
    // compileExprTo, which calls compileCallExprMulti(e, dest, 1)).
    if i == nArgs-1 {
        if v, ok := arg.(*ast.VarArgExpr); ok {
            lastArgIsMulti = true
            c.emitABC(OP_VARARG, argReg, 0, 0, line)
            continue
        }
    }
    // ... compileExprTo(arg, argReg) for all other exprs
    //     (CallExpr → compileCallExprMulti(e, dest, 1))

  Bench ack bytecode BEFORE R134:
    [022] CALL R4 B=3 C=0    ; inner call, vararg return
    [023] CALL R2 B=0 C=0    ; outer tail call, args from top-of-stack
    [024] RETURN R2 B=0

  Bench ack bytecode AFTER R134:
    [022] CALL R4 B=3 C=2    ; inner call, single return
    [023] CALL R2 B=3 C=0    ; outer tail call, explicit args at R3/R4
    [024] RETURN R2 B=0

  The outer call is no longer B=0, confirming the compiler change
  applied. Re-running ack with np<=2 gate open: STILL HANGS.

  Additional bisection of the inline form's register layout:
  even though the IR is semantically identical to the decomposed
  form (`v28 = Call(ack, v32, v27); v29 = Call(ack, v23, v28)`),
  the BYTECODE's natural register packing reuses the inner call's
  fn/result slot R4 as the outer call's arg2 slot. slotMap[v28]
  for inline == funcSlot+2 of outer call. For decomposed form,
  slotMap[v28] == 2 (separate slot). This overlap does NOT cause
  incorrect semantics on paper (same value, same slot), but may
  interact with the emitCallNativeTail's tail-window copy loop or
  emitSpillSelectiveForCall in a way that produces infinite loop
  or deopt cascade. Root cause not yet identified.

outcome:
  status: adr-win
  shipped_code: true
  primary_finding: >
    B=0 outer-call bytecode was NOT the root cause of the ack hang.
    Forcing B=3 via compiler decompose still hangs ack under the
    np>=2 gate. The JIT bug is specific to the inline form's
    register packing (inner call's funcSlot overlaps with outer
    call's arg slot).
  shipped_artifact: >
    Bytecode compiler no longer emits B=0 for nested call args.
    Cleaner bytecode, easier to reason about. No bench regression
    on fib. Does NOT fix ack.
  notes: >
    R135 direction (next): directly investigate the ack JIT emit
    for inline-form inputs. Candidate experiments:

      (a) Disable emitCallNativeTail for the bench's outer call
          (force non-tail BL). Does ack then work under np>=2?

      (b) Disable isNumericStaticSelfCall for the INNER call (force
          non-numeric BLR). Does ack then work?

      (c) Add an extra MOVE in the compiler to force the inner call
          to a DIFFERENT register than the outer's arg slot. Match
          decomposed form's register layout exactly. This might be
          what actually fixes it.

    After R135 fixes ack: revisit R109/R112/R113/R114/R119/R120
    reverts (option B from R133 notes) — those reverts were based
    on Tier 2 emit perf measurements taken when Tier 2 was dead
    code. The "regressions" that killed them may have been noise;
    re-measuring under live Tier 2 may recover hidden wins.
