# R46: DenseMatrix Phase 2d — RowPtr IR ops (infra; not wired for matmul).
round: 46
date: 2026-04-18
follows: 45

type: tactical

target:
  benchmark: matmul_dense
  current_wall_sec: 0.035
  luajit_wall_sec: 0.021
  gap_factor: 1.67

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Add OpMatrixRowPtr(flat, stride, i) = flat + i*stride*8 as an SSA
    node that LICM can hoist out of loops where i is invariant. For
    matmul a[i][k] access: i is fixed in the k-loop, so RowPtr_a
    hoists to k-preheader; k body becomes single LDR. Target: match
    LuaJIT matmul ~0.022s.
  expected_gain_pct: [20, 35]
  expected_gain_mechanism: >
    Theoretical: saves 2 insns per a[i][k] access when RowPtr hoists
    outside k-loop (MUL + ADD eliminated). At 27M iter × 2 insns ×
    0.5ns = ~27ms savings. Projected 0.035 → 0.008s on a's path
    + no change to b's path → ~0.025s total.
  counterfactual_check: >
    RowPtr for b[k][j] has k-varying input → NOT hoistable; inner
    loop still does MUL+ADD for b. Extra LSL #3 in RowPtr emit
    adds 1 insn per b access.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    diag of matmul_dense confirms LICM DOES hoist RowPtr_a to the
    i-loop preheader (B10) when wired up. But measured 7-run median
    is 0.037s (R46) vs 0.035s (R45) — R46 regresses ~3%. Root cause:
    ARM64 pipeline absorbs the R45 MUL+ADD into LDR's address-
    generation stage; the R46 split adds an explicit LSL#3 + MOVreg
    that the pipeline does NOT absorb. Matmul's inner loop is
    apparently already at a pipeline throughput limit where insn
    count matters more than dependency-chain depth.

pre_flight:
  required:
    - description: matmul_dense ≥10% improvement
      acceptance: matmul_dense_jit <= 0.031
      halt_on_fail: true
  result: >
    7-run R46 median: 0.037s (R45 baseline 0.035s). REGRESSION.
    Pre-flight fails → keep R46 IR ops but DON'T wire them into
    the default lowering. Ops remain available for hand-emitted
    kernels (3D tensors, SIMD path) where the dependency tradeoff
    may be favorable.
  passed: false

outcome:
  status: hold                 # IR ops shipped; wiring reverted
  bench_deltas:
    matmul_dense_with_r46_wire: {r45: 0.035, r46: 0.037, pct: 5.7}
    matmul_dense_r46_reverted_wiring: {r45: 0.035, reverted: 0.035}
  regressions: []              # after revert
  commit: pending
  deliverables:
    - internal/methodjit/ir_ops.go — OpMatrixRowPtr/LoadFRow/StoreFRow (unused in default lowering, available for future use)
    - internal/methodjit/emit_matrix.go — emit for the 3 new ops
    - internal/methodjit/emit_dispatch.go — dispatch wiring
    - internal/methodjit/interp.go — tier-2 interp fallback
    - internal/methodjit/pass_licm.go — LICM whitelist for RowPtr
    - internal/methodjit/pass_matrix_lower.go — REVERTED to R45 form (LoadFAt/StoreFAt)

revert_class: cost-model-error
revert_root_cause_location: "RowPtr emit: explicit LSL #3 + MOVreg not absorbed by ARM64 pipeline"
revert_cost_model_delta: >
  Predicted 20-35% from hoisting a[i][k] row pointer out of k-loop
  (2-insn savings × 27M iter). Measured: -3% regression. ARM64
  pipeline schedules LDRreg's built-in scale with preceding MUL+ADD
  such that the critical-path latency is the same as manual split.
  The split's extra MOVreg adds real cost.
revert_prevention: >
  For future LICM-hoist optimizations on tight loops already close
  to LuaJIT, measure before wiring the pass. ARM64 pipelining can
  mask expected savings; insn-count-level analysis overstates gains.

ledger_update:
  classes_touched: [tier2-dense-matrix-kind]
  new_class_introduced: null
  sub_pattern_learned: >
    When matmul is near the machine's pipeline throughput limit,
    reducing per-iteration insn COUNT helps more than shortening
    dependency chains. Strength reduction via extra address-compute
    insns can backfire even when LICM hoisting works correctly.

notes: >
  R46's IR ops stay in the codebase but unwired. Future uses:
    - 3D tensor access (m[i][j][k] has more opportunity for hoisting)
    - SIMD/NEON row loads (process 2 float64 per iter)
    - Hand-emitted kernels for specific hot paths
  For now, R45's LoadFAt form is the winner on matmul.

  Next direction: instead of further IR tuning, pursue the
  remaining 1.67× gap via SIMD NEON FMLA ops. ARM64's FMLA does
  `d0 = d0 + d1*d2` in a single insn. Matmul's inner body is
  exactly this shape. Could reduce 2 FMUL/FADD pair to 1 FMLA.
