current_state_audit_summary: |
  # Implementation notes (pass_escape.go):
  #
  # First pass: collect OpNewTable instructions across all blocks.
  # Second pass: for each SSA arg use, check against candidates.
  #   - Args[0] to OpGetField → OK
  #   - Args[0] to OpSetField → OK
  #   - Args[1] (value slot) to OpSetField → kill
  #   - anything else → kill
  # Cross-block use → kill (R160 will relax this).
  #
  # The current implementation is O(instructions × args). For a
  # typical proto this is bounded; no fixpoint needed at R158.
  #
  # TestR158_Identify_StoredAsValue_Escapes subtlety (documented
  # in the test): when outer holds an SSA reference to inner, and
  # inner is NOT virtual (escapes via Args[1]), outer IS still
  # virtual under MVP because its own uses pass the predicate.
  # The REWRITE in R159 will still work correctly: SetField(outer,
  # fieldAux=v, inner_id) gets mapped to outer.fields[v]=inner_id,
  # and GetField(outer, v) returns inner_id directly. Non-virtual
  # inner's own field accesses happen normally on its real Table.

