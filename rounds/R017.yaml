# Tactical round: codify R15's mitigation into mechanical regression tests.
round: 17
date: 2026-04-17
follows: 16

type: tactical

target:
  benchmark: math_intensive       # the benchmark that R15 used for the revert
  current_wall_sec: 0.068
  reference_wall_sec: 0.070
  luajit_wall_sec: null

hypothesis:
  class: correctness-bug-fix
  claim: >
    R15 added a ledger mitigation requiring production-scale
    regression tests for this class, but the mitigation is currently
    prose-only. Adding a Go test harness with hard deadlines and
    benchmark-shaped workloads converts the mitigation from advisory
    to mechanical: future correctness-class fixes that hang or
    amplify over 1M iterations fail the test.
  expected_gain_pct: null
  expected_gain_mechanism: >
    go test now runs the same int-int mod hot loop pattern that
    exposed R12's failure mode. A future regression that re-introduces
    the hang fails the test within ~3s instead of being missed until
    a full benchmark run.
  counterfactual_check: >
    No production code change; only test code added. Cannot cause
    runtime regressions. Only risk: a flaky CI if the 3s deadline is
    tight on slow machines. Mitigated by: (a) target wall time is
    0.054s on M4 Max, so 3s has a ~55× margin; (b) if it flakes,
    deadline can be tuned without changing the fixture.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.5          # correctness-bug-fix: 1 win, 1 revert, attempts=2 < 3
  mitigation_required: false
  mitigation_description_cited: >
    Per R15 ledger: correctness-bug-fix rounds must add a benchmark-
    scale regression test. R17 builds the mechanical framework that
    lets future rounds in this class satisfy the requirement.

pre_flight:
  required:
    - description: >
        The two seed tests (collatz hot loop + 1M-iter fib) pass
        under both current and clean builds; runtime <3s each.
      acceptance: go_test_passes && elapsed_per_test < 3s
      halt_on_fail: true
  result: >
    TestProductionScale_Collatz_ModHotLoop: PASS, 0.01s.
    TestProductionScale_IterativeFib:        PASS, 0.02s.
    Both well under the 3s deadline.
  passed: true

outcome:
  status: win                      # test framework shipped; both seed cases green
  bench_deltas: {}
  regressions: []
  commit: 33bed30
  deliverables:
    - internal/methodjit/production_scale_regression_test.go
  verification:
    - "go test -run TestProductionScale ./internal/methodjit/ → PASS"

revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: null
revert_prevention: null

ledger_update:
  classes_touched: [correctness-bug-fix]
  new_class_introduced: null
  sub_pattern_learned: >
    Ledger mitigations that remain prose-only decay. Converting a
    mitigation into a mechanical test (or a scripts/round.sh gate)
    makes it mechanically enforceable for all future rounds in the
    class. Preferred approach for any mitigation that can be
    formalized.
