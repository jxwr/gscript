revert_cost_model_delta: >
  Predicted [2,8]%. Measured -2.7% (regression). Cost model didn't
  account for store-forwarding's regalloc cost: the stored SSA value
  now becomes a live range that the allocator must spill-avoid,
  competing with the load-site register that would have been a
  fresh LDR. On the M4 with L1-hit loads at ~3 cycles, "cheap LDR
  vs spill-resistant register" can favor the LDR.
revert_prevention: >
  Before adding store-forwarding to an existing CSE pass, inspect
  target IR for actual same-cell load-store-load patterns. If none
  exist, the pass CANNOT help and MAY hurt. Pre-flight this by
  grep-ing the diag IR for same-key MatrixLoadFAt/Store pairs.

ledger_update:
  classes_touched: [tier2-dense-matrix-kind]
  new_class_introduced: null
  sub_pattern_learned: >
    Store-forwarding in a CSE pass is NOT free: it extends the live
    range of the stored SSA value, forcing the regalloc to keep it in
    a register across code that could otherwise re-load from L1. On
    R45 DenseMatrix infra where loads are already cheap (flat LDR
    with base+offset), the regalloc cost dominates. Same-cell
    RMW patterns in matmul_dense / nbody_dense are rare enough that
    the CSE has ~0 payoff.

    Pattern: CSE wins on cache-unfriendly targets (original GetField
    with shape guards, NaN unbox, pointer deref). CSE loses when the
    target is already cache-friendly (plain LDR). DenseMatrix is
    already in the latter regime.

