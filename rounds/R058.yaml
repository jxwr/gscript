hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Extend LoadEliminationPass to CSE OpMatrixLoadFAt on identical
    (flat, stride, i, j) SSA keys, plus store-to-load forwarding
    on OpMatrixStoreFAt. Expect modest nbody_dense gain on cases
    where a matrix.setf is followed by matrix.getf on the same cell
    (the accumulator pattern in advance's first loop).
  expected_gain_pct: [2, 8]
  expected_gain_mechanism: >
    Each redundant MatrixLoadFAt saves ~2 insns. Store-forwarding
    can avoid LDR in RMW patterns. Modest but compounds with other
    CSE wins.
  counterfactual_check: >
    If the IR post-R53 already has no redundant MatrixLoadFAt on
    same-cell keys, this CSE has nothing to dedupe and may actively
    hurt via regalloc pressure (forwarded SSA values live longer).

