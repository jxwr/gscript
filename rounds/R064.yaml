# R64: MatrixLoadFAt direct-FPR emit path — matmul_dense -7.7%.
round: 64
date: 2026-04-18
follows: 63

type: tactical

target:
  benchmark: matmul_dense
  current_wall_sec: 0.039
  luajit_wall_sec: 0.021
  gap_factor: 1.81

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    emitMatrixLoadFAt was loading to GPR X0, then calling storeResultNB.
    storeResultNB only handles GPR-allocated SSA values; float results
    with FPR allocations fall through to a memory store. Downstream
    FMUL then resolves via memory load + FMOV, causing a
    LDR → STR → LDR → FMOV round-trip per load. Fix: when the SSA
    result has an FPR allocation, FMOVtoFP directly and call
    storeRawFloat. Saves ~3 insns per matmul load, 2 loads per iter,
    27M iters.
  expected_gain_pct: [5, 15]
  expected_gain_mechanism: >
    Current inner loop asm (line 258-274 of diag/matmul_dense/
    matmul.asm.txt before fix):
      LDR X0, [X5, X4, LSL #3]    ; flat load
      STR X0, [R26, #slot_a]      ; NaN-box store to reg slot
      LDR X0, [R26, #slot_b]      ; reload b from reg slot
      FMOV F0, X0                 ; to FPR
    After fix: LDR X0 → FMOVtoFP directly.
    5 insns → 2 insns per load. For 27M × 2 loads × 3 insns saved =
    162M insns at M4 effective IPC 6-8 → 25M cycles → ~7ms theoretical.
    Measured: -3ms (0.039 → 0.036s). Less than theoretical because
    some memory-round-trip was elsewhere (e.g., phi store).
  counterfactual_check: >
    Benches that don't use matrix.getf heavily should be unchanged.
    Confirmed: nbody (legacy), sort, fib, fannkuch all within noise.
    Benches that use matrix.getf (nbody_dense, spectral_norm_dense,
    matmul_dense) should benefit — matmul_dense does; nbody_dense
    and spectral_norm_dense are at noise floor (their hot path
    has many NON-matmul FP ops whose regalloc pressure limits the
    win).

