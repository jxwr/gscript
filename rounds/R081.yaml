    Investigated Kind-feedback fallback: apply GuardType using
    Kind when Result is unobserved. This would help BENCHES where
    arr is monomorphic (sieve's ArrayBool, ArrayInt sort on clean
    int input, matmul_dense's ArrayFloat backing).

    But sort.gs's failing case has arr = ArrayMixed (ints +
    LCG-overflow floats). Kind feedback is FBKindMixed, not mono.
    Fallback doesn't apply.

    The REAL fix for sort.gs requires:
      - OP_LE feedback-driven rewrite in graph_builder
      - At parse of OP_LE, consult fb.Left/fb.Right; if mono-int,
        rewrite to OpLeInt with guards on operands
      - If mono-float, OpLeFloat with guards
      - If polymorphic, leave as OpLe (remains buggy but rare)

    This is NOT a single-round fix — it requires:
      a. Modifying graph_builder's OP_LE/OP_LT/OP_EQ handlers
      b. Ensuring feedback is actually populated before first compile
         (possibly lowering promotion threshold so interp/Tier 1 runs
          longer to fill feedback)
      c. Testing across suite for regressions
      d. Handling edge cases (RK with constants — need feedback on
         constants which don't have types?)

