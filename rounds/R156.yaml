# R156: research round inserted at user request. Four parallel
#       research agents studied V8's tier architecture, escape
#       analysis, call-path design, and OSR/deopt. Synthesized
#       into adr-v8-alignment.md with four concrete candidate
#       paths (X, B, W, I) for the next arc, replacing the
#       previous "Path A/B/C" framing.
round: 156
date: 2026-04-21
follows: 155

type: strategy

target:
  benchmark: multi

hypothesis:
  class: workflow-evolution
  claim: >
    Before scoping the next optimization arc, research V8's actual
    architecture to (a) validate that GScript's current design is
    on the right track, (b) identify the 1-3 biggest architectural
    gaps that V8 has solved but GScript has not, and (c) ground
    the next arc's ADR in V8-validated design rather than
    speculation.

  expected_gain_pct: null    # research round
  expected_gain_mechanism: >
    Directional correctness for the next 10-20 rounds of
    investment. Prevents another R147-shape arc that opens on
    the wrong premise.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null

pre_flight:
  required:
    - description: >
        Spawn 4 parallel research agents with web search + fetch
        access. Split coverage by subsystem: (a) tier architecture
        + OSR gating, (b) TurboFan escape analysis, (c) call-heavy
        / inline strategy, (d) deopt + OSR design. Each agent
        produces ≤600-word cited report.
      acceptance: 4 reports received with concrete citations
      halt_on_fail: true
    - description: >
        Synthesize into an ADR (docs-internal/decisions/) with
        a concrete candidate-path ranking. Each candidate path
        must have: round budget, target benchmarks, deliverable
        shape, and risk.
      acceptance: adr-v8-alignment.md written
      halt_on_fail: true
  result: |
    Four agents returned with substantive reports. Full citations
    and V8 source references. Highlights:

    Agent A (tier architecture, OSR gating):
      - V8 uses 4 tiers: Ignition → Sparkplug → Maglev → TurboFan.
      - V8 is actively retiring TurboFan for Turbolev (Maglev CFG
        fed to TurboFan backend) — validates CFG-SSA over sea-of-
        nodes.
      - GScript's Tier 2 is architecturally equivalent to Maglev.
      - V8 picked MORE tiers over trace JIT — method JIT CAN close
        the LuaJIT gap.

    Agent B (escape analysis):
      - TurboFan pass is ~1300 LOC; MVP slice ~500-700 LOC over 6
        sub-rounds.
      - Inline MUST run before EA (verified in TurboFan pipeline).
      - Published wins: Choi 1999 median -19% total runtime, up to
        -23%; V8 v7.1 "up to 40% in certain scenarios".
      - GScript's object_creation (3 NewTable per loop iter) is a
        textbook best case; expect -30% to -60%.
      - Deopt materialization is the main infrastructure gap but
        can be deferred by bailing on allocations that reach a
        deopt edge.

    Agent C (call-heavy / inline):
      - V8's biggest structural innovation is IC-patched DIRECT
        CALL with zero caller-side ctx rebuild. Callee prologue
        owns its own invariants.
      - GScript's R107-R120 mono-IC only shaved a few percent
        because the IC hit STILL pays ~50-insn ctx-setup.
      - V8's inline budget is cumulative-bytecode (~920 ops) +
        frequency-weighted, NOT uniform MaxRecursion. GScript's
        MaxRecursion=5 under-inlines fib and over-inlines ack.
      - R137's raw-int return is the wrong layer; V8 keeps calls
        tagged and fuses untag-at-use to ~3 insns.

    Agent D (deopt / OSR):
      - V8 has dedicated OSR-entry prologues that materialize
        live locals including the loop counter; jumps to
        `restart_after_osr` POST-INCREMENT.
      - GScript's restart-from-entry is strictly below this bar.
      - R154 latent loop-counter bug is exactly the symptom V8
        avoids by making resume PCs validated safepoints.
      - V8's per-deopt translation metadata solves GScript's
        R149 ABI hazard (Tier 1 boxed vs Tier 2 raw-reg calling
        convention mid-execution).

    Synthesized into adr-v8-alignment.md with 4 candidate paths:

      Path X (new, 3-5 rounds): IC-patched direct call without
        ctx-setup. Biggest identified single gap. Targets fib
        (expect 34× → ~18×), ackermann (body-dominated; small),
        mutual_recursion, method_dispatch, binary_trees recursive.

      Path B (5-6 rounds): Escape analysis + scalar replacement
        MVP. Targets object_creation (-30% to -60%), binary_trees
        allocation half, any NewTable-in-loop pattern.

      Path W (new, 3-4 rounds): Dedicated OSR entry with safepoint-
        validated resume PCs. Fixes R154 latent bug and enables
        Tier 2 promotion for LoopDepth=1 driver loops.

      Path I (1-2 rounds): Inline heuristic overhaul (uniform
        MaxRecursion → cumulative-bytecode cap + frequency).
        Low direct perf impact; corrects a class of future
        inlining hazards.

    Non-decisions:
      - Path C (trace JIT) explicitly rejected.
      - Sparkplug-style frame-identical baseline deferred.
      - TurboFan sea-of-nodes path rejected (V8 is also retiring).
  passed: true

current_state_audit_summary: |
  # RESEARCH FINDINGS (persist to memory):
  #
  # 1. GScript's architectural choices are VALIDATED by V8's own
  #    trajectory. CFG-SSA, separate baseline + optimizing tiers,
  #    type-specialized optimizing IR with inline+LICM+LoadElim+
  #    range-analysis — all mirror Maglev, which V8 is promoting
  #    as their preferred optimizing tier over TurboFan.
  #
  # 2. The LuaJIT gap IS closable with method JIT. V8 picked more
  #    tiers over trace JIT. The evidence strongly supports
  #    staying on the method-JIT path and NOT pivoting to trace.
  #
  # 3. Biggest single structural gap vs V8 is IC-patched direct
  #    call without ctx-setup. GScript rebuilds Constants/Regs/
  #    ClosurePtr/GlobalCache on every call even when the callee
  #    is known via IC. V8 does not. Path X ships this.
  #
  # 4. Second-biggest gap is escape analysis for allocation-heavy
  #    hot loops. V8's pass is 5-6 rounds to MVP-shape in GScript.
  #    object_creation is the textbook test case.
  #
  # 5. Third-biggest gap is OSR design: V8 has proper loop-counter-
  #    preserving OSR entries; GScript restarts from entry. R154
  #    found the symptom (latent for-loop emit bug) and the fix
  #    is a standalone arc (Path W, 3-4 rounds).
  #
  # 6. Our inline heuristic (MaxRecursion=5 uniform) is the wrong
  #    shape. V8 uses cumulative-bytecode + frequency. Path I,
  #    1-2 rounds.
  #
  # Full ADR: docs-internal/decisions/adr-v8-alignment.md
  # Full agent reports: embedded in this card's pre_flight.result.

verify:
  result: |
    ADR written. No code changes.

    Path X chosen as the next arc opener on the basis of:
      - Biggest single-structural gap per agent C's analysis
      - Shortest budget (3-5 rounds vs Path B's 5-6)
      - Most-V8-validated: agent A confirmed the V8 design is
        IC-patched direct call with zero caller-side setup; this
        is the mechanical copy of that.
      - Arc halt criteria explicit: fib median must drop below
        0.70s (from current 0.884s) by R+3 or halt.

outcome:
  status: adr-win
  shipped_code: false
  primary_win_bench: none
  primary_win_pct: 0
  reverted_in_round: false
  notes: |
    This research round replaces the previous "Path A / Path B /
    Path C" framing (in project_call_path_arc_r147_r149.md,
    which has now been superseded) with four specific paths
    backed by V8 design precedent.

    R157 should open as "Path X arc: IC-patched direct call
    without ctx-setup." R148-style audit first, then R149-style
    prototype, then ship. Crucially: unlike the R147 arc, the
    target predicate here is not "skip dead insns in the existing
    call path" but "replace the entire ctx-rebuild block with a
    direct-to-callee-prologue BL". Different architecture, not
    more micro-tuning.

