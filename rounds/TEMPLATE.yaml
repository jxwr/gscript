# rounds/TEMPLATE.yaml — schema for a v5 round card.
#
# One card per round. Written at Step 3 (Direction), finalized at Step 7
# (Close). Committed in the round's closing commit. Cards are append-only
# history — never edited after the round closes.
#
# All fields are required unless marked "optional".

# --- identity ---
round: NNN                    # monotonic, matches rounds/NNN.yaml filename
date: YYYY-MM-DD              # round start (local date is fine)
follows: NNN-1                # previous round id (or "v5-bootstrap" for R7)

# --- classification ---
type: tactical                # one of: tactical | architecture | strategy | meta | diagnostic | kb
# tactical      = specific optimization, code change, benchmark target
# architecture  = no code, outputs an ADR or pass design
#                 REQUIRED: §1 "Current state audit" per rule 23.
#                 Ship at least one production measurement that
#                 disproves the null hypothesis "this is already done"
#                 before proposing new work.
#                 For tier-2 bench rounds, the audit MUST include
#                 reading diag/<bench>/<hot_proto>.ir.txt, not just
#                 emit source code (R32 amendment to rule 23).
# strategy      = no code, rewrites direction based on ledger pattern
# meta          = changes the workflow itself
# diagnostic    = pure measurement, documents findings
# kb            = KB-only update

# --- target ---
target:
  benchmark: object_creation        # one benchmark, or "multi" for cross-benchmark mechanism
  current_wall_sec: 1.039           # median-of-5 at round start
  reference_wall_sec: 0.764         # from benchmarks/data/reference.json
  luajit_wall_sec: null             # optional, from reference.json if known
  gap_factor: null                  # optional, current/luajit

# --- hypothesis ---
hypothesis:
  class: runtime-allocation-path    # must match a ledger.yaml class or introduce a new one
  claim: >
    One-sentence description of the predicted mechanism and effect.
  expected_gain_pct: [25, 35]       # [low, high]; null for non-tactical rounds
  expected_gain_mechanism: >
    The causal chain: why this change produces that gain.
  counterfactual_check: >
    Brief in-writing simulation: what happens on benchmarks OTHER than the
    target? If this breaks any of them, how?

# --- class gate (Step 3 output) ---
class_gate:
  ledger_consulted: true            # must be true; Step 3 requires it
  prior_reject_rate: 0.0            # from ledger.yaml at round start
  mitigation_required: false        # true when prior_reject_rate > 0.5 and attempts >= 3
  mitigation_description: null      # required iff mitigation_required=true

# --- pre-flight evidence (Wave 2+; optional in Wave 1) ---
#
# Wave 2 convention (enforced after R10): any tactical round declaring a
# pre_flight microbench SHOULD declare at least one per-op clause AND one
# absolute wall-time clause. A per-op ratio alone is insufficient — R8
# learned this the hard way. See program/ledger.yaml →
# runtime-allocation-path.mitigation_description for the canonical case.
#
# Per-op clause shape (example):
#   - description: …
#     acceptance: bump_per_alloc_ns <= current_per_alloc_ns / 2.0
#     halt_on_fail: true
#
# Wall-time clause shape (example):
#   - description: …
#     acceptance: predicted_wall_pct >= 5
#     halt_on_fail: true
pre_flight:
  required: []                      # list of microbench/oracle descriptions
  result: null                      # measured result vs expected
  passed: null                      # boolean; null in Wave 1

# --- outcome (filled at Step 7) ---
outcome:
  # Post-R49 taxonomy (rule 24):
  #   pending   — during the round
  #   bench-win — a target benchmark measurably moved in intended direction
  #   adr-win   — ADR/meta/kb/diag deliverable shipped; no bench movement expected
  #   revert    — code was committed then backed out in the same round
  #   no-win    — hypothesis tested and failed to move a benchmark
  # orthogonal `shipped_code` distinguishes "code left in tree" from
  # "pre-flight halt, no code." class-gate (rule 21) counts only
  # bench_wins + reverts + (no-win ∧ shipped_code=true).
  status: pending
  bench_deltas: {}                  # {benchmark: {from: X.XXXs, to: Y.YYYs, pct: Z}}
  regressions: []                   # list of benchmarks that regressed
  shipped_code: false               # true if round landed code changes to production
  commit: null                      # optional metadata; derivable via
                                    # `git log --grep='^round N \['`

# --- revert autopsy (required iff status=revert) ---
revert_class: null                  # cost-model-error | compose-failure | data-premise-error |
                                    # correctness | scope-breach | null
revert_root_cause_location: null    # file:line or module
revert_cost_model_delta: null       # predicted vs actual, numerical
revert_prevention: null             # what gate would have caught this pre-commit

# --- ledger update (Step 7) ---
ledger_update:
  classes_touched: []               # list of hypothesis classes whose counters changed
  new_class_introduced: null        # name of new class if applicable
