# R136: ack hang debug — ruled out numeric-conv AND slot-overlap as root cause.
#       Bug is in pure Tier 2 emit for recursive-self 2-param int protos,
#       predates numeric-conv, surfaced by R132 gate opening.
round: 136
date: 2026-04-19
follows: 135

type: diagnostic

target:
  benchmark: ackermann

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R134 found B=0 bytecode wasn't the root cause; R133 hypothesized
    slot overlap in the inline-form `return f(g(), h())`. R136 tests
    that hypothesis by adding an explicit scratch-reg + MOVE in the
    bytecode compiler to separate inner-call result slot from outer-
    call arg slot. Then widens the gate to np>=2 and re-runs ack.

  expected_gain_pct: [-30, -15]   # if slot overlap was the cause

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25

pre_flight:
  required:
    - description: methodjit + vm suites green
      acceptance: ok
      halt_on_fail: true
  result: >
    Compiler change applied (compileCallExprMulti emits OP_MOVE
    from scratch to argReg for nested Call/MethodCall args). Ack
    bytecode post-R136 has clean separation:
      [022] CALL R5 B=3 C=2   (inner → R5, scratch)
      [023] MOVE R4 R5        (inner result → outer arg2 slot)
      [024] CALL R2 B=3 C=0   (outer tail)

    Re-opened np>=2 gate. ack(3,4) STILL HANGS (>30s). Slot
    overlap was NOT the root cause.

    Further bisection inside the JIT:
      (a) Disable numeric BL for np>=2 callers (force regular BLR
          for inner call) — STILL HANGS. Bug not in numeric-BL.
      (b) Disable pass-2 emit for np>=2 (no t2_numeric_self_entry_2
          label) → causes Tier 2 compile to fail with "unresolved
          label" since caller still tries to BL it. Partial.
      (c) Disable BOTH numeric BL at call site AND pass-2 emit for
          np>=2 — pure Tier 2 ack (no numeric-conv at all) —
          STILL HANGS.

    Conclusion: the bug is in PURE Tier 2 emit for 2-param
    recursive-self int protos. R121-R135 numeric-conv work is
    innocent. The pre-R132 shouldPromoteTier2 policy hid this bug
    by never promoting such protos. R132 opening the gate just
    for np==1 accidentally kept ack safe; widening to np>=2
    triggers the latent bug.

    Gate reverted to np==1. All R136 debug JIT paths reverted.
    Shipping only the compiler scratch-reg + MOVE change (cleaner
    bytecode; no net effect for np==1 ack and neutral for fib).
  passed: false   # hypothesis disconfirmed

  surgical_scope: >
    internal/vm/compiler.go: compileCallExprMulti emits nested
    Call/MethodCall args via scratch-reg + MOVE (keeps inner
    call's result slot distinct from outer's arg slot — good
    bytecode hygiene even without fixing ack).

verify:
  result: >
    fib bench 7-sample median: 0.926s (R134: 0.943s, neutral /
    slight improve within noise — my compiler path doesn't fire
    for fib since fib's body has no Call-as-Call-arg pattern).
    TestR107_TailCall_Ackermann: PASS (gate np==1, ack stays
    Tier 1, so test's compareTier2Result just compares Tier 1
    vs VM).

current_state_audit_summary: |
  # Experiments ruling out slot overlap as root cause:

  # Ack bytecode AFTER R136 compiler change (inline form):
  #   [018] GETGLOBAL R5 K0     ; inner fn at R5 (FRESH, not R4)
  #   [019] MOVE R6 R0          ; inner arg 1
  #   [020] LOADINT R8 1
  #   [021] SUB R7 R1 R8        ; inner arg 2
  #   [022] CALL R5 B=3 C=2     ; inner → R5
  #   [023] MOVE R4 R5          ; inner result to outer arg slot
  #   [024] CALL R2 B=3 C=0     ; outer tail
  #   [025] RETURN R2 B=0

  # With gate open (np<=2), ack STILL hangs → slot overlap wasn't it.
  # With numeric-BL disabled for np>=2, ack STILL hangs → not numeric.
  # With pass-2 emit disabled for np>=2, caller BL to
  #   t2_numeric_self_entry_2 is unresolved → Tier 2 compile fails
  #   altogether, ack falls back to Tier 1 (works, but defeats point).
  # With BOTH disabled, ack STILL hangs → bug in pure Tier 2 emit.

outcome:
  status: adr-win
  shipped_code: true
  primary_finding: >
    Tier 2 emit for 2-param recursive-self int protos (any, not
    just numeric) has a latent bug. PRE-EXISTING — surfaced only
    when R132's gate started promoting such protos. The numeric-
    conv arc (R121-R130) is innocent of the ack hang.
  shipped_artifact: >
    Bytecode compiler scratch-reg + MOVE for nested Call/MethodCall
    args. Cleaner bytecode, no overlap between inner-result and
    outer-arg slots. No bench regression. Doesn't fix ack (bug
    is deeper) but good hygiene now that we know slot shapes
    matter for JIT emit correctness.
  notes: >
    Next-round direction for ack:
      - Bisect pure-Tier2 (no numeric-conv) emit for 2-param self-
        recursive protos. Candidate locations:
          (1) emit_call_native.go emitCallNative's tail-call path
              for 2-arg ack's outer call
          (2) regalloc for crossBlockLive with 2 int params
          (3) GuardType emit interaction with 2-param entry
          (4) emitSpillSelectiveForCall's handling when both
              params are simultaneously live across a call
      - A fruitful experiment is to force-compile a MINIMAL
        2-param self-recursive proto at Tier 2 in a Go test,
        with fast red→green repro (rule 26).

    Per user direction ("待会继续修复这个hang的bug"), defer the
    deeper fix. Next round: retry R131 Layer 4 (raw int return)
    under live Tier 2 — that R131 revert was measured on dead
    code and the claimed regression may have been noise.
