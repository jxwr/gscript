# R93: store-to-load forwarding for OpGetTable after OpSetTable on same SSA (obj,key).
round: 93
date: 2026-04-19
follows: 92

type: tactical

target:
  benchmark: fannkuch
  current_wall_sec: 0.048
  reference_wall_sec: 0.048
  luajit_wall_sec: 0.020
  gap_factor: 2.40

hypothesis:
  class: tier2-typed-array-ic    # reuse; technically more load-elim
  claim: >
    pass_load_elim already forwards SetField→GetField and CSE's
    GetGlobal/MatrixFlat/MatrixStride. But GetTable (dynamic-key
    table access) has no forwarding. fannkuch B22 has the exact
    pattern: SetTable(v3, v155, v140); GetTable(v3, v155). Forward
    v140 directly → DCE eliminates the redundant GetTable.
  expected_gain_pct: [0, 3]
  expected_gain_mechanism: >
    Fannkuch B22 GetTable executes ~362K times (outer loop N=9).
    Each GetTable ≈ 15 insns. Save 5M insns ≈ 0.4ms on 48ms base.
    Plus ARM64 absorption risk.
  counterfactual_check: >
    sieve/sort don't have a SetTable→GetTable on same key pattern
    — no benefit there. matmul_dense uses MatrixSetF/GetF, not OpGetTable.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  current_state_audit_performed: true
  current_state_audit_summary: >
    Read pass_load_elim.go — no OpGetTable or OpSetTable case.
    Warm fannkuch IR confirms B22 pattern:
      v141 = SetTable v3, v155, v140
      v143 = GetTable v3, v155   (always receives v140)

pre_flight:
  required:
    - description: methodjit suite green
      acceptance: ok
      halt_on_fail: true
  result: >
    Suite green. Bench (10 interleaved):
      fannkuch:     r91 0.0475 → r93 0.0475 (same median, but min 0.046 more often in r93)
      sort:         r91 0.055 → r93 0.055 (same)
      sieve:        r91 0.086 → r93 0.085 (-1.2%)
      matmul_dense: 0.035 → 0.035 (same)
      nbody_dense:  0.184 → 0.184 (same)
    Sieve slight improvement — probably because even though the
    hot mark loop doesn't fit the pattern, secondary paths (maybe
    in counting loop via some optimization) benefit.
  passed: partial

outcome:
  status: adr-win
  bench_deltas:
    sieve: {r91: 0.086, r93: 0.085, pct: -1.2}
    fannkuch: {r91: 0.0475, r93: 0.0475, pct: 0.0}
  regressions: []
