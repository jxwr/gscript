# R170: Self-TCO pre-flight — prototype emit shipped, halt condition
#       triggered. Cost model in R169 ADR was wrong by ~30x.
round: 170
date: 2026-04-21
follows: 169

type: tactical

target:
  benchmark: ackermann
  current_wall_sec: 0.395
  reference_wall_sec: 0.416
  luajit_wall_sec: 0.0064
  gap_factor: 62

hypothesis:
  class: tier2-recursion-closure
  claim: >
    A minimal emitCallNativeTailSelf (~40 LOC: scratch-reg arg
    resolve + STR to regs[0..N-1] + B blockLabelFor(fn.Entry)),
    gated on (tailCallInstrs[id] && HasSelfCalls && isStaticSelfCall),
    will drop ack by >=15% per R169 ADR halt condition #1.
  expected_gain_pct: [15, 40]
  expected_gain_mechanism: >
    R169 cost model: ~50 insns saved per tail call x 2.6M calls
    / (3 IPC x 4GHz) ~= 11ms on a 395ms baseline = 2.8% lower bound;
    upper bound via I-cache/BTB wins estimated 20-40%.
  counterfactual_check: >
    fib has no tail calls -> unchanged. mut_recursion is cross-proto
    not static-self -> unchanged. Only ack tail calls are candidates.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.33
  mitigation_required: false

pre_flight:
  required:
    - description: Build + methodjit tests green with fork active
      acceptance: go test ./internal/methodjit passes
      halt_on_fail: true
    - description: 5-sample ack median with Self-TCO shows >=15% drop
      acceptance: selftco_median <= 0.336s (baseline 0.395s * 0.85)
      halt_on_fail: true
  result: |
    Prototype landed in-tree (emit_call_native_tailself.go, ~40 LOC)
    and 3-way fork wired in emitOpCall. Build clean. methodjit tests
    pass. Correctness OK: ack(3,4) = 125.

    Asm code-size measurement (proxy for insn-level savings):
      baseline (no selftco fork):  618 insns in ack body
      with    Self-TCO  fork   :  430 insns in ack body
      delta  : -188 insns per ack body (-30% code-size)
      i.e. each tail-call OpCall went from ~55-insn emit to ~5-insn.

    5-sample wall-time medians:
      baseline (no Self-TCO):  0.416, 0.390, 0.394, 0.393, 0.389s -> 0.393s
      with    Self-TCO     :  0.391, 0.393, 0.390, 0.391, 0.390s -> 0.391s
      delta: -0.5% (0.002s).

    Halt condition #1 triggered: 0.5% << 15%. Cost model was wrong
    by ~30x.

    Root cause (hard rule #8 restated):
      The 188-insn asm savings per ack body DID NOT translate to
      wall-time because M4 is 6-8-wide superscalar and the removed
      insns (IC lookup, bounds check, CallCount inc, ctx setup,
      epilogue/prologue) were already running in parallel with the
      dependent tail-call chain. The tail-call chain's critical path
      is dominated by the inner-call BLR, the Return unwinds, and
      GuardType re-checks at B0 — NONE of which Self-TCO removes.
      R107's frame-replacing BR + R110's static-self + R111's
      CallMode/GlobalCache-skip already captured essentially all of
      the serialized-on-critical-path work.

    Why R169 ADR was wrong:
      ADR assumed "~50 insns saved x 2.6M calls / (3 IPC x 4GHz) =
      ~11ms". That arithmetic treats insns as serial-on-critical-path
      work. On M4 the REMOVED insns are mostly off-critical-path
      (ctx-setup STRs, CallCount LDR+ADD+STR, bounds-check CMP+BCond
      all sit on non-dependent chains). Actual wall-time reduction
      = (on-critical-path insns removed) / (3 IPC x 4GHz) ~= 2ms.

  passed: false

outcome:
  status: no-win
  shipped_code: false
  bench_deltas:
    ackermann: {from: 0.393s, to: 0.391s, pct: -0.5}
  regressions: []
  commit: null

revert_class: cost-model-error
revert_root_cause_location: docs-internal/decisions/adr-self-tco.md (§Context, §Decision)
revert_cost_model_delta: predicted 15-40% drop, actual 0.5% drop (30-80x over-estimate)
revert_prevention: |
  Rule 8 (IR-insn != wall-time) applies to asm insns too. Future
  cost models for emit-pass changes MUST distinguish:
    (a) on-critical-path insns (chain-breaking LDR, CBZ, dependent
        CMP+BCond) -- these count ~1:1 against IPC budget.
    (b) off-critical-path insns (independent STR, ADD, LDR that the
        OoO engine can retire in parallel) -- these count ~0:1.
  The R169 ADR counted ALL ~50 removed insns as (a). Post-hoc
  analysis shows 80-90% were (b). Correct a-priori arithmetic would
  have predicted ~1-2% wall-time drop, which would have failed the
  15% halt gate at design review, saving R170 entirely.

ledger_update:
  classes_touched:
    - tier2-recursion-closure
  new_class_introduced: null

notes: |
  Revert is clean: fork code removed, prototype file deleted, imports
  restored, tree green. Zero production code changed.

  Session 5 halts HERE. R169 ADR is retained as negative evidence:
  "Self-TCO is architecturally sound but does not move ack on M4
  because R107+R110+R111 already captured the critical-path savings."

  Remaining Session 5 budget (R171-R182, 12 rounds) RETURNED. Use for
  future arcs where cost models pass the (a)-vs-(b) filter.

