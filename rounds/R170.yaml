    2. Trace JIT scaffolding (only path to close fib/ack < 5x LuaJIT;
       method-JIT is at its limit for call-dominated shapes).
    3. New benchmarks (string_bench measurements vs LuaJIT).
  None of these fit the Session-5-style short arc; each is multi-
