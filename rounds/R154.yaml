  #       moderate-depth loop. Net +16% regression.
  #    c) A latent Tier 2 for-loop emit bug infinite-loops on
  #       transform_chain's "mutate-through-reassignment" shape.
  #       This bug exists but was never exposed because the gate
  #       blocked the proto.
  #
  # 2. Cluster D ("inline-gated promotion") is ELIMINATED as a
  #    target. The R151 scout's framing was wrong; the R152 pivot
  #    guessed at a narrower variant; R154 measured and proved
  #    neither direction yields a win.
  #
  # 3. The latent for-loop emit bug (exposed at R154-pre-flight-#2)
  #    is real and actionable. If someone wants to spend 2-3
  #    rounds debugging the loop counter emit for Tier 2
  #    transform_chain-shape, that's a correctness improvement
  #    worth doing INDEPENDENT of any gate widen. Not a perf arc.
  #
  # 4. Remaining paths for surpassing LuaJIT on compute / table-
