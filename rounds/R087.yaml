    of 5 runs), as are sieve/fannkuch/mandelbrot/matmul_dense
    (within noise).
  passed: partial  # infra works, perf doesn't move

  failing_test: sort bench gate (soft — halt_on_fail: false)
  failing_output: "sort median 0.051s vs target <0.048s"
  surgical_scope: pass_typespec.go inferType (single case + helper already existed)
  ir_diff_before: "v19 = Le v17, v8 : bool (v17,v8 : any)"
  ir_diff_after:  "v19 = Le v17, v8 (v17,v8 : int) — in diag IR still Le because diag skips execution; IN THE REAL RUN the IR has LeInt per fannkuch probe"
  bisect_range: "pass_typespec.go inferType OpGetTable case"

outcome:
  status: adr-win
  bench_deltas: {}          # no movement beyond noise
  regressions: []
  shipped_code: true         # correctness-enabling infrastructure
  commit: null
  deliverables:
    - internal/methodjit/pass_typespec.go — inferType OpGetTable case consults Aux2 Kind
    - internal/methodjit/pass_typespec_gettable_test.go — 3 unit tests (Int/Float/Mixed)
    - internal/methodjit/r87_fannkuch_spec_test.go — integration test proving real-bench specialization fires
    - rounds/R087.yaml — this card

revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: >
  Hypothesis predicted 10-25% sort gain. Actual: 0%. Root cause
  found at emit_dispatch.go:132-137 — OpLe and OpLeInt dispatch to
  the SAME emitIntCmp helper. emitIntCmp uses resolveRawInt which
  auto-detects raw-int registers; same code path regardless of
  typed vs generic op. The type information is currently unused by
  emit.

  To realize perf gain, need a FUTURE round that adds a genuine
  fast-path for OpLeInt (e.g., skip some setup, use SBFX variant,
  or add a CMP-fusion pass that trusts OpLeInt's type guarantee).

  R87 is still valuable — it's the TYPE INFORMATION layer that a
  future optimization can leverage. Analogous to R82 L2 (GuardType
  infrastructure shipped with no immediate bench, consumed later).
revert_prevention: >
  Before claiming gain: in the current-state audit, verify the
  target op's emit path actually differs from the generic variant.
  A type-specialized IR op that dispatches to the same emit is
  correctness-only, not perf. This specific check (grep emit
  dispatch for `case OpX, OpXInt:` patterns) is cheap and prevents
  overestimate.

ledger_update:
  classes_touched: [tier2-typed-array-ic]
  new_class_introduced: tier2-typed-array-ic
  sub_pattern_learned: >
    For Tier 2 perf rounds: type-specialized IR op ≠ faster emit.
    Verify emit dispatch distinguishes before predicting gain.

    Runtime IntDense infrastructure is all in place for sort/sieve/
    fannkuch. Gap to perf is in EMIT layer, not TypeSpec layer. R87
    unblocks the type info; R88+ can use it to bypass emitIntCmp's
    generic setup when OpLeInt is known.

notes: >
  Scope collapse from 10 rounds → 1 round was correct per audit.
  Perf prediction was wrong — emit dispatch doesn't split on
  type-specialized ops. This matches R82 L2's pattern (infra first,
  perf later).

  Next (R88+) candidates:
    (a) Split emit_dispatch so OpLeInt/OpEqInt get a dedicated
        fast-path helper that skips generic tag-check
    (b) CMP-fusion pass that eliminates CSET+ORR materialization
        when followed by OpBranch (already exists via fusedCmps —
        need to verify it fires for OpLeInt too)
    (c) Fannkuch has 6 R87-enabled specializations — if (a) moves
        each one by ~3 insns, total ~18 insns saved per main loop
        iter, estimated -5-10% on fannkuch
