# R87: TypeSpec infers result type from OpGetTable Aux2 Kind feedback.
round: 87
date: 2026-04-19
follows: 86

type: architecture

target:
  benchmark: sort
  current_wall_sec: 0.052
  luajit_wall_sec: 0.011
  gap_factor: 4.73

hypothesis:
  class: tier2-typed-array-ic
  claim: >
    IntDense runtime infrastructure already exists end-to-end. The
    single missing link: TypeSpec doesn't consult OpGetTable.Aux2
    (Kind feedback) to infer loaded element's IR type. One inferType
    case (pass_typespec.go) enables existing OpLe(int,int)→OpLeInt
    cascade.

    Expected: sort 0.052s → ~0.040-0.045s (-15-20%).
  expected_gain_pct: [10, 25]
  expected_gain_mechanism: >
    OpLeInt uses raw-int compare (~3 insns) vs generic OpLe's tag-check
    + FCMP fallback. For sort's O(N²) compare, dominant cost savings.
  counterfactual_check: >
    If feedback.Kind is not populated at Tier 2 compile time, fix is
    no-op. If OpLe and OpLeInt share the same emit, no perf gain
    even with inference firing.

