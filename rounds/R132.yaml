# R132: unblock Tier 2 promotion for purely-self-recursive 1-param int
#       protos → fib activates, -39% bench-win, 54× LuaJIT gap → 33×.
round: 132
date: 2026-04-19
follows: 131

type: architecture

target:
  benchmark: fib
  also_measured: [ackermann, mutual_recursion]

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R131 found that fib/ack/mut never reach Tier 2. Root cause is in
    `shouldPromoteTier2` (func_profile.go:170-172):

      if profile.CallCount > 0 && !profile.HasLoop {
          return false
      }

    The policy rejected ANY function with calls and no explicit loop.
    fib/ack/mut are recursive-self — they have OpCall but no OpJump
    back-edge, so the rule classed them as "calls without loops" and
    kept them at Tier 1. That was deliberate once upon a time (Tier 1
    BLR is ~10ns per call), but it also deleted the entire payoff of
    the numeric-conv arc R121-R130.

    R132 adds a narrow exception: a proto that calls ONLY itself (no
    other globals) AND qualifies for the numeric calling convention
    (qualifyForNumeric: 1-4 int params, no upvals, no nested protos)
    AND has exactly 1 param → promote at runtime call count ≥ 2.

    The 1-param gate is a temporary safety rail — 2-param (ackermann)
    hangs on first promotion (user confirmed by killing the run);
    `emitNumericArgsInRegs`'s reg-aliasing swap path for np==2 needs
    independent debugging. The "only self" gate avoids mut_recursion's
    F/M (which would promote via self-recursion but ALSO cross-call,
    and the mixed numeric-BL + normal-BLR Tier 2 emit regressed
    mut_recursion +81% in a first attempt).

  expected_gain_pct: [-30, -20]   # Predicted fib range
  expected_gain_mechanism: >
    Activating Tier 2 for fib lets the numeric-conv arc run:
      - pass-2 entry takes raw int via X0 (no NaN-box at call-site, no
        unbox at param load)
      - skip TypeInt GuardType on param-loaded values
      - Tier 2's SSA-optimized body is overall tighter than Tier 1's
        bytecode dispatch
    Combined savings per recursion level are ~20-30 cycles. fib does
    ~29M recursive calls.

  counterfactual_check: >
    Correctness: fib(35)=9227465, methodjit suite green. ack/mut
    unchanged (stay Tier 1).

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.333
  mitigation_required: true
  mitigation_description: >
    Ledger's "blocker: tier2-promotion-never-triggers-for-recursive-
    self-protos" (set R131) addressed by this round — the class is no
    longer fully blocked, but 2/3 targets (ack, mut) still stuck.

pre_flight:
  required:
    - description: methodjit suite green
      acceptance: ok
      halt_on_fail: true
    - description: fib/ack/mut correctness
      acceptance: existing correctness tests continue to pass
      halt_on_fail: true
  result: >
    Methodjit suite green (one test updated: TestShouldPromoteTier2
    _RecursiveFib was codifying the pre-R132 policy and has been
    inverted to match the new policy). fib(35)=9227465 correct,
    ack(3,4)=125 correct, F(25)=16 correct.
  passed: true

current_state_audit_summary: |
  # Before R132 (R131 state):

  $ gscript -jit-stats benchmarks/suite/fib.gs
    Tier 2 compiled: 0 functions         ← fib DEAD CODE target

  # shouldPromoteTier2 (func_profile.go:170-172) pre-R132:
    if profile.CallCount > 0 && !profile.HasLoop {
        return false                      ← fib falls here → NEVER promoted
    }

  # R132 edit:
    if profile.CallCount > 0 && !profile.HasLoop {
        if staticallyCallsOnlySelf(proto) {
            if ok, np := qualifyForNumeric(proto); ok && np == 1 {
                return runtimeCallCount >= 2
            }
        }
        return false
    }

  # After R132:
  $ gscript -jit-stats benchmarks/suite/fib.gs
    Tier 2 compiled: 1 functions
      - fib                              ← ACTIVE

verify:
  result: >
    fib 9-sample median times (sorted, s):
      0.852, 0.853, 0.853, 0.855, 0.858, 0.859, 0.875, 0.877, 0.878
      → median 0.858s (pre-R132: 1.411s).  DELTA: -39.2%

    ack 9-sample median: 0.262s (pre-R132: 0.256s, within noise).
    mut 9-sample median: 0.187s (pre-R132: 0.183s, within noise).

    LuaJIT gap:
      fib: 54.3× → 33.0× (-39% in gap)
      ack: 42.7× → 43.7× (unchanged; stays Tier 1)
      mut: 45.8× → 46.8× (unchanged; stays Tier 1)

    Sanity on other benches (fannkuch, sort, sieve, mandelbrot,
    nbody_dense, matmul_dense, spectral_norm_dense): all within
    prior baselines. No cross-contamination.

outcome:
  status: bench-win
  shipped_code: true
  primary_win_bench: fib
  primary_win_pct: -39.2
  notes: >
    **First REAL bench-win of the numeric-conv arc.**

    The R121-R130 emit code was correct all along — it was just never
    reached. R132's ~30-line gate edit + new `staticallyCallsOnlySelf`
    helper unlocks ~40% on fib.

    Remaining work in this class:
      - R133+: debug the 2-param numeric entry path so ack (the ONLY
        purely-self-recursive 2-param proto in bench suite) can
        promote. emitNumericArgsInRegs has reg-aliasing swap paths
        for np==2 (emit_call_native.go:564-587) that have never run.
      - Mutual-recursion F/M cannot benefit from numeric-conv
        directly (cross-proto BL would need a whole-program
        convention). Separate thread.
      - Layers 4-5 (raw int return + deopt boxing) attempted in R131
        but reverted for noise-level regressions — those regressions
        may have been noise masking a real gain now that Tier 2 is
        live. Re-attempt post-ack-fix.
