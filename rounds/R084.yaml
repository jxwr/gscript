revert_cost_model_delta: >
  All three Option 1 variants regress at least one major bench. The
  feedback/Tier1 coupling is architectural, not a simple threshold
  knob. Option 1's premise ("5x warmup is free amortized") is false
  for single-entry compute functions.
revert_prevention: >
  Before proposing Option 1 as the fix, should have enumerated
  benchmark call patterns:
    - multi-call inner functions (fib, quicksort recursive): threshold
      can be raised safely (amortized)
    - single-call compute-heavy (matmul, mandelbrot, leibniz_pi):
      threshold MUST stay 1 or bench explodes
  Any uniform change affects both. No simple profile gate distinguishes
  them because the INNER loop body shape doesn't encode "how many times
  will I be called."

ledger_update:
  classes_touched: [correctness-bug-fix]
  new_class_introduced: null
  sub_pattern_learned: >
    Option 1 (uniform or profile-gated threshold) is a DEAD END for
    BLOCKER-A. The premise — "more interpreter iterations fill
    feedback cheaply" — is false for gscript's benchmark mix where
    many benches have a single-entry compute loop that MUST reach
    Tier 2 on call 1.

    The correct next path is Option 2 (Tier 1 fast-path feedback
    updates) — adds 2-3 insns per OP_GETTABLE/GETFIELD to the Tier
    1 native emit. Estimated cost: 5-10% Tier 1 code size increase;
    <3% runtime per op; feedback populated by the time Tier 2
    compiles.

    Option 2 is still multi-round work but is THE ARCHITECTURALLY
    CORRECT fix for the feedback/Tier1 coupling.

