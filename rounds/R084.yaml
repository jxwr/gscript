hypothesis:
  class: correctness-bug-fix
  claim: >
    Try narrower Option 1 variant: per-proto threshold based on
    profile. Functions with OP_GETTABLE/OP_GETFIELD get threshold=2;
    compute-only functions keep threshold=1. Expected: quicksort
    (has OP_GETTABLE) gets warmup feedback; matmul_dense (no direct
    field ops in inner loop) keeps fast path.
  expected_gain_pct: [0, 0]
  expected_gain_mechanism: null
  counterfactual_check: >
    matmul_dense's matmul function reads arr via matrix.getf which
    compiles to OP_GETGLOBAL + OP_GETFIELD (matrix.getf fieldpath) +
    OP_CALL. So TableOpCount > 0 even though hot loop has no direct
    indexing. Threshold=2 blocks matmul's immediate Tier 1, regressing
    50x on compute.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.20
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Explored 2 variants of Option 1:

    1. Uniform threshold=5 (R83): 12-50x regressions on matmul_dense,
       mandelbrot, spectral, math_intensive, sieve. Reverted.

    2. Profile-gated threshold=2 when TableOpCount>0 (R83b): still
       regresses matmul_dense 50x because OP_GETFIELD from matrix.getf
       bumps TableOpCount. Reverted.

    3. Further narrowing (OP_GETTABLE only, excluding GETFIELD): not
       attempted; likely to have similar problems (nbody uses GETFIELD
       heavily; sieve has GETTABLE; etc).

    The fundamental issue: feedback population requires interpreter
    execution, but Tier 1 takes over on call 1 bypassing interpreter.
    Raising the threshold forces interpreter execution, but interpreter
    is 10-50x slower than Tier 2 for compute-heavy functions. Any
    function that runs a long inner loop on call 1 suffers.

    Correct fix requires decoupling feedback collection from
    interpreter/Tier1 dichotomy:
      - Option 2: Tier 1 native updates feedback on fast paths (2-3
        extra insns per OP_GETTABLE/GETFIELD — doable but adds code
        to the Tier 1 hot path)
      - Option 3: dedicated "warmup" tier that runs Tier 1 WITH
        mandatory feedback recording (architectural refactor)
      - Option 4 (new): OSR-style recompile when feedback changes
        mid-execution (promotion to Tier 2 is per-loop via OSR, but
        could be extended to "recompile on feedback delta")

    None fit into R84's scope.

