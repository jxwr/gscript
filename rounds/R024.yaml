  findings: >
    matmul inner loop feedback (PCs 24, 28):
      GETTABLE L=unobs R=unobs Res=FLOAT Kind=Float

    These are ai[k] and b[k][j] — the two GetTables whose results
    feed the Mul. BOTH have Res=float, so the existing
    feedbackToIRType(fb.Result) branch in graph_builder.go ALREADY
    inserts OpGuardType TypeFloat. typespec rewrites OpMul to
    OpMulFloat. emit picks the raw-FPR fast path.

    ==> R23's Kind-based fallback would fire on ZERO matmul sites.
    ==> R23's spot-check regression (8-12%) was NOISE, not signal.

    matmul intermediate GetTable (pc=26, b[k]) has Res=unobs,
    Kind=Mixed. Returns a TABLE (not float). No guard would apply.

    nbody energy(): ALL 8 GETFIELD sites (pc=9,11,12,14,15,18,19)
    have Res=FLOAT. All already get GuardType TypeFloat via the
    existing path. Specialization cascade should already be active.

    STRUCTURAL CONCLUSION:
    The tier2-tight-loop class's 5-8× LuaJIT gaps are NOT primarily
    a typespec-propagation issue. The existing infrastructure already
    types + specializes these sites in production. The residual gap
    comes from elsewhere:
      - Nested-table memory pattern (matmul table-of-tables).
      - Per-iteration table pointer refresh (ai[k] loads row-table).
      - 4-way arrayKind dispatch inside emit_table_array fast path.
      - Cache-unfriendly access pattern (column walks in b[k][j]).

    This reshapes the R21 ADR: the big wins are NOT in typespec.
    They are in:
      (a) eliminating nested-table dereferences via LICM hoisting
          of b[k] into row-register (partially done; check loops.go).
      (b) replacing arrayKind dispatch with per-site IC (R19 ADR
          dependency).
      (c) dense layout for table-of-tables (architectural; big
          change).

    nbody similarly: GETFIELD is fast; the gap is multi-level
    struct-of-scalar patterns that LuaJIT can trace through.

  unresolved: >
    The IR-level ADR projection (matmul 5.5× → 3.3×) was based on
    assuming typespec was the bottleneck. With this new data, the
