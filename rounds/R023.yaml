hypothesis:
  class: tier2-tight-loop
  claim: >
    Per R21 ADR: extend graph_builder.go's GetTable emission to insert
    OpGuardType with kind-derived element type (TypeFloat for
    FBKindFloat, TypeInt for FBKindInt) when fb.Result is not directly
    observed but fb.Kind is monomorphic. This should propagate type
    info into downstream Mul/Add, enabling typespec to rewrite them
    into OpMulFloat/OpAddFloat and emit's raw-FPR fast path.
    Projected: 40% gain on matmul/nbody/spectral_norm.
  expected_gain_pct: [20, 40]
  expected_gain_mechanism: >
    GuardType TypeFloat costs ~4 insns per GetTable. Raw-FPR downstream
    saves ~6-8 insns per Mul/Add (skip FMOVtoFP, tag checks, FMOVtoGP).
    If ratio of arith-ops-to-gets is ≥2:1, net win.
  counterfactual_check: >
    Matmul inner loop: 3 GetTables + 1 Mul + 1 Add per iteration. Net
    ≈ (+4×3) - (+7×2) = +12 - 14 = -2 insns per iter. Break-even.
    Needed a better ratio or smarter guard insertion (only when
    downstream consumes as float).

