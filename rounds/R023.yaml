revert_class: cost-model-error
revert_root_cause_location: "internal/methodjit/graph_builder.go OP_GETTABLE"
revert_cost_model_delta: >
  Predicted: per-Mul savings (~6-8 insns) outweigh per-Get guard
  overhead (~4 insns) when Mul count ≥ Get count. Actual: matmul
  inner loop has Gets-to-Mul ratio of 3:1 (v31 = ai[k], v33 = b[k],
  v35 = v33[j], then v36 = v31*v35). Per-iteration delta is net
  NEGATIVE unless the guard can be ELIDED when it's redundant
  (e.g. value is already TypeFloat by construction) or the downstream
  specialization cascade is larger (e.g. compound arith chain, not
  just one Mul).

  ADR's 40% projection didn't account for this ratio.
revert_prevention: >
  Future tier2-tight-loop work needs:
    (a) A "demand-driven" guard insertion that only guards values
        actually consumed by arith ops (skip guards on table values,
        intermediate iterator values, etc.).
    (b) OR a typespec pass that can infer types DIRECTLY from Kind
        feedback without needing an explicit GuardType node in IR.
    (c) OR measure feedback coverage first: if matmul's inner-loop
        GetTables have fb.Result populated in production (as they
        probably do after warmup), the existing feedbackToIRType
        path already handles them. The Kind fallback may be
        redundant for the target benchmarks.

  Ledger mitigation added to tier2-tight-loop class.

ledger_update:
  classes_touched: [tier2-tight-loop]
  new_class_introduced: null
  sub_pattern_learned: >
    "Every GetTable gets a guard" is the wrong granularity. Guard
    insertion must be demand-driven (only when downstream needs the
    type) to avoid paying guard cost on values consumed by
    non-specializing ops (table-valued GetTables, iterator vars, etc.).
    Applies across all tier2-tight-loop future work.
