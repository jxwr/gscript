design_adr: >
  ## Numeric Calling Convention — full design

  ### Qualification (proto-level, compile-time)
  A proto "qualifies for numeric" if ALL:
    - NumParams ∈ {1, 2, 3, 4}
    - len(Upvalues) == 0
    - len(Protos) == 0 (no nested closures)
    - (Future R123) return flow proves all Return sites produce
      TypeInt-resolvable values after TypeSpec.
    - (Future R123) all param uses in the body are through paths that
      accept int (inserted GuardType is the only enforcer currently).

  ### Compilation (R122)
  For qualifying protos, Tier 2 compile produces TWO bodies in one
  CodeBlock:
    [offset=0]      Normal body — current emit, NaN-boxed args/return.
                    Entry: t2_direct_entry, t2_self_entry.
    [offset=NE]    Numeric body — raw int args in X0-X3, raw X0 return.
                    Entry: t2_numeric_direct_entry,
                           t2_numeric_self_entry_N (N = NumParams).

  CompiledFunction adds:
    - NumericDirectEntry int (byte offset into Code; 0 = no twin)
    - NumericParamCount int (1-4; 0 if no twin)

  ### Body differences for numeric
  1. Param LoadSlot: emit to pre-populate rawIntRegs[v] = true, and
     load raw int directly (source depends on entry-prologue
     convention; see below).
  2. GuardType for params: skip (already known int).
  3. Return: store raw int to X0, skip NaN-box, skip regs[0] write,
     skip ctx.BaselineReturnValue write. Branch to
     t2_numeric_epilogue (restore callee-saved + RET).
  4. Deopt from numeric body: all live rawIntRegs values must be
     NaN-boxed before exit-resume. Implementation: deopt-time box
     helper takes the rawIntRegs set and emits ORR+STR to regs[].

  ### Caller dispatch (R124)
  At OpCall:
    - If isStaticSelfCall && proto.NumericDirectEntry != 0 &&
      NumParams match && all args are TypeInt/rawInt:
      use numeric path (BL t2_numeric_self_entry_N, raw args in
      X0..X(N-1), consume raw X0 return).
    - Else: existing path.

  ### Cross-tier interop
  Tier 1 callers: always use normal entry. Numeric twin is private
  to Tier-2-to-Tier-2 calls.

  ### Implementation phases
  R121 (this round): scaffolding + ADR.
  R122: numeric-body compile pipeline + emit numeric entry.
  R123: numeric Return emit + qualifyForNumeric return-flow check.
  R124: caller dispatch for static self-calls.
  R125: deopt boxing for numeric body.
  R126: test + bench + correctness gate on fib/ack/mut_rec.
  R127: close arc + next-direction notes.

  Projected combined gain: 20-40% on fib; similar on ack/mut_rec.
  Risk: R35-class regression on mutual_recursion if qualification
  is loose; mitigation: pre-flight bench gate all four call-heavy
  benches.

