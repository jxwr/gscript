  result: >
    Before fix: `emit_int_overflow_correctness_test.go:45: type/value
    mismatch: VM=2.1540729976763197e+18 (number), JIT=-54999090331011
    (number)` — red as expected.
    After fix: all 6 tests in TestTier2_IntOverflow_* pass.
  passed: true

  # v5.2 correctness fields (rules 26-29)
  failing_test: internal/methodjit/emit_int_overflow_correctness_test.go:TestTier2_IntOverflow_Loop_Matches_VM
  failing_output: "VM=2.1540729976763197e+18 (number), JIT=-54999090331011 (number)"
  surgical_scope: "emit_call.go:emitFloatBinOp (single function, int fast path only)"
  ir_diff_before: >
    Inner loop asm (diag/ov_min/_main_.asm.txt before fix):
      EmitUnbox X0
      EmitUnbox X1
      MUL X0, X0, X1     // raw int64 multiply — WRAPS on overflow
      EmitBoxIntFast X0  // NaN-tags the wrapped value → garbage
  ir_diff_after: >
    Inner loop asm (after fix):
      EmitUnbox X0
      EmitUnbox X1
      MUL X0, X0, X1
      SBFX X1, X0, 0, 48    // R77 +3 insns:
      CMPreg X1, X0         //   sign-extend low 48 bits
      BEQ int48_ok          //   compare; ok if fits
      ... emitDeopt ...     // else deopt → VM float-promotes
      int48_ok:
      EmitBoxIntFast X0
  bisect_range: >
    Fails at iter N >= 13 where x = 42 * 13^N + sum geometric series
    first exceeds 2^47 (int48 max). Triggering condition:
      (a) main has `profile.CallCount > 0` (outside-loop) OR
          shouldPromote fires via some other path → main reaches Tier 2
      (b) main has a loop with untyped int arithmetic (Mul/Add on
          GetGlobal-loaded values, no TypeSpec refinement)
      (c) arithmetic overflows int48 at some iteration.
    Outside this range (all-float ops, loop with print inside, main
    stays Tier 1), bug does not manifest.

