hypothesis:
  class: correctness-bug-fix
  claim: >
    emitFloatBinOp's "both int" fast path (emit_call.go:315-330) does
    MUL/ADD/SUB on unboxed int64 values WITHOUT the int48 overflow
    check that emitRawIntBinOp has. When the int arithmetic overflows
    48 bits, the wrapped int64 result gets NaN-tagged as int, producing
    a corrupt Value. Downstream consumers (including VM fallback via
    print) see a garbage integer instead of the correctly promoted
    float that Tier 1 produces.

    Fix: mirror the overflow check from emit_arith.go into emit_call.go's
    int fast path. On overflow, deopt to VM — which correctly promotes
    to float.
  expected_gain_pct: null           # correctness fix, not perf
  expected_gain_mechanism: >
    No wall-time gain expected. Actually a small wall-time REGRESSION
    possible from the added overflow check (3 insns per int arith on
    the untyped fast path). Measured: object_creation insn count +6%
    (1181→1253 / 1572→1677); other benches unchanged.
  counterfactual_check: >
    If the bug were elsewhere (deopt handler, storeResultNB, regalloc),
    the fix wouldn't work. Verified by the failing test flipping green
    + CLI repro returning correct 2154072997676319744.

