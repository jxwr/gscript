# First tactical win under v5. Direct follow-up to R8's hold.
round: 9
date: 2026-04-17
follows: 8

type: tactical

target:
  benchmark: multi                  # object_creation + binary_trees
  current_wall_sec: 1.057           # object_creation median-of-3 at R8 close
  reference_wall_sec: 0.764
  luajit_wall_sec: null
  gap_factor: null

hypothesis:
  class: runtime-allocation-path
  claim: >
    Bump-allocate `*Table` structs from a per-Heap slab of []Table backing
    blocks. Eliminates the per-NEWTABLE Go mallocgc cost for the Table
    struct across ALL call sites (Tier 0 interp, JIT interp mode, Tier 1
    exit, Tier 2 exit).
  expected_gain_pct: [5, 15]        # revised down from R8's [15, 30] after
                                     # microbench showed ~23 ns saved per alloc
                                     # (not dominated by the Table struct alloc
                                     # alone — array slice + other costs remain)
  expected_gain_mechanism: >
    R8 microbench: 33.93 → 10.72 ns/op (bump slab) with 1 → 0 allocs/op.
    Wall-time savings = (ns_saved × alloc_count). Applied at every
    NewTableSized / NewTable call site by modifying the constructors
    themselves — no JIT emit changes, no tier routing changes.
  counterfactual_check: >
    (1) Benchmarks that don't call NewTable should be untouched (sieve,
        fannkuch, mandelbrot, nbody, fibonacci_iterative). Risk: table
        backing block mallocgc causes GC pacing shift → spurious wins/
        regressions on non-allocation benchmarks.
    (2) tier-routing-gate composability: bump path is a constructor
        swap, not a tier change. Caller/callee tier assignments unchanged.
        R6 failure mode (Tier 1 → Tier 0 BLR cost) does not apply.
    (3) Correctness: *Table pointers taken from []Table backing are
        interior pointers. Go GC handles this correctly — backing stays
        live while any interior pointer is reachable.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0            # runtime-allocation-path: 1/1 hold, 0 reverts
  mitigation_required: false
  mitigation_description_cited: >
    Per R8's ledger update, pre-flight acceptance must be absolute
    wall-time framed, not per-alloc ratio. This round's pre-flight
    uses dual-clause criteria below.

pre_flight:
  required:
    - description: >
        Per-alloc microbench (reuse R8's table_bumpalloc_preflight_test.go)
        confirms bump path is at least 2× faster than current path.
      acceptance: bump_per_alloc_ns <= current_per_alloc_ns / 2.0
      halt_on_fail: true
    - description: >
        Wall-time back-of-envelope: (ns_saved × expected_allocs) must
        predict ≥5% gain on object_creation to justify full bench run.
        ns_saved ≈ 23. Object_creation does ~10M NEWTABLEs per 1s (from
        structure of benchmark — vec3 constructor per iteration). So
        ≈230 ms savings on a ~1s run ≈ 23% predicted. Well above 5%.
      acceptance: predicted_wall_pct >= 5
      halt_on_fail: true
  result: >
    Per-alloc: 33.93 → 19.14 ns/op after integration (1.77× ratio since
    the baseline ALSO now uses the bump path; vs the original 33.93 →
    10.72 microbench that's 3.17× — both exceed the 2× clause).
    Wall-time predicted: ≥5% on object_creation (calculation above).
  passed: true

outcome:
  status: win
  bench_deltas:
    # Median-of-5 JIT wall-time, pre-R9 vs post-R9 snapshot.
    object_creation: {from: 1.057, to: 0.990, pct: -6.3}
    binary_trees:    {from: 1.576, to: 1.391, pct: -11.7}
    table_field_access: {from: 0.042, to: 0.037, pct: -11.9}
    method_dispatch: {from: 0.097, to: 0.094, pct: -3.1}
    # Within-noise deltas (not claimed as wins):
    fibonacci_iterative: {from: 0.279, to: 0.290, pct: 3.9}   # borderline
    fannkuch: {from: 0.048, to: 0.047, pct: -2.1}             # noise
    sieve:    {from: 0.084, to: 0.084, pct: 0.0}              # unchanged
    nbody:    {from: 0.241, to: 0.244, pct: 1.2}              # noise
    mandelbrot: {from: 0.061, to: 0.060, pct: -1.6}           # noise
  regressions: []                   # fibonacci_iterative +3.9% is within historical noise band
  commit: pending

revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: >
  Predicted 5-15% on object_creation; measured -6.3% — within the lower
  end of the band. binary_trees got -11.7% (unpredicted bonus from R5
  interaction: Tier 0 `makeTree` now also pays 0 mallocgc per NEWTABLE).
revert_prevention: null

ledger_update:
  classes_touched: [runtime-allocation-path]
  new_class_introduced: null
  sub_pattern_learned: >
    Constructor-level allocator swaps propagate across ALL tiers
    automatically, which is why R9 won across Tier 0 + Tier 1 + Tier 2
    benchmarks with one change. Unlike tier-routing-gate (per-tier code
    change, fragile composition), allocation-path changes made in the
    runtime package are tier-agnostic. Record as a positive compose
    pattern: "runtime-level primitives compose upward; tier-level gates
    don't compose sideways."
