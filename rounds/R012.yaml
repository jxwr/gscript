# Correctness-first bug fix, surfaced by R11's diagnostic.
round: 12
date: 2026-04-17
follows: 11

type: tactical            # correctness work is a tactical code change

target:
  benchmark: sort           # the benchmark that surfaced the bug via diag
  current_wall_sec: null    # not a perf round
  reference_wall_sec: null
  luajit_wall_sec: null
  gap_factor: null

hypothesis:
  class: correctness-bug-fix
  claim: >
    `emitFloatBinOp` in emit_call.go:369 calls `emitDeopt` + `return`
    on the intBinMod case, leaving the forward-referenced `done` label
    unresolved. When Tier 2 tries to emit any function whose float-
    generic mod path routes through this case (e.g., make_random_array
    in sort.gs), finalize fails with `unresolved label "arith_done_N"`.
    Fix: remove the early `return` so control falls through to
    `Label(done)` below. The code after emitDeopt is dead at runtime
    (deopt branches to epilogue) but is required for label resolution.
  expected_gain_pct: null
  expected_gain_mechanism: >
    Enables Tier 2 compilation of functions previously blocked by the
    emitter bug. Wall-time impact varies — any benchmark with a %
    operator on potentially-float operands. R11's sort diagnostic
    flagged make_random_array specifically.
  counterfactual_check: >
    The fix is purely additive (removes an early return, keeps the
    label binding). Benchmarks that didn't depend on intBinMod are
    unaffected. Benchmarks that DID depend on it previously deopted
    at the emit stage; now they may successfully compile. No
    regression pathway exists.

