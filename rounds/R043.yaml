type: tactical

target:
  benchmark: matmul_dense
  current_wall_sec: 0.095         # R42 Phase 1 baseline
  reference_wall_sec: null
  luajit_wall_sec: 0.021
  gap_factor: 4.5                  # gap after R42

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    R42 Phase 1 gave -18% via shared flat backing. The remaining cost
    is the row-wrapper indirection: `m[i][j]` is two GetTable calls
    (ArrayMixed outer returns row Table; ArrayFloat inner returns
    float). R43 bypasses the row wrapper: new intrinsic
    `matrix.getf(m, i, j)` compiles to a 7-insn ARM64 sequence
    (extract ptr → guard dmStride!=0 → MUL i*stride → ADD j → LDR
     raw float64). Target: matmul_dense -40% beyond R42.
  expected_gain_pct: [40, 60]
  expected_gain_mechanism: >
    Per inner-loop access: old nested path ~13 insns vs new intrinsic
    ~7 insns. At 27M inner iter × 2 accesses = 54M ops × 6 insns
    saved = ~320M insns saved ≈ 150 ms.
  counterfactual_check: >
    Guard: dmStride == 0 → deopt. Non-DenseMatrix tables pay a
    5-insn guard per getf call (type check + CBZ). Users who don't
    call matrix.getf are unaffected (intrinsic only triggers on
    explicit callsite).

    Correctness: flat backing is the same memory as row wrappers'
    floatArray. Writes via matrix.setf update the same storage that
    `m[i][j] = v` would. Interp fallback delegates to Go helper.

