# R47: FMA fusion pass — FMADDd for Add(x, Mul(y,z)); Phi-accumulator pipeline skip.
round: 47
date: 2026-04-17
follows: 46

type: tactical

target:
  benchmark: matmul_dense
  current_wall_sec: 0.035
  luajit_wall_sec: 0.021
  gap_factor: 1.67

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Detect OpAddFloat(x, OpMulFloat(y, z)) with single-use Mul, rewrite
    to OpFMA(y, z, x) which lowers to ARM64 FMADDd — one insn vs two
    (FMUL + FADD). Matmul inner body `sum = sum + a*b` fuses naturally.
  expected_gain_pct: [5, 15]
  expected_gain_mechanism: >
    Matmul does 27M multiply-add ops; collapsing each pair from 2 insns
    to 1 at identical latency. Theoretical ~25% reduction in FP insn
    count; projected wall-time 0.035s → 0.029s.
  counterfactual_check: >
    Must skip Mul ops with multiple uses (would duplicate work). Ack /
    fib / string benches don't contain float Add(x, Mul(y,z)) pattern,
    so unaffected. Nbody has many FMA opportunities.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Diag of simple_matmul.gs confirmed Add+Mul pattern is present in
    the inner loop IR and fusion fired correctly (v40 = FMA v32, v37,
    v52 with v52 a Phi accumulator). Initial wiring WITHOUT Phi check
    measured matmul_dense 10-run median 0.042s vs R45 0.035s (+20%
    REGRESSION). Added PIPELINE-AWARE SKIP: when accumulator arg is
    a Phi, FMA serializes the dependency chain across iterations —
    separated FMUL+FADD lets FMUL execute speculatively ahead. This
    is a documented ARM64 pipeline behavior (similar on Apple M4).

