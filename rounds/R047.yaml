ledger_update:
  classes_touched: [tier2-dense-matrix-kind]
  new_class_introduced: null
  sub_pattern_learned: >
    FMA fusion on loop-carried Phi accumulators REGRESSES matmul by
    ~20% on Apple M4 (ARM64). The separated FMUL+FADD form allows
    FMUL to execute speculatively ahead of the accumulator chain;
    fused FMADDd forces the Mul into the accumulator's critical-path
    latency chain. Rule: only fuse non-Phi accumulators, or first
    break the serial reduction via sum-splitting (R48 candidate).

notes: >
  R47 closes as "hold": Phi-skip gate leaves matmul unchanged, but the
  infrastructure + Phi-pipeline lesson are durable. Next candidate:

    R48 — Sum-splitting for loop-carried reductions. Split the
    accumulator into N parallel partial sums (e.g. sum0, sum1, sum2,
    sum3) to break the serial dependency chain, then fuse each tail
    add into FMA. Combined, this should give the real speedup:
    ~4-way ILP × FMA-collapse. Textbook technique (HotSpot loop
    unroll-and-jam, Clang -ffast-math -funroll-loops).

  Also: the "specialized instruction" pattern (OpFMA, OpMatrixGetF,
  OpMatrixLoadFAt, OpSqrt, ...) is the standard V8 TurboFan / HotSpot
  C2 intrinsic-lowering technique. R42–R47 have been textbook IR
  specialization; documenting for future direction clarity.
