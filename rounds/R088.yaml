# R88: intra-block kindVerified cache — skip redundant ArrayKind checks
#      on same-table GetTable/SetTable sequences.
round: 88
date: 2026-04-19
follows: 87

type: tactical

target:
  benchmark: fannkuch
  current_wall_sec: 0.048
  reference_wall_sec: 0.048
  luajit_wall_sec: 0.020
  gap_factor: 2.40

hypothesis:
  class: tier2-typed-array-ic
  claim: >
    emit_table_array.go's kind-dispatch emits `LDRB+CMPimm+BCond+B`
    (3 or 8 insns) on EVERY GetTable/SetTable even when an earlier op
    in the same block already verified the kind on the same table SSA
    value. Mirror the existing `tableVerified` map with a new
    `kindVerified map[int]uint16` — skip redundant kind checks within
    a block (invalidated on SetTable-end and block boundaries, same
    pattern as tableVerified).

    Counterfactual check: per R87, type-specialized IR op ≠ faster
    emit. Here we reduce insn count directly. Risk is that ARM64 6-8
    wide dispatch retires LDRB+CMP+BCond speculatively in the shadow
    of the array-pointer LDR's load-use latency, making the save
    invisible on wall time.
  expected_gain_pct: [3, 8]
  expected_gain_mechanism: >
    Per fannkuch IR audit (diag/fannkuch/fannkuch.ir.txt):
      B11: 4 ops on v1 (GetTable×2 then SetTable×2). With the cache,
           first op emits kind check; ops 2-3 skip it (the SetTable-end
           invalidate makes op 4 re-emit). Savings: 2×3 = 6 insns/iter.
      B21: 2 ops on v2 (GetTable + SetTable, actually SetTable comes
           first in B20 within the inner loop). 1 op skips = 3 insns.
      B22: 3 ops on v3 (SetTable, GetTable, SetTable, GetTable). 1-2
           ops skip = 3-6 insns.
    At ~5M iter each, 60-90M insns eliminated. At IPC 2-4, 3-6ms out
    of 48ms = 6-12% theoretical ceiling. Realistic 3-8% after ARM64
    speculation absorbs some of the savings.
  counterfactual_check: >
    sort (ArrayInt perm, LCG demotes to Mixed per R87): similar within-
    block reuse pattern expected; small gain. sieve (ArrayBool +
    ArrayInt primes): gain on ArrayBool marked/unmarked inner loop.
    matmul_dense: uses intrinsic path (matrix.getf/setf), NOT affected.
    Risk to non-targets: pure infrastructure, can only skip insns, can
    not introduce new behavior. Regression pathway would be the ARM64
    speculation-shadow effect; if negative, reverts via rule 20.

