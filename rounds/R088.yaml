revert_cost_model_delta: >
  Predicted 3-8% fannkuch gain; actual ~2% (within noise). Root cause:
  ARM64 6-8-wide superscalar absorbs the 3-insn kind-guard savings
  in the shadow of load-use latency on the array-pointer LDR. Same
  pattern as R87 — type-specialized IR op ≠ measurable wall-time gain
  when the eliminated insns are load-use-shadow absorbable.

  The optimization IS correct and DOES fire (5 elisions per fannkuch
  compile: 1 GetTable + 4 SetTable). It's shipped as infrastructure
  for a future round that either (a) hoists the kind check to loop
  pre-header via LICM (saves dispatch from hot path entirely), or
  (b) combines with bounds-check elimination via RangeAnalysis to
  achieve compound savings worth wall-time gain.
revert_prevention: >
  For future "elide N insns in hot loop" proposals: require a
  counterfactual microbench that isolates the predicted insns.
  Specifically for kind-guard-class rounds: the LDRB+CMPimm+BCond
  triple retires in 1-2 cycles on M4, dominated by the load-use
  latency of the subsequent array-pointer LDR. Saving N such triples
  rarely moves wall-time more than 1%/triple on compare-heavy benches.

