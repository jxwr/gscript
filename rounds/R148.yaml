# R148: current-state audit. Fib/ack IR read + emit_call_native.go
#       per-insn accounting for the static-self-call pattern.
#       Confirms the ~35-insn budget for R149-R151 to trim.
round: 148
date: 2026-04-19
follows: 147

type: architecture

target:
  benchmark: multi

hypothesis:
  class: tier2-recursion-closure
  claim: >
    Full per-insn accounting of emit_call_native.go under the
    isStaticSelfCall predicate shows that ~35 insns per call are
    dead work: IC lookup + miss path + IC update + hit re-derive
    + MaxStack bounds + CallCount — none of which feed the
    BL t2_self_entry that the static-self path actually uses.
  expected_gain_pct: null  # architecture round; audit only
  expected_gain_mechanism: >
    Architectural refactor: top of emitCallNative forks on
    isStaticSelfCall — if true, emit a dedicated fast path
    (emitCallNativeStaticSelf) that skips ALL of: IC (4), type
    check (4), subtype check (3), ExtractPtr (2), Proto/DirectEntry
    load (3), IC update/re-derive (~6), MaxStack bounds (7),
    CallCount inc+threshold (5). Subtotal: ~34 insns. Keep:
    NativeCallDepth check (3, safety), SP frame + X29/X30 STP (2),
    mRegRegs/mRegConsts STP (1), args copy, ctx.Regs advance,
    BL t2_self_entry, symmetric restore + ExitCode check.
  counterfactual_check: >
    Non-self calls take the current code path unchanged.
    mut_recursion's F↔M pattern is not `isStaticSelfCall` —
    currently falls through HasSelfCalls && !isStaticSelfCall
    to the runtime-proto-compare branch; that path stays. R155
    later extends to cross-cluster when the base arc succeeds.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25
  mitigation_required: false
  mitigation_description: null

pre_flight:
  required:
    - description: >
        Regenerate diag/fib/fib.ir.txt and diag/ackermann/ack.ir.txt
        via scripts/diag.sh. Read both to confirm every OpCall is
        reached via GetGlobal globals[0] (resolving to the proto
        itself), which is the shape isStaticSelfCall matches.
      acceptance: "both IR files show GetGlobal-then-Call pattern"
      halt_on_fail: true
    - description: >
        Read emit_call_native.go lines 41-315 and number every
        emitted instruction along the static-self path, cross-
        referencing each against the `!staticSelf` gates already
        present (R111) and the `ec.isStaticSelfCall(instr)` branch
        at line 260 that dispatches to BL t2_self_entry.
      acceptance: per-instruction inventory written below
      halt_on_fail: true
  result: |
    1. diag/fib/fib.ir.txt:
         B2: v6 = GetGlobal globals[0]; v10 = Call v6, v9
              v11 = GetGlobal globals[0]; v14 = Call v11, v13
       Two self-calls via globals[0] — both match isStaticSelfCall.
    2. diag/ackermann/ack.ir.txt:
         B3: v13 = GetGlobal globals[0]; v18 = Call v13, v16, v17
         B4: v20 = GetGlobal globals[0]; v28 = Call v20, v32, v27
                                          v29 = Call v20, v23, v28
       Three self-calls, all static.

    Static-self path instruction inventory (BL t2_self_entry case):
       STEP 1 Store fn+args            : 1 + 2n  (KEEP)
       STEP 2 Spill live regs          : variable (KEEP)
       STEP 3 NativeCallDepth LDR+CMP+B: 3 insns  (KEEP — recursion safety)
       STEP 4 LDR fn from regs[fslot]  : 1 insn   (DEAD on static self — not used)
       IC cache LDR+LDR+CMP+BCondEQ    : 4 insns  (DEAD)
       IC miss type check (LSR/MOV/CMP/BCond) : 4 insns  (DEAD)
       IC miss subtype (LSR/LoadImm64/AND/CMP/BCond) : 5 insns  (DEAD)
       IC miss ExtractPtr              : 2 insns  (DEAD)
       IC miss LDR Proto+DirectEntry+CBZ : 3 insns  (DEAD)
       IC miss cache update LDR+STR+STR+B : 4 insns  (DEAD)
       IC hit re-derive LDR+Extract+LDR: 3 insns  (DEAD)
       STEP 5 MaxStack bounds          : 7 insns  (DEAD — same proto)
       STEP 6 CallCount inc+CMP+BCond  : 5 insns  (DEAD — post-promotion)
       STEP 7 SUBimm SP + STP FP/LR + STP Regs/Consts : 3 insns  (KEEP — real frame)
       STEP 7 ClosurePtr LDR+STR (save): 2 insns  (DEAD — self closure invariant)
       STEP 8 Copy args LDR+STR        : 2n  (KEEP)
       STEP 9 Advance mRegRegs + STR ctx.Regs : 2 insns  (KEEP — callee base differs)
       STEP 9 LDR/STR callee.Constants : 2 insns  (DEAD — same proto)
       STEP 9 STR self closurePtr→ctx  : 1 insn   (DEAD — same closure)
       NativeCallDepth inc             : 3 insns  (KEEP — safety)
       BL t2_self_entry                : 1 insn   (KEEP)
       NativeCallDepth dec             : 3 insns  (KEEP — safety)
       STEP 10 LDP Regs/Consts + LDP FP/LR + ADDimm SP : 3 insns  (KEEP)
       STEP 10 ClosurePtr LDR+STR (restore) : 2 insns  (DEAD — inverse of save)
       STEP 10 STR mRegRegs + STR mRegConsts → ctx : 2 insns  (KEEP ctx.Regs;
                                        DEAD ctx.Constants — self invariant)
       STEP 11 ExitCode LDR+CBNZ       : 2 insns  (KEEP)
       Post-BL result storeRawInt (variable, outside this audit)

    Dead insns total (on the CURRENT static-self path):
       1 + 4+4+5+2+3+4+3 + 7 + 5 + 2 + 2+1 + 2+1  = 46 (miss case)
       1 + 4        + 3 + 7 + 5 + 2 + 2+1 + 2+1  = 28 (hit case, amortized)

    R149-R151 budget (hit-case steady state):
       R149: drop IC (8) + type/subtype/extract/proto (14) + re-derive (3) = 25
             [miss-case] adds another ~7
       R150: drop MaxStack bounds (7) + CallCount (5) = 12
       R151: drop Closure save/restore (4) + Constants write (2) + self ClosurePtr STR (1)
             = 7
       Total steady state: 25 + 12 + 7 = 44 insns.

    Static-self hot-path AFTER arc: ~15 + 2n insns
       vs current ~50 + 2n. 3.3× tighter per call.
  passed: true

current_state_audit_summary: |
  # Architectural move (rule 9 Q1→Q2):
  # Q1: Yes — fork emit_call_native.go into two distinct emit paths
  #     with the ec.isStaticSelfCall(instr) predicate as the gate.
  #     Today the static-self branch is a SUFFIX of the generic
  #     path (it takes the whole generic path + then BL instead of
  #     BLR). R149 inverts this: the fast path is a first-class
  #     sibling, chosen by predicate BEFORE any generic work fires.
  # Q2: emit_call_native.go grows a new helper emitCallNativeStaticSelf.
  #     When it nears 1000 lines (currently 839), we split to
  #     emit_call_native_self.go (CLAUDE.md rule 13).

