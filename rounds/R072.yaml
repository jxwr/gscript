revert_cost_model_delta: null
revert_prevention: null

ledger_update:
  classes_touched: [tier2-bounded-recursive-inline]
  new_class_introduced: null
  sub_pattern_learned: >
    The inline pass's `calleeProfile.HasLoop → reject` is a HARD
    blocker for driver-pattern optimization. Benches where main
    calls a loop-containing function (nbody, sort, sieve) cannot
    benefit from inlining without lifting this constraint — which
    requires proper handling of nested loop SSA during inline
    (deferred as multi-round architectural work).

    For call-heavy benchmarks where callees have NO loop (fib,
    ackermann, spectral's A()), MaxRecursion=2 is the main
    limitation. Lifting to 3 or higher is P3 work.

notes: >
  OSR-based attempt (LoopDepth≥1 for driver loops) CRASHED nbody_dense
  during Tier 2 entry — SIGSEGV in callJIT/executeGlobalExit. Reverted
  and switched to direct shouldPromoteTier2 clause, which avoids OSR
  entirely. Lesson: OSR entry path has a latent bug that only shows
  up when the function being OSR'd has complex call patterns; fixing
  it is a separate tier2-entry-correctness round.

  Next: R73 = P3 MaxRecursion 2 → 3 for fib/ackermann.
