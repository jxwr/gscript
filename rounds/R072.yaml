  bench_deltas: {}
  regressions: []
  shipped_code: true
  commit: null
  deliverables:
    - internal/methodjit/func_profile.go — new clause: _main_ with loop+calls promotes to Tier 2
    - internal/methodjit/tiering_manager.go — inlineMaxCalleeSize 80 → 250

revert_class: null
