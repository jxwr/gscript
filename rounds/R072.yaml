# R72: P1 — main-Tier2 promote clause + inline budget 80→250.
round: 72
date: 2026-04-19
follows: 71

type: tactical

target:
  benchmark: multi
  current_wall_sec: null
  luajit_wall_sec: null
  gap_factor: null

hypothesis:
  class: tier2-bounded-recursive-inline
  claim: >
    P1 of the V8-inlining arc (R72+): let main protos with loop+calls
    reach Tier 2 via direct promote (avoiding the OSR entry path
    which crashed in an earlier attempt this round). Bump
    inlineMaxCalleeSize 80 → 250 so medium-large callees (nbody
    advance=241, sort quicksort=51, spectral multiplyAv=36) fit the
    inline budget.
  expected_gain_pct: [0, 5]
  expected_gain_mechanism: >
    Infrastructure preparation. Direct wall-time effect on existing
    benches is small because inline pass gate
    `calleeProfile.HasLoop → reject` still blocks advance/quicksort
    /multiplyAv inlining (they all have loops). The hasCallInLoop
    gate in compileTier2 then leaves main at Tier 1 for call-heavy
    driver benches.
  counterfactual_check: >
    R72's OSR path (widen LoopDepth>=1 for driver patterns) crashed
    nbody_dense via half-baked Tier 2 entry. Direct-promote via
    shouldPromoteTier2 bypasses OSR and is strictly safe because
    compileTier2's existing hasCallInLoop guard keeps main at Tier 1
    when inlining fails.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.33
  mitigation_required: false
  mitigation_description: >
    R35 loosened promotion gate for small self-recursive functions
    and regressed mutual_recursion +47%. This R72 change is different:
    it promotes _main_ specifically, and the existing hasCallInLoop
    gate ensures no regression (failed inlining → stay T1). Full
    bench suite re-ran post-change: no regression on any bench.
  current_state_audit_performed: true
  current_state_audit_summary: >
    Probed bytecode sizes and loop profiles per bench:
      fib: main=30, fib=15 noLoop, recursive → INLINABLE
      ackermann: main=41, ack=25 noLoop, recursive → INLINABLE
      spectral_norm_dense: main=131, A=13 noLoop → INLINABLE (multiplyAv=36 hasLoop BLOCKS)
      nbody_dense: main=341, advance=241 HAS LOOP → BLOCKED
      sort: main=74, quicksort=51 HAS LOOP → BLOCKED
      sieve: main=43, sieve=45 HAS LOOP → BLOCKED

    Of the targeted benches, only fib/ackermann/spectral_norm_dense
    are reachable via the current inline pass. fib/ackermann need
    MaxRecursion>=3 (P3) for meaningful gain. spectral's A() is
    already small enough to inline at MaxRecursion=2.

pre_flight:
  required:
    - description: no bench regression
      acceptance: all benches within noise vs R71 baseline
      halt_on_fail: true
  result: >
    Median-of-5 post-R72:
      fib 1.458, ack 0.274, spectral_norm_dense 0.024, nbody_dense 0.185
      matmul_dense 0.035, sort 0.050, sieve 0.086, mandelbrot 0.058
