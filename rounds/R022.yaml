outcome:
  status: revert
  bench_deltas:
    sort: {from: 0.047, to: SIGSEGV, pct: null}   # CORRECTNESS REGRESSION
    fib: {from: 1.412, to: 1.429, pct: 1.2}       # noise; bounds-check-skip didn't help
    ackermann: {from: 0.263, to: 0.261, pct: -0.8} # noise
  regressions: [sort]                              # crashed, not just slow
  commit: 8485314

revert_class: correctness
revert_root_cause_location: "internal/methodjit/emit_call_native.go step 5 (bounds check)"
revert_cost_model_delta: >
  Predicted: skipping bounds check on self-calls is safe because
  callee MaxStack == caller MaxStack (same Proto). Actual: the
  bounds check is NOT testing MaxStack parity — it's testing whether
  (mRegRegs + calleeBaseOff + calleeMaxStack*8) <= RegsEnd. mRegRegs
  ADVANCES with each recursive call to make room for the callee's
  register window. For deeply-recursive self-calls (sort's quicksort
  recurses log(N)=16 levels for N=50k, with calleeBaseOff growing
  each level), eventually the target window extends past RegsEnd.
  Without the bounds check, we write off the end → SIGSEGV.

  The bounds check is THE mechanism for detecting register-file
  overflow in recursion. Skipping it ALWAYS corrupts deep self-
  recursive calls. The hypothesis "same Proto → bounds identical"
  was a LOCAL view that ignored the MULTI-CALL growth of mRegRegs.
revert_prevention: >
  Pre-flight should have included BOTH:
    (a) fib microbench (to measure the potential gain — did)
    (b) sort microbench (to catch the quicksort correctness bug)
  The R15 mitigation already calls for production-scale tests;
  sort.gs is one. R17's production-scale harness didn't include sort
  because sort's correctness was assumed. Add quicksort as a
  production-scale regression seed in R17's framework.

ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null

notes: >
  R22 takes the conservative slice of step 3.1. If the wall-time gain
  holds at ≥2% on fib under median-of-5, R23+ can extend to ALSO
  skip the type check and DirectEntryPtr load for a path-split
  version (BL label vs BLR X2). If the gain degrades below 1%, the
  cost of the self-check on every call outweighs the saving —
  consider reverting and taking a different approach.
