# First tactical round of the R22-R28 implementation phase.
round: 22
date: 2026-04-17
follows: 21

type: tactical

target:
  benchmark: multi             # fib, ackermann, mutual_recursion
  current_wall_sec: 1.412      # fib JIT at session open
  reference_wall_sec: null
  luajit_wall_sec: 0.024
  gap_factor: 59

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R20 step 3.1 (self-call specialization): in emitCallNative, after
    loading callee Proto into X1, compare against current function's
    Proto. On equal, skip the bounds check (step 5). Conservative
    variant — does NOT yet skip the type check or DirectEntryPtr
    load. Expected gain: small but positive on recursion-bound
    benchmarks, zero impact on non-recursive.
  expected_gain_pct: [2, 8]     # revised down from ADR's [25]
  expected_gain_mechanism: >
    Bounds check is 5 ARM64 insns per call. Self-check adds 3 insns
    (LoadImm64 + CMP + BCond) on EVERY call. Net save on self-calls
    ~2 insns; pessimizes non-self calls by ~3 insns. Fib is 100%
    self-call so the gain is ~2 insns × 18M × 0.5 ns ≈ 18 ms ≈ 1-2%
    of fib wall time. Measured spot-check: fib 1.41 → 1.37 s (~3%),
    ackermann 0.263 → 0.248 s (~6%).

    The ADR's 25% projection assumed ALSO skipping type check +
    DirectEntryPtr load (4-5 additional saves). R22 defers those to
    a future round because they need a path-split (BL vs BLR X2)
    which has larger emit blast radius.
  counterfactual_check: >
    Non-recursive benchmarks pay +3 insns per call for the self-
    check that never triggers. At ~78 ns/call baseline, +3 insns is
    ~1-2 ns or ~2% per-call overhead. Acceptable because call
    frequency on non-recursive is much lower (e.g., nbody has calls
    but not in inner loops).

    Correctness: self-check is pure read; no state change. If the
    check fires incorrectly (can't), worst case we skip a bounds
    check we needed — which would cause SIGSEGV. This is impossible
    because same Proto → same MaxStack → same bounds.

