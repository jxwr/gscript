revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: >
  Predicted 10-35% ackermann gain; actual 0%. Root cause: inline pass
  with MaxRecursion=5 expands most tail-recursive patterns BEFORE our
  detector runs, producing non-tail patterns in the final IR. Tail-call
  detector fires 1 time per ackermann compile (expected 2+). Need to
  either run detection BEFORE inline, or re-detect after inline
  expansion.
revert_prevention: >
  For next round targeting tail-call perf: either (a) run TCO
  detection in graph_builder before InlinePassWith, recording a
  per-instr IsTail flag that survives inlining; (b) re-scan the IR
  post-inline for the Call→Return pattern at every level of expansion.

ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null
  sub_pattern_learned: >
    TCO is easy to implement at emit level (130 LoC new; slow-path
    fallback via existing emitCallExitFallback is tidy). But its
    wall-time payoff depends on WHEN in the pipeline you detect
    Call→Return patterns. Post-inline IR has the patterns consumed
    by inlined bodies. The correctness win — unbounded tail-recursion
    no longer bails at maxNativeCallDepth=48 — is real and lasting,
    even if bench numbers don't move.
