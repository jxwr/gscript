# R107: Tail-call optimization — skip frame save for Call→Return patterns.
round: 107
date: 2026-04-19
follows: 106

type: architecture       # new emit path + detection; ADR-shaped change

target:
  benchmark: ackermann
  current_wall_sec: 0.270
  reference_wall_sec: 0.274
  luajit_wall_sec: 0.006
  gap_factor: 45.0

hypothesis:
  class: tier2-recursion-closure
  claim: >
    When OpCall's result is immediately returned (pattern: Call→Return
    in same block, Return's arg is Call's result), convert to a tail
    call: skip caller frame save, tear down own frame, B the callee's
    direct entry. LR stays at caller-of-current, so callee returns
    directly. Eliminates O(N) per-frame STP+LDP + BLR+RET overhead on
    each tail-recursive hop.

    ackermann has 2 tail sites of 3 recursive ops:
      return ack(m-1, 1)           ← TAIL
      return ack(m-1, ack(m, n-1)) ← outer TAIL, inner non-tail
    Plus object_creation's `return new_vec3(...)` and method_dispatch's
    `return new_point(...)` patterns.
  expected_gain_pct: [10, 35]
  expected_gain_mechanism: >
    Per-tail-call saves: frame-save push (SUB+STPx3=4 insns skipped),
    frame-restore pop (LDPx3=3 skipped), BLR→BR swap (same cost).
    Net ~7 insns saved per tail call. Also removes NativeCallDepth
    increment (+2 insns). On ackermann(3,4) with ~67M calls where
    ~2/3 are tail: ~600M insns saved → ~150ms at IPC 4 → -55% of
    270ms baseline theoretical. Realistic 10-35%.

    Bigger win: stack no longer grows per tail call, lifting the
    maxNativeCallDepth=48 bail-out for tail-recursion-dominated paths.
  counterfactual_check: >
    fib/fib_recursive are NOT tail-recursive — no tail sites, zero
    impact. mutual_recursion uses `return n - M(F(n-1))` — NOT tail.
    Impacts: ackermann (tail-heavy), object_creation / method_dispatch
    (factory-constructor patterns).

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.5          # tier2-recursion-closure: 1 win (R20 ADR) / 2 attempts
  mitigation_required: false      # attempts < 3
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    - No existing OpTailCall or IsTailCall flag; no tail-call pass.
    - emit_call_native.go always emits full BLR flow (type check +
      frame save + BLR + restore).
    - emitReturn (emit_dispatch.go:961) stores ret value to regs[0],
      writes ctx.BaselineReturnValue, branches to epilogue or
      t2_direct_epilogue based on CallMode.
    - Prologue allocates 128-byte frame and saves X19..X28 + FP/LR.
    - t2_direct_entry label at emit_compile.go:531 expects X0 = ctx
      pointer; reloads mRegRegs, mRegConsts; jumps to B0.
    - R40 ships HasSelfCalls self-entry optimization (self-call
      without ctx reload).

