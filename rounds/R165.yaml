current_state_audit_summary: |
  # R156 ADR's Path W design:
  #   1. Dedicated t2_osr_entry_<pc> prologues materializing live
  #      locals from Tier 1 frame; jump post-increment into loop body.
  #   2. Safepoint-validated resume PCs (R154 latent bug prevention).
  #
  # Post-R162 reality check:
  #   (1) Live-local materialization from Tier 1 frame would eliminate
  #       side-effect replay. Current replay cost on production benches
  #       is <0.5% — below noise floor. This is a ≤0.5% win at
  #       significant implementation cost (custom prologue per loop
  #       backedge, Tier 1 → Tier 2 frame translation, safepoint
  #       metadata).
  #   (2) R154 latent bug was triggered by NewTable-in-loop exit-resume
  #       cascading. R162's hasExitResumeInLoop filter + R161's EA
  #       eliminate all known triggers. Any shape that WOULD trigger
  #       the bug now gets rejected by the filter and stays Tier 1.
  #       So the correctness fix is already in place indirectly.
  #
  # Session 3 UNLOCKS nothing concrete. The remaining method-JIT
  # perf gains on our current bench set come from elsewhere:
  #   - Session 4 Gap 4 (inline heuristic): cumulative-bytecode budget.
  #     Small win but well-scoped (1-2 rounds).
  #   - Future arcs: cross-call EA for binary_trees; allocator-level
  #     work; string_bench benchmark that wasn't in current set.
  #
  # Close Session 3 at R165. 16 of 17 rounds returned to budget.
  # Sessions 2+3 combined returned 32 rounds.

