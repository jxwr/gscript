    Ran object_creation with R154_TRACE=1:
      [R162] SetOSRCounter create_and_sum loopDepth=1
      [R154] TryCompile create_and_sum CallCount=2
              → compileTier2 attempts=1 (call-count path, not OSR)
      [R162] SetOSRCounter transform_chain loopDepth=1
      [R154] handleOSR transform_chain → compileTier2 attempts=2 ✓
