# R40: Tier 2 lightweight self-call infrastructure (t2_self_entry).
round: 40
date: 2026-04-17
follows: 39

type: tactical

target:
  benchmark: fib
  current_wall_sec: 1.429
  reference_wall_sec: null
  luajit_wall_sec: 0.024
  gap_factor: 59

hypothesis:
  class: tier2-bounded-recursive-inline
  claim: >
    R39 showed fib_recursive regression under Tier 2 promotion is
    because Tier 2 self-call is heavier than Tier 1's
    BL self_call_entry. R40 implements a Tier 2 equivalent:
    t2_self_entry label (skips MOVreg, LDR ctx.Constants,
    2×LoadImm64 tag setup). Runtime proto compare in emit_call_native
    branches to BL t2_self_entry vs BLR X2.
  expected_gain_pct: [1, 5]       # conservative; only 4 insns per self-call saved
  expected_gain_mechanism: >
    Per self-call: caller adds 3 insns (LoadImm64 + CMP + BCond).
    Callee saves 4 insns (skipped MOVreg + LDR X27 + 2×LoadImm64).
    Net: ~1 insn/call savings when self. Gated on
    Proto.HasSelfCalls (set at compile time by irHasSelfCall) so
    non-recursive functions pay zero overhead.
  counterfactual_check: >
    Non-self-recursive functions: HasSelfCalls=false → zero emit
    change → zero insn count change (confirmed by
    TestObjectCreationDump passing).

    Self-recursive functions that promote to Tier 2 (requires
    shouldPromoteTier2 change in a future round): save 1 insn per
    self-call. Negligible but positive.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.5           # tier2-bounded-recursive-inline after R35 revert + R39 hold
  mitigation_required: false       # attempts=4, not forcing strategy flip yet
  mitigation_description_cited: >
    R35: promotion without lightweight self-call path → broad
    regressions. R39 confirmed: Tier 2 self-call is heavier than
    Tier 1's. R40 addresses the lightweight-path gap.
  current_state_audit_performed: true
  current_state_audit_summary: >
    IR audit: fib at Tier 2 still emits 2 OpCalls (not inlined
    because fib doesn't reach Tier 2 in production). After R40:
    IF fib promoted, emit_call_native would emit both BLR X2 and
    BL t2_self_entry paths, with runtime proto compare selecting.
    HasSelfCalls flag correctly set by irHasSelfCall when a call's
    GetGlobal loads own name.

pre_flight:
  required:
    - description: "all tests pass including object_creation insn-count assertion"
      acceptance: go_test_passes
      halt_on_fail: true
    - description: "zero production regression"
      acceptance: no_production_path_changes_without_HasSelfCalls
      halt_on_fail: false
  result: >
    All tests green. Non-self-recursive functions unchanged (HasSelfCalls
    guard). Infrastructure exists but doesn't activate in production
    because shouldPromoteTier2 still rejects fib-class functions.
    R40 is infrastructure-only; perf gain deferred to a future round
    that combines this with a carefully-designed promotion gate.
  passed: true

outcome:
  status: win                      # infrastructure ships; activates future rounds
  bench_deltas: {}                  # no bench impact without promotion
  regressions: []
  commit: afb8af6
  deliverables:
    - "internal/methodjit/emit_compile.go — t2_self_entry label emission (conditional on HasSelfCalls)"
    - "internal/methodjit/emit_call_native.go — self-call detection + BL t2_self_entry emit"
    - "internal/methodjit/tiering_manager.go — irHasSelfCall + sets Proto.HasSelfCalls"
  verification:
    - "TestObjectCreationDump/new_vec3: insn count unchanged (HasSelfCalls=false path)"
    - "ALL internal/methodjit + runtime + vm tests green"
    - "fib diag asm (at Tier 2 diag compile): shows both BLR and BL paths emitted"

revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: null
revert_prevention: null

ledger_update:
  classes_touched: [tier2-bounded-recursive-inline]
  new_class_introduced: null
  sub_pattern_learned: >
    Infrastructure-only rounds are legitimate wins when they unblock
    future work without breaking current behavior. Rule: gate new
    emit paths on an explicit flag so non-target benchmarks are
    untouched. R40 demonstrates the pattern.
