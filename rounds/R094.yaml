revert_class: cost-model-error
revert_root_cause_location: internal/methodjit/pass_load_elim.go (tableAvail self-populate)
revert_cost_model_delta: >
  Predicted 0-3% gain; actual +3.6% regression on sieve.
  Likely cause: GetTable→GetTable CSE extends the value's SSA
  lifetime, creating register pressure. First GetTable result must
  survive until the second GetTable's position for the replacement
  to be valid; reg allocator spills/reloads the result extra times.
  Net cost > save.
revert_prevention: >
  Before GetTable/GetField CSE: include a microbench or reg-alloc
  heat check. Tight-loop CSE can regress if the cached value extends
  across many instructions.

ledger_update:
  classes_touched: [tier2-typed-array-ic]
  new_class_introduced: null
  sub_pattern_learned: >
    GetTable→GetTable CSE (vs SetTable→GetTable forwarding) causes
    register pressure increase that erases any insn-count save. R93's
    store-to-load forwarding is safe because the stored value is
    already live through the SetTable. Read-after-read CSE is not.
