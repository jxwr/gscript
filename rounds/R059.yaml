  cumulative_wall_time_gains:
    matmul_dense:       {from: 0.117, to: 0.038, pct: -67.5, note: "vs pre-R42 legacy matmul; post-R52 correctness"}
    nbody_dense:        {from: 0.254, to: 0.180, pct: -29.1, note: "vs legacy nbody.gs; via port + LoadElim CSE"}
    spectral_norm_dense: {from: 0.045, to: 0.024, pct: -46.7, note: "vs legacy; R54 port"}
    mandelbrot:         {from: 0.063, to: 0.058, pct: -7.9,  note: "vs R7 ref; tied with LuaJIT"}

  luajit_parity_status:
    matched:       [mandelbrot]
    close_range:   [matmul_dense, fannkuch, sum_primes]      # gap <= 2.5x
    moderate_gap:  [spectral_norm_dense, sort, nbody_dense]  # gap 3-6x
    wide_gap:      [sieve, nbody_legacy]                     # gap 6-10x
    call_bound:    [ackermann, fib, mutual_recursion]        # gap > 40x

  critical_correctness_finding: >
    R52 discovered that DCE had been silently dropping OpMatrixSetF /
    OpMatrixStoreFAt / OpMatrixStoreFRow since their introduction in
    R43/R45/R46. Consequence: JIT matmul_dense produced zero output
    where VM produced 0.333335 (correct). R42-R48 matmul_dense "wins"
    were measuring partially-unwritten work. Real gain stayed largely
    intact (-67.5% vs legacy matmul instead of claimed -70.1%) but
    the integrity lesson is structural: SIDE-EFFECT METADATA MUST LIVE
    ON IR OP DEFINITIONS, not in pass-local switches.

  architectural_observations:
    - The DenseMatrix pattern (R42-R45 infra) has consistent -30 to
      -50% wins on float-arithmetic-dense workloads (matmul, nbody,
      spectral_norm). Int-heavy workloads regress when ported
      (sort_dense +34%). Integer workloads need a separate IntDense
      (int64-backed) primitive — deferred forward class.
    - Per-call cost (Tier1→Tier2 BLR) is the dominant remaining
      overhead on nbody (500K advance() calls × ~100-200ns = 50-100ms
      out of 180ms). Attack requires main to be Tier 2 compiled so
      that inlining becomes caller-side feasible. R56's
      inlineMaxCalleeSize bump alone doesn't help because main isn't
      at Tier 2. FORWARD CLASS: main-tier2-promotion.
    - CSE wins are conditional on target ops being cache-unfriendly.
      R53 got -19% on nbody_dense by CSE-ing OpGetGlobal/OpMatrixFlat/
      OpMatrixStride (each had a type guard → real saved cycles).
      R58 CSE on OpMatrixLoadFAt regressed because the loads were
      already cheap (L1 hit, no guard). RULE: pre-flight check IR for
      actual redundancy BEFORE adding CSE.

  next_arc_candidates:
    - main_tier2_promotion          # heuristic to Tier-2 promote top-level driver loops
    - int_dense_runtime_and_jit     # IntDense matrix variant for sort/sieve/fannkuch
    - neon_simd_fmla                # 2-lane FP for matmul inner loop
    - polymorphic_inline_caches     # for benches with shape-varied field access

