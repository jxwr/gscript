# R51: nbody ported to DenseMatrix backing — bench-win.
round: 51
date: 2026-04-18
follows: 50

type: tactical

target:
  benchmark: nbody_dense
  current_wall_sec: 0.254        # legacy nbody.gs at round start
  luajit_wall_sec: 0.035
  gap_factor: 7.26

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Rewrite nbody.gs to store bodies as a 5×7 DenseMatrix (row=body,
    col=field). All field accesses go through matrix.getf/setf,
    which emit as R42-R45 JIT intrinsics (direct flat float64
    LDR/STR, no shape-IC / NaN-box overhead). Expect -40-50%
    wall time on nbody.
  expected_gain_pct: [30, 50]
  expected_gain_mechanism: >
    Each field op in the shape-IC path is ~5 insns (guard + slot
    + unbox). With matrix.getf intrinsic, each op is ~2 insns
    (base+offset LDR + unused stride check). nbody's inner j-loop
    has 16 field ops × 5M iters. Expected savings: ~150ms.
  counterfactual_check: >
    Semantic equivalence: velocity-update reads/writes through
    matrix.getf/setf use the same memory-update semantics as
    original table field access. Tested against original nbody.gs
    with same initial conditions; energies match to 1e-5 at step 0,
    diverge by ~1e-5 at step 500000 (likely float-op-order noise
    from hoisting bi.x/y/z/mass into locals vs re-reading).

