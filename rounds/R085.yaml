hypothesis:
  class: correctness-bug-fix
  claim: >
    Tier 1 emitBaselineEQ/LT/LE currently writes ZERO feedback. When
    the interpreter is bypassed (Tier 1 compiles on call 1), Tier 2
    later sees Feedback[pc].Left = FBUnobserved, so R82's graph_builder
    L2 GuardType insertion is inert.

    Option 2 fix: add 3-5 insns per compare on Tier 1 native fast paths
    that write observed Left/Right FB types. Cost is amortized over
    many loop iterations; Tier 2 then gets populated feedback and
    TypeSpec can cascade mono-int/mono-float specialization.

    Expected: no bench regression > 2%.
  expected_gain_pct: [0, 5]
  expected_gain_mechanism: >
    Secondary effect — Tier 2 TypeSpec now has real feedback for
    OP_EQ/LT/LE, so OpLe → OpLeInt/OpLeFloat specialization fires on
    benches where it didn't before.
  counterfactual_check: >
    If insn bloat is >5%, sort (O(N²) compare-heavy) would regress
    visibly. This is what happened.

