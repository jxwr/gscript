revert_class: cost-model-error
revert_root_cause_location: internal/methodjit/tier1_arith.go:430-900 (calls to helpers added then removed)
revert_cost_model_delta: >
  Pre-flight estimated 2% ceiling. Actual: 7-12% regression on 5 of
  7 benches. Root cause: feedback emission adds ~22 insns per compare
  (11 per operand × 2 operands), and compare-heavy benches (sort
  O(N²), sieve inner loop, fannkuch permutation comparisons,
  mandelbrot bail-out test) have compares as a material fraction of
  runtime. +22 insns on a 10-insn hot compare loop is +200% code
  expansion; even with ARM64's 6-8 wide dispatch absorbing most of
  it, ~7-12% wall-time is the realized cost.
revert_prevention: >
  For Tier 1 hot-path additions, require a microbench estimate:
  "how many insns per op? what fraction of benchmark runtime does
  this op occupy?" If runtime fraction > 20% and insn add > 5x the
  hot-path base insn count, expect >5% wall-time regression. This
  heuristic would have predicted the sort/fannkuch/mandelbrot
  regressions before shipping.

  A future Option 2' could ship ONLY if the feedback emission is
  compacted (e.g., CSEL-based type extraction: ~5 insns vs 7) AND
  first-observation-only (steady-state CBNZ-skip reduces to ~3
  insns after warmup). Then total ~10-16 insns per compare during
  warmup, ~6-8 in steady state — probably within 2% ceiling for
  compare-heavy benches.

ledger_update:
  classes_touched: [correctness-bug-fix]
  new_class_introduced: null
  sub_pattern_learned: >
    Option 2 at the naive "always emit full monotonic update" cost
    is too expensive for gscript's compare-heavy bench mix. Adding
    ~22 insns to every compare is a ~200% expansion of the hot path
    and realizes ~7-12% wall-time regression.

    Future Option 2' requires: (1) CSEL-compact type extraction, and
    (2) first-observation-only emission (LDRB+CBNZ skip before
    expensive widening logic). Accepts losing FBAny widening in the
    common case; Tier 2 must handle deopt-recompile when feedback is
    stale.

    The infrastructure shipped (emitBaselineFeedbackFromValueAt +
    emitBaselineFeedbackFixedAt) is usable by a future Option 2' with
    no further refactor.

notes: >
  R85 was the FIRST serious attempt at Option 2 (Tier 1 feedback
  population). It demonstrated the approach is correctness-sound
  (tests verify FBInt/FBFloat populated as expected) but at the
  naive implementation cost, unacceptably regresses 5 of 7 measured
  benches.

  A second attempt (Option 2' in ledger sub_pattern) would need both
  a compact ARM64 encoding and first-observation gating. Estimated
  implementation cost: 1-2 more rounds of R85-class work.

  V8-inline arc is now R72-R85 (14 rounds). Honest stop: rotate
  away from feedback-architecture to proven-productive directions,
  OR accept 1-2 more rounds of Option 2' investment.
