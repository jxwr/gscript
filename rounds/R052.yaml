# R52: correctness — DCE was dropping OpMatrixSetF / OpMatrixStoreFAt / OpMatrixStoreFRow.
round: 52
date: 2026-04-18
follows: 51

type: tactical

target:
  benchmark: multi
  current_wall_sec: null
  luajit_wall_sec: null
  gap_factor: null

hypothesis:
  class: correctness-bug-fix
  claim: >
    DCEPass (`hasSideEffect`) did not list OpMatrixSetF, OpMatrixStoreFAt,
    OpMatrixStoreFRow as side-effectful, so DCE silently dropped them
    whenever no SSA user read their result (which is always, since stores
    return `TypeUnknown`). Consequence: JIT-compiled matrix.setf calls
    were no-ops; matmul_dense and nbody_dense produced zeros where VM
    mode produced correct values. R42-R48 matmul_dense "wins" were
    partly measurement on unwritten data. Fix: add the three Matrix
    store ops to hasSideEffect, then add a regression test.
  expected_gain_pct: null           # correctness fix; bench movement expected to regress
  expected_gain_mechanism: >
    None. This is pure correctness. Wall times for matrix.setf-using
    benchmarks will go UP because the stores actually execute now.
  counterfactual_check: >
    All other DCE markings (OpSetTable, OpSetField, OpSetList, OpAppend)
    are present. Only the DenseMatrix-specific store ops were missing.
    No other latent side-effect gaps identified by a grep of Op*
    definitions.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25           # correctness-bug-fix: 3 win + 1 revert (R12)
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Discovered during R52 diag of nbody_dense: IR had NO MatrixStoreFAt
    ops, yet matrix.setf calls were annotated as intrinsic-rewritten in
    the IR header. Tracing: MatrixLowerPass rewrote MatrixSetF →
    MatrixStoreFAt, but DCEPass's hasSideEffect lacked these op codes,
    so DCE fixed-point iteration removed them all. Confirmed by running
    VM vs JIT: matmul_dense c[0][0] = 0.333335 (VM) vs 0.000000 (JIT).
    Identical pattern in nbody_dense: post-fix Energy delta matches
    legacy nbody.gs exactly (was drifting by 1.6e-5 before the fix).

pre_flight:
  required:
    - description: VM vs JIT output parity for matmul_dense
      acceptance: c[0][0] matches (both 0.333335)
      halt_on_fail: true
  result: >
    Pre-fix: JIT=0.000000, VM=0.333335. FAIL.
    Post-fix: JIT=0.333335, VM=0.333335. PASS.
  passed: true

outcome:
  status: bench-win                 # net of correction tax, nbody_dense IS still a win
  bench_deltas:
    matmul_dense:    {from: 0.035, to: 0.038, pct: 8.5}    # correction tax on R42-R45 baseline
    nbody_dense:     {from: 0.129, to: 0.223, pct: 73.0}   # correction tax on R51 baseline
    nbody_dense_vs_nbody: {from: 0.254, to: 0.223, pct: -12.2} # real R51+R52 gain vs legacy
    matmul_dense_vs_matmul: {from: 0.124, to: 0.038, pct: -69.4} # real R42-R52 cumulative
  regressions:
    - matmul_dense vs R48 (tainted baseline) +8.5%
    - nbody_dense vs R51 (tainted baseline) +73.0%
  shipped_code: true
  deliverables:
    - internal/methodjit/pass_dce.go — add OpMatrixSetF/StoreFAt/StoreFRow to hasSideEffect
    - internal/methodjit/pass_dce_test.go — TestDCE_MatrixStoresNotDropped regression case

revert_class: null
revert_root_cause_location: "internal/methodjit/pass_dce.go:65 hasSideEffect switch"
revert_cost_model_delta: >
  R42-R48 wall-time claims were inflated by the stores-silently-dropped bug.
  Real delta: matmul_dense 0.117 → 0.038 = -67.5% (vs claimed -70.1%).
  The architectural wins are still largely real; the last 2-3% was bug.
revert_prevention: >
  Architectural lesson: IR op side-effect annotations should be declared
  ONCE at IR op definition (ir_ops.go), not separately at every pass's
  hasSideEffect. A centralized `OpMeta` table would force this to be
  kept in sync. Deferred to a later meta round; for now, add a checklist
  item: "when adding a new Store/Mutate IR op, grep pass_dce.go's
  hasSideEffect and add the new case in the same PR."

ledger_update:
  classes_touched: [correctness-bug-fix, tier2-dense-matrix-kind]
  new_class_introduced: null
  sub_pattern_learned: >
    Silent DCE of side-effecting ops is the worst kind of correctness
    bug: it masks as a performance win (the "optimization" skips real
    work). Two defenses:
      (1) VM-vs-JIT parity test on at least one non-trivial result
          per benchmark (R42-R48 had no such test on matmul_dense;
          the benchmark print only showed c[0][0] which was 0 in
          the buggy case — trivially passing a "does it produce a
          number?" check).
      (2) Declarative side-effect metadata on IR ops, not pass-local
          switches. Adding a new store op in ir_ops.go should be
          mechanically impossible without declaring it.

    The R42-R48 architectural wins on matmul_dense are still MOSTLY real
    (0.117 → 0.038 = -67.5%). But the confidence in those numbers is
    reduced; future bench claims should include VM/JIT parity proof.

notes: >
  R51's nbody_dense "-49%" becomes -10.8% after the fix. Still a win,
  just a much smaller one. The 10-round architectural plan continues,
  but several findings need re-checking with the fixed binary.

  Open questions for R53+:
    - Does nbody_dense still have headroom post-fix? 0.223s → LuaJIT
      0.035s is gap 6.37 (was "3.71" with bug). Wide gap, more rounds.
    - Where does the remaining per-iter cost go now that setf is
      actually running? Read the new IR + ASM to find the next lever.
    - Should the 10-round plan target sieve (8×) or nbody_dense (6.4×)?
