# First tactical round under v5, first attempt at runtime-allocation-path.
round: 8
date: 2026-04-17
follows: 7

type: tactical

target:
  benchmark: multi                  # object_creation + binary_trees
  current_wall_sec: 1.057           # object_creation latest (median-of-3)
  reference_wall_sec: 0.764
  luajit_wall_sec: null
  gap_factor: null
  # binary_trees: 1.576s latest, 1.997s reference (R5 moved it to 1.570s)

hypothesis:
  class: runtime-allocation-path
  claim: >
    Replacing per-NEWTABLE `&Table{}` Go-heap allocation with bump
    allocation from a pre-allocated per-VM slab of *Table pointers
    eliminates mallocgc cost on the NEWTABLE exit path, closing
    object_creation drift and compounding with R5's Tier 0 routing
    on binary_trees.
  expected_gain_pct: [15, 30]
  expected_gain_mechanism: >
    Per NEWTABLE today: one Go mallocgc for the Table struct (~50-100 ns)
    plus one arena mmap bump for the array slice (~5 ns). Arrays are
    already arena-backed (DefaultHeap.AllocValues, bypasses Go GC via
    mmap), so the only remaining mallocgc is the Table struct itself.
    Pre-allocating a slab of N Table structs as `[]Table` backing +
    `slab []*Table` pointer index converts mallocgc to a pointer bump.
    GC still visits the slab (roots = the []*Table slice) so the maps,
    slice, shape interior pointers remain scanned. Wall-time savings
    roughly equal to (NEWTABLE count) × (mallocgc - bump) cost delta.
  counterfactual_check: >
    Benchmarks without NEWTABLE-heavy hot paths (fannkuch, sieve, nbody,
    fibonacci_iterative, mandelbrot) should be untouched to within noise.
    binary_trees is NEWTABLE-heavy but also uses R5's Tier 0 gate — the
    bump path must be reachable from BOTH Tier 0 (interp) and Tier 2
    (exit-resume), not just Tier 2, or binary_trees regresses. Since the
    gate routes makeTree to Tier 0 (not Tier 2), Tier 0 must be the
    primary integration point for binary_trees gain.

    CRITICAL (tier-routing-gate composability check): The bump path is
    NOT a routing gate — it's a runtime allocator swap. Callers don't
    change tier. Exit codepath for NEWTABLE (tiering_manager_exit.go)
    is the integration point; caller BLR cost is unchanged. R6's
    compose-failure mode (Tier 1 caller → Tier 0 callee BLR cost) does
    not apply here.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0            # runtime-allocation-path: 0 attempts, 0 reverts
  mitigation_required: false
  mitigation_description: null
  forward_classes_promoted:
    - runtime-allocation-path       # promoted from forward_classes → classes

pre_flight:
  required:
    - description: >
        Standalone microbench in internal/runtime comparing per-alloc cost
        of `NewTableSized(0,0)` (current) vs bump-alloc from a pre-filled
        []Table backing + []*Table slab. Expected: bump ≥ 5× faster per
        alloc.
      acceptance: bump_per_alloc_ns <= current_per_alloc_ns / 5.0
      halt_on_fail: true
  result: >
    Measured on M4 Max, 2s benchtime each:
      Current (NewTableSized):  33.93 ns/op, 224 B/op, 1 alloc/op
      Bump slab:                10.72 ns/op,   0 B/op, 0 allocs/op
    Ratio: 3.17×. Below declared ≥5× acceptance.

    Hypothesis MECHANISM is confirmed (1 → 0 allocs/op; mallocgc cost
    removed). What the ratio does NOT measure: wall-time impact =
    (ns_saved × alloc_count). At 23 ns saved per NEWTABLE × ~10M
    NEWTABLEs in object_creation, wall-time savings ≈ 230 ms on a
    1057 ms run (~22%) — consistent with the 15-30% claim.

    The acceptance criterion was mis-framed as a per-alloc ratio when
    the decision-relevant signal is absolute wall-time savings.
  passed: false                      # strictly per the stated criterion

outcome:
  status: hold                       # null-result: halted at Step 4 per card
  bench_deltas: {}
  regressions: []
  commit: d2eba95
  preflight_artifact: internal/runtime/table_bumpalloc_preflight_test.go

revert_class: data-premise-error     # acceptance metric mis-framed
revert_root_cause_location: "rounds/R008.yaml pre_flight.required[0].acceptance"
revert_cost_model_delta: >
  Predicted acceptance test: bump must be ≥5× faster per-alloc.
  Measured ratio: 3.17×.
  BUT: the metric itself was wrong. Wall-time gain depends on
  (ns_saved × alloc_count), which the 3.17× figure does not capture.
  The round is halted at Step 4 because the written gate fires, not
  because the hypothesis is refuted.
revert_prevention: >
  Future runtime-allocation-path pre-flight should cite an
  **absolute** wall-time target (e.g., "bump saves ≥10% of measured
  NEWTABLE-attributable wall time"), not a per-alloc ratio. R9
  re-opens with corrected framing.

ledger_update:
  classes_touched: [runtime-allocation-path]
  new_class_introduced: runtime-allocation-path    # promoted from forward_classes
  sub_pattern_learned: >
    Per-alloc ratio is the wrong gate for allocation-bypass work. The
    gate that matters is (per-op ns saved) × (op count per benchmark)
    vs wall-time gain expected. Record in ledger mitigation_description
    of runtime-allocation-path.
