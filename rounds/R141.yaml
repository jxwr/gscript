# R141: architectural single-body collapse attempted — hang persists,
#       second raw-slot leak remains unidentified. Architectural
#       hypothesis disproven as sole root cause.
round: 141
date: 2026-04-19
follows: 140

type: architecture

target:
  benchmark: ackermann

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R140 agents identified the failing guard (v32 entry GuardType on
    slot[0]). Our architectural hypothesis was that dual-body pass-1 /
    pass-2 having different ABIs for regs[] (pass-2 keeps raw, pass-1
    expects boxed) is THE root cause — any cross-pass reentry path
    leaks raw bits. Test by collapsing to a single body.

  expected_gain_pct: [0, 0]   # diagnostic — test architectural hypothesis

  counterfactual_check: >
    If collapse to single-body fixes the hang, architectural
    hypothesis validated. If not, there's a SECOND leak path and
    architectural hypothesis alone is incomplete.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25

pre_flight:
  required:
    - description: methodjit tests pass under single-body mode + np>=2 gate
      acceptance: ok (converged indicates architectural fix correct)
      halt_on_fail: false  # diagnostic round — failure is informative
  result: >
    Three surgical edits applied:
      1. emit_compile.go emitNumericBody: entry-only trampoline — box
         raw X0..X(N-1) via ORR+STR to regs[0..N-1], then B to pass-1
         B0. Deleted pass-2 block re-emission.
      2. emit_reg.go emitLoadSlotToReg: removed R130 layer 3 numericMode
         skip-unbox branch.
      3. emit_call_native.go: removed usedNumericBL post-BL special
         handling. Also emit_return.go numericMode branch + emit_compile.go
         num_epilogue label. np>=2 gate opened.

    Build: green. asm dump verified numeric entry emits box+STR+B B0
    correctly (ORR X0,X0,X24 then STR X0,(X26) then ORR X1,X1,X24
    then STR X1,8(X26) then JMP to pass-1 B0). Entry log confirms it
    runs at Tier 2 compile time.

    Test result: ack STILL HANGS. Debug trace:
      ExitDeopt proto=ack instrID=32 base=240 r0=0x1 r1=0xfffe...3
      ExitDeopt proto=ack instrID=32 base=350 r0=0x1 r1=0xfffe...2
      ... (base grows, r0 shifts through float-looking bits)

    Same v32 guard deopts. slot[0] holds raw (0x01 or IEEE-looking
    bits), slot[1] holds correct NaN-boxed value. Architectural fix
    covered ONE leak source but not all.

    R107 TCO ackermann test also times out — broader impact.

    Changes REVERTED (code back to R140 state + np==1 gate).
  passed: false   # hypothesis partially disproven

current_state_audit_summary: |
  # Key observation from R141 debug:
  #   r0 = raw int/float bits (unboxed)
  #   r1 = correctly NaN-boxed
  #
  # This asymmetry RULES OUT the numeric entry box code (I verified
  # both X0 and X1 get the same ORR+STR treatment; one being raw and
  # the other boxed means another writer is hitting slot[0] AFTER
  # the entry sets it). The second leak path must be specifically
  # writing to slot[0] only (not slot[1]), at a point where the
  # entry's fresh store hasn't re-fired yet.
  #
  # Hypothesis refinement — candidates for the second writer:
  #   (a) Tier 1's SELF-CALL path (tier1_call.go) advances mRegRegs
  #       and then the callee's entry LDRs args without going through
  #       the numeric path. If slot[0] of callee's window had a
  #       leftover raw value from a PREVIOUS call (via some cross-
  #       frame aliasing), it'd show here.
  #   (b) emitCallNative's step 8 arg-copy (line 189-195) copies from
  #       regs[funcSlot+1..] to callee's regs[0..]. If srcOff reads
  #       from a slot that somehow holds raw (a crossBlockLive value
  #       not boxed in storeRawInt's memory write), slot[0] gets raw.
  #   (c) A deopt-resume stub re-enters pass-1 without re-boxing
  #       slot[0] — the callee's regs[0] holds a RawInt Return value
  #       from a previous invocation; new call's entry sees it.

outcome:
  status: revert
  shipped_code: false
  primary_finding: >
    The architectural hypothesis that R130 dual-body is THE root
    cause is INCOMPLETE. Single-body collapse does NOT fix the hang.
    There's a secondary raw-slot leak specific to slot[0] (slot[1]
    is consistently boxed). R142+ needs to find that second writer.
  notes: >
    R142 plan: add runtime instrumentation that dumps slot[0] /
    slot[1] values at EACH key transition (numeric entry, normal
    entry, tail-copy post, arg-copy post, deopt entry) — not just at
    final deopt. The r0-stays-raw vs r1-gets-boxed asymmetry is a
    strong signal that a slot[0]-specific writer is leaking.

    Candidates named in the audit summary. Smart play: add a slot
    watchpoint via hooking Go-side execute loop to check slot[0]'s
    tag at every jit.CallJIT trampoline return. If tag fails, dump
    source (which frame, which code path) before the next JIT entry.

    The DeoptInstrID infrastructure + the revert leave the codebase
    at exactly R140's state. fib Tier 2 still works (~0.9s bench).
    Next round can be opened with zero technical debt.
