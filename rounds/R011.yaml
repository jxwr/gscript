outcome:
  status: hold                          # diagnostic finding, no code change
  bench_deltas: {}
  regressions: []
  commit: pending
  findings: >
    1. quicksort proto: 1602 insns, 59% load/store (from diag stats).
       Hot pattern = GetTable + SetTable on integer keys.
    2. Integer keys route to Table.RawGetInt (table_int.go:62), which
       dispatches on t.arrayKind via switch. For sort's random int
       array the arrayKind is ArrayInt; the switch arm runs
       `t.intArray[key]`. Switch overhead is real per access.
    3. Two commits between reference snapshot and HEAD affect this path:
         - 39b5ef3: shape system + split table.go
         - 6e1e543: uint32 shapeID for field access
       Neither directly changes integer-keyed access, BUT both enlarge
       the Table struct footprint, which may affect cache locality for
       the intArray load.
    4. make_random_array proto FAILED tier2 compile: "jit: unresolved
       label arith_done_11". That's a CORRECTNESS-ADJACENT bug in the
       tier2 pipeline — not the drift cause, but worth flagging.
    5. Drift magnitude (+14% = +6 ms on 42 ms) is small enough that the
       cache-locality + switch-dispatch hypothesis is plausible without
       further instrumentation. A proper fix would be Tier 2 feedback
       specialization: if an integer-keyed GetTable site always hits
       ArrayInt, emit the intArray load inline and skip the switch.

    STRUCTURAL CONCLUSION: sort drift sits in the same class as R3's
    sieve conclusion — it is emit-layer/IR-feedback-specialization
    territory, which is a larger class of work than a one-round fix.
    Recording as a future forward_classes candidate:
    "tier2-typed-array-ic" (per-site ArrayKind caching).

  unresolved_correctness_bug: >
    make_random_array tier2 compile fails with "unresolved label
    arith_done_11". Needs a separate round to fix — filing as R12
    candidate.

