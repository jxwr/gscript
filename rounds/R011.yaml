hypothesis:
  class: emit-layer-micro-optimization    # tentative; the diagnostic may surface a different class
  claim: >
    sort's quicksort inner loop is GetTable/SetTable-dominated on
    integer keys. Drift relative to the frozen reference likely comes
    from the ArrayKind dispatch switch added after reference was
    snapshotted (commits 39b5ef3 / 6e1e543). Integer-specialized
    ArrayInt path still walks the switch per RawGetInt call.
  expected_gain_pct: null               # diagnostic round
  expected_gain_mechanism: >
    Inspect diag/sort/quicksort.ir.txt + quicksort.asm.txt for the
    GetTable emit pattern; count arrayKind dispatch arms; look at
    git log between reference snapshot and HEAD for sort-adjacent
    changes.
  counterfactual_check: >
    (Not required for diagnostic rounds.)

