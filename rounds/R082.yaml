revert_prevention: >
  Layer 1 regression (leibniz_pi) shows that "stay Tier 1 until
  feedback fills" is too aggressive — some functions are called
  once from main and NEVER re-enter TryCompile to re-check. Proper
  L1 needs a different mechanism: e.g., populate feedback during
  interpreter execution BEFORE Tier 1 compile (requires moving
  EnsureFeedback earlier and ensuring interpreter populates even
  before Tier 1 handoff).

ledger_update:
  classes_touched: [correctness-bug-fix]
  new_class_introduced: null
  sub_pattern_learned: >
    Feedback-driven specialization has a chicken-and-egg problem
    in gscript's current architecture:
      - Interpreter populates feedback during execution
      - Tier 1 compiles after 1 call (BaselineCompileThreshold=1)
      - Tier 1 native bypasses interpreter except in slow-path
        handlers
      - Many common ops have Tier 1 fast paths that skip handler
      - Tier 2 promotion happens 1-2 calls later
      - Feedback fill rate is LOW for single-entry functions

    Proper fix requires ONE of:
      (a) Raise BaselineCompileThreshold to 5-10 (multiple interp
          runs first to fill feedback)
      (b) Extend Tier 1 to update feedback on fast paths
      (c) Separate "observation warmup" phase before first compile

    Each has cost: (a) start-up latency, (b) Tier 1 insn bloat,
    (c) architectural refactor.

    R82's L2 is defensive — if any path DOES populate feedback,
    L2's guards carry through. No-op otherwise.

