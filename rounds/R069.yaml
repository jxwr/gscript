    luajit:  {n: 30, min: 0.057, max: 0.059, median: 0.058, mean: 0.0579}
    verdict: >
      Median TIES at 0.058s. Mean diff: gscript 0.0575 vs luajit 0.0579
      = 0.4ms faster on average (0.7% win). Gscript floor (0.055)
      consistently below LuaJIT floor (0.057). So: not a clean median
      beat, but consistent small edge on mean + floor. Effectively a
      statistical tie with gscript slightly favored.

