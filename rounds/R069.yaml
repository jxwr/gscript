  new_class_introduced: null
  sub_pattern_learned: >
    R68's 10-sample median showed a 0.057 vs 0.058 win. 30-sample
    medians both sit at 0.058. The mean and minimum still favor
    gscript (gscript 0.0575/0.055, luajit 0.0579/0.057). The win is
    marginal (~1% faster mean) and distribution-overlap-heavy.

    For a confident "beat LuaJIT" claim, need >5% median gap.
    Mandelbrot at ~1% is TIE-WITH-EDGE. The user's goal "beat LuaJIT
    once" is LOOSELY met but not ROBUSTLY met.

    Lesson: publish median-of-30 results for "beat LuaJIT" claims,
    not median-of-10. rule 6 ("median-of-N") implicitly assumes
    sufficient samples to stabilize; at bench wall-times <= 100ms
    with run-to-run noise ~2ms, N=30 minimum is appropriate.

