# R90: MaxRecursion 3→5 exploration for call-heavy benches.
round: 90
date: 2026-04-19
follows: 89

type: tactical

target:
  benchmark: fib
  current_wall_sec: 1.439
  reference_wall_sec: 0.133
  luajit_wall_sec: 0.026
  gap_factor: 55.3

hypothesis:
  class: tier2-bounded-recursive-inline
  claim: >
    R73 set MaxRecursion=3 as a balance. Given R88/R89 observations
    that ARM64 superscalar forgives insn bloat cheaply, pushing
    MaxRecursion to 5 should expand fib's inlined body enough to
    amortize call-setup costs more aggressively. If this triggers
    the same regression class R35 hit, revert in-round.
  expected_gain_pct: [0, 20]       # optimistic upper, conservative lower
  expected_gain_mechanism: >
    Each extra inlining level doubles inlined body size but removes
    one call frame's worth of spill/reload/BLR. fib(15 bytecodes)
    × 8 inlined = ~120 bytecodes per depth 3 → ~480 at depth 5,
    still under inlineMaxCalleeSize=250 per function but the inlined
    body is pre-expansion. Needs measurement.
  counterfactual_check: >
    R35 mitigation (pass_inline ledger): "Any future attempt MUST
    bench the full suite AS PART OF pre-flight". I'll bench fib,
    ackermann, fib_recursive, mutual_recursion, binary_trees.
    If ANY regress > 3%, revert.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.33          # tier2-bounded-recursive-inline: 1 win (R31 ADR), 1 revert (R35)
  mitigation_required: false       # < 0.5
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    pipeline.go:316 — MaxRecursion=3. Changed by R73 (2→3). R35
    revert was about PROMOTION gating of small self-recursive
    functions, NOT about MaxRecursion depth — so the prior-revert
    lesson doesn't directly forbid this round, but rule 35
    mitigation still requires full-suite bench.

pre_flight:
  required:
    - description: no regression >3% on fib_recursive, mutual_recursion, binary_trees
      acceptance: interleaved 5-sample medians within ±3% of R89 baseline
      halt_on_fail: true
    - description: fib improvement (target)
      acceptance: fib median <= 1.35s (-6% from 1.439)
      halt_on_fail: false
    - description: no correctness regression
      acceptance: go test ./internal/methodjit/... green
      halt_on_fail: true
  result: >
    Methodjit suite green.
    Bench (5 samples each, medians):
      fib:             r89 1.439s → r90 1.440s (0%)
      ackermann:       r89 0.271s → r90 0.271s (0%)
      fib_recursive:   r89 1.437s → r90 1.436s (0%)
      mutual_recursion: r89 0.193s → r90 0.190s (-1.5%, noise)
      binary_trees:    r90 1.334s (baseline)
    No regressions. No improvements. MaxRecursion 3→5 is inert on
    these targets — probable reason: hasCallInLoop gate or callee-size
    gate prevents deeper inlining of the exact recursive callees here.
  passed: partial           # no regression, no movement

  surgical_scope: >
    pipeline.go: single constant change MaxRecursion 3 → 5.
  ir_diff_before: "MaxRecursion: 3"
  ir_diff_after:  "MaxRecursion: 5"

outcome:
  status: no-win
  bench_deltas:
    fib:             {r89: 1.439, r90: 1.440, pct: +0.1}
    ackermann:       {r89: 0.271, r90: 0.271, pct:  0.0}
    fib_recursive:   {r89: 1.437, r90: 1.436, pct: -0.1}
    mutual_recursion: {r89: 0.193, r90: 0.190, pct: -1.5}
  regressions: []
  shipped_code: true              # MaxRecursion=5 left in (no harm)
  commit: null
  deliverables:
    - internal/methodjit/pipeline.go — MaxRecursion 3→5 (inert)
    - rounds/R090.yaml — this card

revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: >
  Predicted 0-20% gain; actual 0%. Root cause: MaxRecursion bump is
  effectively blocked by hasCallInLoop or callee-size gates before
  extra inlining levels produce output. Without changing those gates,
  depth-5 never fires. A real call-heavy attack must target the
  gates themselves, not the depth constant.
revert_prevention: >
  Before a future "bump constant X" round: instrument to verify the
  constant is actually reached. If there's a gate before it, bumping
  the constant alone is a no-op (as here).

ledger_update:
  classes_touched: [tier2-bounded-recursive-inline]
  new_class_introduced: null
  sub_pattern_learned: >
    Constant knob bumps (R90: MaxRecursion 3→5) are inert when
    upstream gates (hasCallInLoop, callee-size) fire first. Future
    inline rounds must first verify the gate path fires at all
    before tuning depth.
