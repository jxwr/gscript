# R126: dual-body emit pass 2 — numeric variant blocks with prefixed labels.
round: 126
date: 2026-04-19
follows: 125

type: architecture

target:
  benchmark: fib
  current_wall_sec: 1.407

hypothesis:
  class: tier2-recursion-closure
  claim: >
    Layer 2-5 of the numeric calling convention require the body to
    be compiled in a numeric-aware variant. R126 lays the pass-2
    infrastructure: after the normal body is emitted (with its
    t2_numeric_self_entry_N pointing into normal body for now),
    optionally emit a second body with prefixed block labels
    ("num_B0", "num_B1"...) and a numeric prologue that does NOT box.
    Body-level per-op changes (LoadSlot raw, GuardType pass-through,
    Return raw, deopt box) are R127.

    R126 validates: second emit pass completes, labels are unique,
    suite tests remain green (numeric entry still routes to pass 1
    via t2_numeric_self_entry_N — pass 2 is dead code at the end of
    the code block).

  expected_gain_pct: [0, 0]      # infrastructure only
  counterfactual_check: >
    Pass 2 as dead code wastes instruction-cache space. For small
    fib-class protos (~500 insns), acceptable doubling (~1000).
    Larger protos wouldn't qualify for numeric (>4 params, upvals,
    nested).

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.5
  mitigation_required: false

pre_flight:
  required:
    - description: Compile for qualifying proto produces larger code (pass-2 present)
      acceptance: cf.Code bigger with pass 2 than without
      halt_on_fail: true
    - description: full methodjit suite green
      acceptance: ok
      halt_on_fail: true
  result: >
    Attempted dual-body emission hit a wall of label-collision issues
    beyond block labels (e.g., call_continue_%d, global_continue_%d,
    deferred resume points, etc. — many label-emitting sites use
    instr.ID-suffixed fixed names). Each site would need
    numericMode-aware prefixing. Too invasive for a single round.

    Shipped infrastructure (harmless):
      - ec.numericMode / ec.numericParamSlots fields + population
        when proto qualifies.
      - ec.blockLabelFor(block) helper (used by emitBlock +
        emit_dispatch's jump/branch sites) — prefixes "num_" when
        numericMode.
      - Updated emit_dispatch.go trueTrampolineLabel to prefix.
      - emitNumericBody stub for future rounds.

    DID NOT ship pass-2 emit (reverted). Running emitBlock twice
    triggers duplicate-label panics at call_continue, global_continue,
    and deferred resume sites. A correct implementation must audit
    every fmt.Sprintf("...%d", instr.ID) pattern in emit_*.go.

    R124's numeric entry (boxes at entry, same body as normal) is
    preserved. Arc R121-R126 is complete at layer-1 state with
    layers 2-5 left as future work.
  passed: partial

  surgical_scope: >
    emit_compile.go: numericMode + numericParamSlots + blockLabelFor;
    emit_dispatch.go: trueTrampolineLabel prefixing. Pass-2 emit
    attempted and reverted — too many label-collision sites.

outcome:
  status: adr-win            # infrastructure shipped; pass-2 deferred
  bench_deltas: {}
  regressions: []
  shipped_code: true
  commit: null
  deliverables:
    - internal/methodjit/emit_compile.go — numericMode, numericParamSlots, blockLabelFor helper, emitNumericBody stub
    - internal/methodjit/emit_dispatch.go — trueTrampolineLabel prefixing
    - rounds/R126.yaml — this card

revert_class: scope-breach
revert_prevention: >
  Dual-body emission is NOT a single-round change. Any future attempt
  must first audit ALL label-emitting fmt.Sprintf sites in emit_*.go
  (~10+ patterns), then prefix each. Estimate 5-8 hours focused work.

ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null
  sub_pattern_learned: >
    Dual-body emit in a method-JIT requires more than block labels
    to be prefixed — every instr-ID-based label pattern (deferred
    resumes, call-exits, global-exits, table-exits) shares IDs
    across passes and will collide. Refactor to pass-aware
    label-generation across ALL emit_*.go files first, THEN attempt
    the second body emit pass.
