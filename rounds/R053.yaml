ledger_update:
  classes_touched: [tier2-dense-matrix-kind]
  new_class_introduced: null
  sub_pattern_learned: >
    Architectural lesson: passes that introduce new pure ops
    (MatrixLowerPass's Flat/Stride) MUST be followed by CSE. The
    "pure op introduced by a later pass misses LoadElim" pattern
    generalizes. When adding a pass that introduces idempotent
    ops, either (a) dedupe within the pass (R48 attempt, reverted
    as useless because hoisting already happened), or (b) re-run
    LoadElim after the pass. (b) is cleaner — single authoritative
    CSE implementation.

notes: >
  nbody_dense gap_factor: 6.37 → 5.14 (gap to LuaJIT 0.035s).
  Cumulative R51+R52+R53 gain on nbody vs legacy nbody.gs:
