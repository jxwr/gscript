# R53: LoadElim for pure ops (GetGlobal, MatrixFlat, MatrixStride) + 2nd pass.
round: 53
date: 2026-04-18
follows: 52

type: tactical

target:
  benchmark: nbody_dense
  current_wall_sec: 0.223
  luajit_wall_sec: 0.035
  gap_factor: 6.37

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Post-R52 nbody_dense IR shows 29 MatrixFlat + 29 MatrixStride
    + 61 GetGlobal, all duplicates on the same `bodies` matrix
    pointer. LICM hoists them to the function's entry block B11,
    so they run once per advance() call × 500K calls × ~5 insns
    each × 58 dup meta-ops = ~145M redundant insns.
    Extend LoadEliminationPass to CSE OpGetGlobal + OpMatrixFlat +
    OpMatrixStride (all pure in the absence of SetGlobal / calls),
    and run LoadElim a second time AFTER MatrixLowerPass so that
    the Flat/Stride ops it generates get deduplicated.
  expected_gain_pct: [8, 20]
  expected_gain_mechanism: >
    Reduce B11 initialization cost per advance() call. 29 Flat →
    1, 29 Stride → 1, 61 GetGlobal → ~10 distinct globals. Savings
    per advance() call: ~50 guard+LDR insns. At 500K calls × 50
    insns × 0.3ns = 7.5ms (at 8 IPC effective: ~3ms).
    Empirical: realized -19.3% on nbody_dense, higher than model —
    guard-per-op cost is higher than 0.3ns on the Apple M4 path.
  counterfactual_check: >
    Runs LoadElim twice: safe because it's idempotent. CSE of
    OpGetGlobal is conservative — killed on OpSetGlobal / OpCall
    to avoid miscompile. No benchmark regressions observed
    (matmul_dense / nbody / sort / sieve / spectral_norm / fib /
    fannkuch all stable within noise).

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0           # tier2-dense-matrix-kind: 0 reverts
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Re-read post-R52 diag/nbody_dense/advance.ir.txt: 61/30/29/29
    histogram of GetGlobal/MatrixStride/MatrixFlat/...
    Source of duplication: IntrinsicPass rewrites each matrix.getf
    call independently, emitting fresh GetGlobal + MatrixFlat +
    MatrixStride per call site. Without CSE, LICM promotes all of
    them to the preheader — correctly placed, but still N copies.

