outcome:
  status: bench-win
  shipped_code: true
  primary_win_bench: fib
  primary_win_pct: -3.4   # incremental vs R143 (0.916→0.885)
  notes: |
    R141 attempted this collapse but failed because the rawIntRegs
    state leak (R143's bug) was still unfixed. With R143 in, the
    collapse lands cleanly.

    np==1 gate (inherited from R143) keeps ack/mut at Tier 1 for now.
    hasTailCall() helper is defined but not yet consulted. The user's
    stated goal ("Tier 2 必须比 Tier 1 快") is not fully met — ack
    Tier 2 is currently +60% slower than Tier 1 because Tier 2's
    self-call always uses a 128-byte frame (saves X19-X28 +
    optionally D8-D11) vs Tier 1's 16-byte self_call_entry frame
    that skips most callee-saved saves. For tail-call-dominated
    protos, the 112-byte extra save/restore per recursion level
    dominates all of Tier 2's optimization benefits.

    To truly beat Tier 1 for ack (R145+ scope):

      (a) Per-proto regalloc-aware frame sizing: count max physReg
          used by regalloc + emit a frame that only saves up to
          that. For ack (uses X20-X23), save 3 pairs = 48B + 16B
          FP/LR = 64B. Saves ~12-20 insns per call.

      (b) A dedicated Tier 2 self-call entry that assumes the caller's
          register state matches the callee's (same proto, same
          regalloc) — skip callee-saved save entirely on self-call.
          Similar to R40's t2_self_entry idea but with 16-byte frame.

      (c) Inline tail-call expansion: for tail calls to the same
          proto, recognize that register state is compatible and
          use a direct jump within the same frame (no SP change).
          Closest analog to Tier 1's tail call efficiency.

    All three are architecture-level work; each is a 1-2 round
    effort. The np==1 gate ensures we don't ship a regression while
    this work happens; opening it (planned for R145) exposes ack
    Tier 2's inherent cost.

    Shipping: single-body collapse is a net win (fib -3.4% further),
    architectural hygiene (no more dual-body ABI confusion), and the
    codebase is now in a state where R145+ optimizations can build
    on a solid foundation.
