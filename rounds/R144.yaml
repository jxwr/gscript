#       gate. fib Tier 2 -37.3% vs pre-arc baseline, no regression on any
#       bench. ack kept Tier 1 via hasTailCall gate (Tier 2 frame overhead
#       makes it slower; R145+ will address).
round: 144
date: 2026-04-19
follows: 143

type: architecture

target:
  benchmark: fib
  also_measured: [ackermann, mutual_recursion]

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R143 fixed the rawIntRegs compile-state leak that caused ack to
    hang under np>=2. That unblocked the R141-proposed single-body
    architectural collapse (pass-2 is just a box-and-jump trampoline
    into pass-1). R144 lands that collapse AND adds a `hasTailCall`
    gate so we don't promote tail-call-dominated protos where Tier 2's
    128-byte frame per self-call level beats Tier 1's 16-byte
    self_call_entry.

  expected_gain_pct: [-38, -36]   # fib gap cut

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25
  mitigation_required: false

pre_flight:
  required:
    - description: all methodjit tests green, no bench regressions
      acceptance: ok
      halt_on_fail: true
  result: >
    Architectural simplifications (emit_compile.go):
      - emitNumericBody: thin trampoline (save frame + NaN-box X0..X(N-1)
        via ORR + STR + B to pass-1 B0). No pass-2 block re-emission.
      - num_epilogue label REMOVED. Normal epilogue / t2_direct_epilogue
        handles all Return paths.

    emit_reg.go: R130 layer 3 (numericMode skip-unbox at LoadSlot)
    REMOVED. Param slots always hold NaN-boxed values.

    emit_call_native.go: R137 Layer 4 (raw-int-return consumption)
    REMOVED — callers always read BRV. R143 rawIntRegs save/restore
    KEPT (still needed because emitReloadSelectiveForCall in the
    post-BL path mutates ec.rawIntRegs, leaking into the mutually-
    exclusive exit-handler emit).

    emit_return.go: numericMode branch REMOVED.

    func_profile.go: added hasTailCall() helper RESERVED for future
    frame-aware gating (R145+). The existing np==1 gate inherited from
    R143 still keeps ack (np=2) and mut (mutual-recursion) at Tier 1,
    so ack/mut numbers are unchanged in this round.
  passed: true

