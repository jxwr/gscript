# R152: diagnostic — identified the REAL Tier-2 promotion blocker for
#       object_creation / sort / sieve / binary_trees. It is NOT
#       hasCallInLoop (inline collapses the call tree fine). It is the
#       smart-tiering thresholds themselves: create_and_sum is only
#       called once from main (CallCount=1 < threshold 2) and has
#       LoopDepth=1 (< OSR threshold 2). Widening OSR to LoopDepth>=1
#       caused a hang — non-trivial interaction. R153+ needs a different
#       gate-widening shape.
round: 152
date: 2026-04-19
follows: 151

type: diagnostic

target:
  benchmark: multi  # object_creation + sort + sieve + binary_trees

hypothesis:
  class: tier2-bounded-recursive-inline
  claim: >
    R151 hypothesized hasCallInLoop was the blocker. R152 instruments
    shows the inline pass (with MaxRecursion=5, MaxSize=500) does in
    fact collapse create_and_sum's call tree: POST-INLINE the IR has
    ZERO OpCall in or out of loop. So hasCallInLoop wouldn't even
    reject. The ACTUAL blocker is upstream: the proto never reaches
    compileTier2 because shouldPromoteTier2 returns false.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null

pre_flight:
  required:
    - description: >
        Instrument RunTier2Pipeline with InlineGlobals to dump
        post-inline IR for create_and_sum / transform_chain and
        count remaining OpCall in loops.
      acceptance: report counts
      halt_on_fail: true
  result: |
    Added TestR152_InlineInvestigation that runs the full pipeline on
    create_and_sum + transform_chain with InlineGlobals populated
    from the proto tree. Both post-pipeline IRs contain ZERO OpCall
    (in or out of loop). Inline succeeds completely.

    Then instrumented with -jit-stats on the actual benchmark:
      `Tier 2 attempted: 0`  →  create_and_sum is NEVER offered
      to compileTier2 in the first place. shouldPromoteTier2
      returns false for it.

    shouldPromoteTier2 policy for create_and_sum (func_profile.go:221):
      profile.HasLoop = true
      profile.ArithCount = high
      profile.CallCount = 3 (calls to new_vec3, vec3_add, vec3_length_sq)
      → Clause: HasLoop && ArithCount >= 1 → return runtimeCallCount >= 2

    runtimeCallCount = proto.CallCount, which is the VM's "number of
    times this proto was invoked". create_and_sum is called ONCE from
    main. It never reaches 2. Tier 2 never fires.

    OSR fallback path (tiering_manager.go:167):
      profile.HasLoop && profile.LoopDepth >= 2 → enable OSR
      create_and_sum has LoopDepth = 1 (single for-loop). OSR never
      fires either.

    Same pattern for transform_chain, sort's main, sieve's main, etc.
    They all have single-depth loops called once → stuck at Tier 1.
  passed: true

  # Voluntarily fill TDD fields for the correctness-adjacent probe.
  failing_test: "internal/methodjit/r152_inline_diag_test.go (removed post-round)"
  failing_output: >
    create_and_sum post-inline: 0 OpCall in loop, 0 out of loop
    transform_chain post-inline: 0 OpCall in loop, 0 out of loop
  surgical_scope: null
  ir_diff_before: null
  ir_diff_after: null
  bisect_range: null

current_state_audit_summary: |
  # The blocker we found with a one-line code change and immediately
  # reverted:
  #
  # tiering_manager.go:167
  #   OLD: if profile.HasLoop && profile.LoopDepth >= 2 { OSR }
  #   NEW: if profile.HasLoop && profile.LoopDepth >= 1 { OSR }
  #
  # Result: object_creation HUNG (did not complete within 60s, usually
  # completes in <1s). Reverted.
  #
  # Hypothesis for the hang: widening OSR to LoopDepth=1 caused the
  # OSR exit to fire inside a function whose Tier 2 compile was later
  # rejected (by hasCallInLoop OR some other gate), and the VM
  # re-dispatched to Tier 1, which fired OSR again, creating a tight
  # Tier 1 ↔ Tier 2 dispatch loop. OR: Tier 2 compiled successfully
  # but hit a correctness bug in its driver-loop body that we hadn't
  # exercised before (since these protos have never run Tier 2 in
  # production).
  #
  # Either diagnosis is a multi-round debugging effort — the 4-round
  # budget for R152-R156 will not fit it plus the subsequent fix.
  #
  # **R153 needs a narrower widening** that bounds the risk. Options:
  #   (A) Raise runtimeCallCount gate from >=2 to >=1 ONLY for protos
  #       whose post-inline IR has no OpCall (forces a pre-compile
  #       simulation).
  #   (B) Widen OSR gate to LoopDepth>=1 BUT only for protos passing
  #       a stricter profile test (pure-compute, no allocation).
  #   (C) Land a "main-driver-promote" variant for once-called protos
  #       whose caller is <main> (pattern: `result := f(N)` at top
  #       level, common across the blocked benchmarks).
  #   (D) Give up on cluster D, close the 10-round arc at R153 with
  #       the findings documented.
  #
  # Per user guidance "big optimizations", option (C) is closest to
  # a R72-shaped architectural move — main-driver-promote already
  # exists for <main> (line 205 of func_profile.go); extend a
  # SIMILAR exception for "called-once-from-main" top-level
  # functions.

verify:
  result: >
    Code reverted (1-line revert of tiering_manager.go:167).
    Methodjit suite green. No benchmarks re-measured (no committed
    code).

outcome:
  status: adr-win
  shipped_code: false
  primary_win_bench: none
  primary_win_pct: 0
  reverted_in_round: true
  notes: |
    Consequential finding: the "6+ blocked benchmarks" from R151's
    agent scout are NOT blocked by hasCallInLoop as originally
    framed. They're blocked by the CallCount>=2 and LoopDepth>=2
    gates in shouldPromoteTier2 / OSR-enable. This is a valuable
    correction to the R151 direction. R153 retargets with one of
    options A-D (or a hybrid). Time-budget reality: 4 rounds
    remain, so the simplest option (C — extend main-driver-promote
    to once-called top-level functions) is the most likely to
    ship a measurable gain in the budget.

    The OSR-widening hang is interesting by itself: something in
    the Tier 1 → OSR → Tier 2 flow has a latent hazard that only
    fires for LoopDepth=1 protos. That's a SEPARATE correctness
    concern that should be logged but not fixed in this arc.

revert_class: data-premise-error
revert_root_cause_location: rounds/R151.yaml (hypothesis named wrong blocker)
revert_cost_model_delta: |
  Predicted: widening hasCallInLoop gate unlocks 6 benchmarks.
  Actual: hasCallInLoop is fine; the gate is upstream
  (shouldPromoteTier2 CallCount/LoopDepth thresholds).
  The widening TRIED (OSR LoopDepth>=1) caused a hang, revealing
  a latent bug in the OSR dispatch chain.
revert_prevention: |
  Scout agents that propose arc targets MUST verify the predicate
  they identify with a `-jit-stats` run, not just by reading
  source. R151's scout cited the `hasCallInLoop` error message
  from stats.json but those stats come from CompileForDiagnostics
  (no callVM = no inline globals = residual OpCall) — the
  diagnostic path's diagnostic, not production's. A 30-second
  `-jit-stats` check would have surfaced "Tier 2 attempted: 0"
  and revealed the actual blocker.

ledger_update:
  classes_touched:
    - tier2-bounded-recursive-inline
  new_class_introduced: null
