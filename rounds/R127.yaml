future_arc_recipe: >
  To complete layers 2-5 (dual-body numeric emit) in a future session:

  Phase A (label-system refactor, 1-2 rounds):
    1. Audit all fmt.Sprintf in emit_*.go that produce labels. Count:
       ~10+ sites across emit_call_exit.go, emit_call_native.go,
       emit_dispatch.go, emit_matrix.go, emit_table_array.go, etc.
    2. Introduce ec.labelSuffix() helper or similar that returns ""
       normally and "_num" in numericMode. Prefix all such labels.
    3. uniqueLabel: verify counter state is reset between passes
       (so labels don't accidentally match). Or use a per-pass
       counter.

  Phase B (pass-2 emit, 2-3 rounds):
    4. Compile() runs emitNumericBody after normal body + epilogue.
    5. Numeric prologue stores raw int (no box) + sets rawIntRegs
       for param slot LoadSlot IDs.
    6. emitLoadSlot: numericMode + param slot → rawInt load +
       storeRawInt.
    7. emitGuardType: numericMode + Arg in rawIntRegs → pass through.
    8. emitReturn: numericMode → skip box + skip ctx writes + raw X0
       + branch to t2_numeric_epilogue.
    9. emitDeopt: numericMode → box all live rawIntRegs to memory
       before exit-resume.

  Phase C (caller raw consume, 1 round):
    10. emit_call_native: in numeric dispatch, after BL, storeRawInt
        X0 to SSA home (skip the post-call BaselineReturnValue read
        + storeResultNB).

  Phase D (validation, 1 round):
    11. Correctness: compareTier2Result on fib/ack/mut + deep
        recursion gate via countdown-class test.
    12. Bench: 15-sample interleaved median on fib/ack/mut.
    13. Arc close.

  Total: 6-8 rounds (~1 focused week). Projected gain: fib
  additional 10-25% beyond current -2.8%. Combined with R107-R124:
  -12-28% total from R107 baseline on call-heavy.

ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null
  sub_pattern_learned: >
    A "simple dual-body emit" in a production method-JIT is never
    simple — compilation state, labels, deferred resumes, and deopt
    paths all implicitly assume single-emit-per-function. Retrofitting
    needs a label-system audit first (Phase A), which is dull but
    mechanical work. Don't start Phase B without it.

notes: >
  Arc stats: 7 rounds (R121-R127), 0 reverts outside R126's internal
  revert, 7 adr-wins, 0 bench-wins this arc (bench-wins are from
  the predecessor R107-R120 arc).

  Running cumulative call-opt (R107-R126, spanning both arcs): fib
  -2.8%, ack -3.7%, mut -2.6%. Infrastructure in place (mono IC,
  static self, Numeric layer 1) for future HotSpot-class completion.

  For gscript to approach LuaJIT fib (26ms = 55x better than current):
  method-JIT can do maybe 2-4x (HotSpot territory) with full numeric
  convention + deeper inlining. LuaJIT's trace flattening is another
  5-10x beyond that — which is why HotSpot is also 2-4x slower on
  fib than LuaJIT. The "big lever" for closing the LuaJIT gap isn't
  method-JIT tuning — it's a trace-JIT layer, which gscript doesn't
  have.
