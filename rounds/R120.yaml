# R120: extend numeric self-call entry to 2 int args (ackermann pattern).
round: 120
date: 2026-04-19
follows: 119

type: tactical

target:
  benchmark: ackermann
  current_wall_sec: 0.270
  luajit_wall_sec: 0.006
  gap_factor: 45.0

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R119 shipped t2_numeric_self_entry_1 (1-arg). Extend to 2-arg
    variant (t2_numeric_self_entry_2) so ackermann's pattern
    `ack(m-1, n)` also benefits. Same mechanism: caller puts raw
    ints in X0,X1; entry boxes both and stores to regs[0..1];
    jumps to B0.
  expected_gain_pct: [0, 2]

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.5
  mitigation_required: false

pre_flight:
  required:
    - description: suite green
      acceptance: ok
      halt_on_fail: true
    - description: ack correctness
      acceptance: compareTier2Result passes
      halt_on_fail: true
  result: >
    Tests green. 10-sample fib median r111 1.428 → r119+r120 1.440
    (+0.8% regression). 2-arg extension + 1-arg pilot both reverted.
  passed: false

  surgical_scope: >
    emit_compile.go: add t2_numeric_self_entry_2 label (2-param variant).
    emit_call_native.go: generalize isNumericSelfCall + dispatcher to
    handle nArgs in {1, 2}.

outcome:
  status: revert
  bench_deltas:
    fib: {r111: 1.428, combined: 1.440, pct: +0.8}
  regressions: [fib]
  shipped_code: false
  commit: null

revert_class: cost-model-error
revert_cost_model_delta: >
  See R119 autopsy. 2-arg extension didn't save either; combined
  with R119 the arc is rollback-only. Numeric convention requires
  full pipeline (raw args + raw return + body rewrite); half
  measures don't clear the overhead.
revert_prevention: >
  For future numeric-convention attempts: build the ENTIRE path
  before shipping. Prototype: emit both normal and numeric body
  versions. Dispatch picks at call site. Measure the full pipeline
  vs pure baseline, not half-steps.

ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null
  sub_pattern_learned: >
    Rerouting arg transport alone doesn't help — HotSpot-class
    savings on fib/ack need the numeric convention END-TO-END
    (skip box on caller, skip unbox in callee body, skip box on
    callee return, skip unbox on caller return).
