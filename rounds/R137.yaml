# R137: retry R131's Layer 4 (raw int return) under live Tier 2.
#       Marginal fib -0.4% (interleaved median 0.928 → 0.924).
round: 137
date: 2026-04-19
follows: 136

type: architecture

target:
  benchmark: fib

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R131 implemented Layer 4 (pass-2 emitReturn returns raw int64 in
    X0 via new `num_epilogue`; caller post-BL consumes raw X0 directly,
    skipping LDR BaselineReturnValue). At the time fib/ack were Tier-2
    dead code, so the observed +0.6% regression was noise. Now R132
    has fib in Tier 2. Re-apply Layer 4, measure under live Tier 2.

    Predicted savings (per fib call):
      callee: -1 box (ORR) -1 STR regs[0] -1 STR BRV = ~3 insns
      caller: -1 LDR BRV (replaced by +1 ORR box into scratch) = net 0
    Total per call: ~3 insns × 29M = 87M insns ≈ 22ms = 2-3% of fib.

  expected_gain_pct: [-3, -1]

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25

pre_flight:
  required:
    - description: methodjit suite green + fib/ack/mut correctness
      acceptance: ok
      halt_on_fail: true
  result: >
    Suite green, fib(35)=9227465, ack/mut correct. Layer 4 shipped:

      emit_compile.go: `num_epilogue` label emits MOVimm X1,0 → STR
        ExitCode (preserves X0), then full callee-saved restore + RET.
        Gated on numericParamCount > 0 && HasSelfCalls.

      emit_return.go: pass-2 emitReturn in numericMode resolves raw
        int to X0, skips STR regs[0] + STR BRV, B num_epilogue.

      emit_call_native.go: caller sets usedNumericBL=true when
        isNumericStaticSelfCall && funcSlot >= numericParamCount. The
        extra gate is safety for pass-2 LoadSlot — funcSlot inside
        numericParamSlots would re-read NaN-boxed as raw (corrupt).
        Those cases fall through to the R110 t2_self_entry path
        (pass-1, writes BRV normally). Post-BL when usedNumericBL:
        EmitBoxIntFast X1, X0, mRegTagInt + STR X1, regs[funcSlot]
        (deopt safety) + reload live + storeRawInt(X0, instr.ID).

  passed: true

verify:
  result: >
    Interleaved 15-sample pair measurement vs R136 baseline:

      R136 median: 0.928s
      R137 median: 0.924s   → -0.4% (small but consistent)

    Predicted -2-3% did NOT materialize in full; M4 pipeline
    scheduling absorbs most of the ~3-insn savings (same pattern as
    R135's R112+R113 re-apply). The NEGATIVE fraction of the
    prediction did land, unlike R131's false +0.6% on dead code.

    ack: 0.272s (Tier 1, np==1 gate, stable)
    mut: 0.195s (Tier 1, stable)

    Cumulative fib progress across the numeric-conv arc:
      R131 pre-Tier-2:  1.401s (gap 53.9x)
      R132 Tier 2 on:   0.858-0.928s (gap 33-35x)
      R137 Layer 4:     0.924s median (gap 35.5x)

outcome:
  status: bench-win
  shipped_code: true
  primary_win_bench: fib
  primary_win_pct: -0.4
  notes: >
    Second (marginal) bench-win in the numeric-conv arc, post-R132
    unblock. Confirms R131's "regression" was genuinely noise on
    dead code — Layer 4 is actually net neutral-to-positive under
    live Tier 2. The saved insns don't translate fully to wall-time
    due to M4 pipeline scheduling (consistent with R135 finding on
    R112/R113).

    Remaining opportunities for this class:
      - Fix ack Tier 2 hang (R136 found pre-existing Tier 2 bug for
        2-param recursive-self protos, surfaced by R132 gate open).
        User requested deferred fix.
      - Layer 5: the R131 plan mentioned deopt-time boxing of live
        rawIntRegs. emitStoreAllActiveRegs already boxes rawIntRegs
        before writing to memory, so Layer 5 is effectively already
        live. No new work needed.
      - fib body micro-optimizations inside pass-2 (not call-ctx).
