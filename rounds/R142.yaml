# R142: runtime watchpoint pinpoints the raw-slot source — the v29 tail-
#       call exit at executeCallExit sees arg0=RAW 0x01. Step 1 of
#       emitCallNativeTail should box it but apparently isn't.
round: 142
date: 2026-04-19
follows: 141

type: diagnostic

target:
  benchmark: ackermann

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R141 narrowed the bug to a slot[0]-specific raw writer in Tier 2
    ack. R142 installs a runtime watchpoint (pre/post CallJIT + intra
    executeCallExit) to pinpoint exactly where/when slot[0] transitions
    from boxed to raw.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25

pre_flight:
  required:
    - description: watchpoint installed + repro run
      acceptance: raw-writing path observed
      halt_on_fail: true
  result: >
    Installed R142-env-gated watchpoint in executeTier2 (log slot
    values at every CallJIT boundary) and in executeCallExit (log
    args being passed to callVM.CallValue). Ran TestR138_AckTier2Hang
    with R142=1.

    Observed trace pattern:
      ...boxed state for many recursive calls...
      executeCallExit proto=ack base=130 callSlot=2 CallID=171
        fnVal=...  arg0=0x01 (RAW)  arg1=0xfffe...3 (boxed)
      pre-CallJIT proto=ack base=240 codePtr=0x...000 regs[base]=0x01
      post-CallJIT proto=ack base=240 ExitCode=2 DeoptInstrID=32
        regs[base]=0x01
      ...subsequent deopts cascade with accumulating raw bits in r0...

    Critical finding: the RAW arg0 is read by executeCallExit at
    regs[absSlot+1] = regs[base+callSlot+1] where callSlot=2 (v29's
    bytecode funcSlot). That slot is set by emitCallNativeTail's
    Step 1 (line 395-401):
       argReg := resolveValueNB(instr.Args[i].ID, jit.X0)
       ...
       STR X0, slotOffset(funcSlot+i)

    For v29 = Call(ack, v23, v28), i=1 should box v23 (rawIntReg in
    pass-2 numericMode, storeRawInt sets rawIntRegs[v23]=true). The
    box path in resolveValueNB calls EmitBoxIntFast (UBFX+ORR) into
    scratch X0 — that should produce a NaN-boxed value.

    But the VALUE at regs[base+3] is RAW 0x01 — not boxed. Possible
    causes (narrowing):
      (a) `rawIntRegs[v23]` was cleared by emitReloadSelectiveForCall
          (called in emitCallNative post-BL of the INNER v28 call,
          line 321). If v23 is liveAcrossCall for v28, reload fires
          and clears rawIntRegs[v23]. Then resolveValueNB returns
          physReg DIRECTLY without boxing — if physReg still holds
          RAW bits (reload only wrote memory then cleared the flag
          without actually updating the register??), STR writes raw.
      (b) Some other path between v28 emit and v29 emit writes raw
          to the same physReg bypass rawIntRegs tracking.
      (c) emitCallNativeTail's Step 1 STR happens AT A point where
          X0 still holds something from an earlier UBFX (not re-
          loaded from resolveValueNB).
  passed: true

current_state_audit_summary: |
  # R142 watchpoint snapshot (key transition):
  #
  # BEFORE transition:
  #   regs[base=130] = 0xfffe000000000003 (boxed m=3)
  #   regs[base=131] = 0xfffe000000000001 (boxed n=1)
  # EXIT (ExitCode=3 = ExitCallExit, CallID=171):
  #   callSlot=2 (= v29 funcSlot in bytecode)
  #   arg0 = regs[131+2] = regs[133] = 0x01 (RAW!)  ← the bug
  #   arg1 = regs[134] = 0xfffe000000000003 (boxed)
  # AFTER vm.call to new ack invocation:
  #   regs[base=240] = 0x01 (raw, from args[0])
  #   Pass-1 entry GuardType fails → deopt → retry loop → hang.
  #
  # Step 1 of emitCallNativeTail writes to regs[funcSlot+1+i]=regs[3]
  # of caller's frame = regs[130+3]=regs[133]. This write should be
  # boxed. Observation shows raw.
  #
  # ASYMMETRY arg0 vs arg1: arg1 (v28 = inner Call result) is boxed;
  # arg0 (v23 = SubInt result in pass-2 numericMode) is raw. Between
  # v28's emit and v29's emit, something CLEARS the boxing on v23's
  # physReg OR skips resolveValueNB's EmitBoxIntFast path.
  #
  # Most likely: emitReloadSelectiveForCall between v28 and v29
  # reloads v23 from memory (boxed) but clears rawIntRegs[v23],
  # yet HE reloaded value lands in a physReg that subsequently gets
  # CLOBBERED by v28's post-BL storeRawInt (which also writes into
  # v28's physReg — if v23 and v28 share a physReg by regalloc, the
  # storeRawInt clobbers v23's boxed reload with v28's raw bits).

outcome:
  status: adr-win
  shipped_code: false
  primary_finding: >
    The raw-slot leak is at emitCallNativeTail's Step 1 STR for v29.
    Specifically, v23 (m-1 SubInt result) has its boxed state
    clobbered between the inner v28 call and the outer v29 tail call,
    likely due to physReg aliasing with v28's storeRawInt. Next
    round verifies this with targeted instrumentation of rawIntRegs
    state transitions around calls, and fixes the reload / storeRaw
    interaction.
  shipped_artifact: >
    No production code change this round — instrumentation reverted.
    Architectural understanding upgraded: the bug is a REGISTER
    ALIASING issue in the numeric-conv post-BL sequence, not a
    design-level ABI mismatch (R139) nor a general dual-body
    invariant issue (R141). The NARROW attack surface is:
    emit_call_native.go:312-322 (the `if usedNumericBL` post-BL
    block that calls storeRawInt — it might alias v23's physReg).
  notes: >
    R143 fix candidate:
      Verify that `ec.rawIntRegs[v23]` is still TRUE when v29's Step
      1 reaches `resolveValueNB(v23)`. If false, trace which
      intervening emit cleared it. If true but the physReg content
      is clobbered, trace which emit wrote to the same physReg.

    The regalloc map from diag shows:
      v23 -> X22, v28 -> X21, v29 -> X23, v27 -> X23
    So v23 is in X22, v28 in X21 — no direct aliasing. But X23 is
    shared between v27 (inner call's arg2) and v29 (outer call's
    result slot). Unclear yet if this matters.

    Instrumentation from R140+R142 combined (DeoptInstrID +
    watchpoint infrastructure) remains shippable. CLAUDE.md rule 30
    still valuable. fib bench unchanged at ~0.9s.
