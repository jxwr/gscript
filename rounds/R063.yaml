# R63: transpose-B matmul variant — no measurable improvement.
round: 63
date: 2026-04-18
follows: 62

type: diagnostic

target:
  benchmark: matmul_dense
  current_wall_sec: 0.038
  luajit_wall_sec: 0.021
  gap_factor: 1.81

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Precompute bT = transpose(b) before the matmul so the inner k-loop
    reads a[i][k] and bT[j][k] — both stride-1 in DenseMatrix flat
    backing. Expected: cache prefetcher wins, -5% to -15%.
  expected_gain_pct: [5, 15]
  expected_gain_mechanism: >
    Original b[k][j] access strides by N=300 rows × 8 bytes = 2400
    bytes per k-iter. L1d has 64B lines → 1 cache line hit per 8 b
    accesses. With transpose: stride 8 bytes → 8 hits per cache line.
    Theoretical ~8× fewer L1d fills on b loads.
  counterfactual_check: >
    For N=300, each matrix is 720KB — fits in M4's 4MB L2. The
    prefetcher may already handle stride-N access for this size.
    Below some threshold, access pattern doesn't matter.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: false

