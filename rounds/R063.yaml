revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: >
  Predicted -5 to -15%. Measured 0%. Model assumed N=300 was cache-
  dominated; reality: matrices fit in L2 cache (720KB × 3 < 4MB).
  Access pattern is irrelevant at this size.
revert_prevention: >
  For cache-access-pattern optimizations, verify workload exceeds
  cache size. At N=1000 (8MB matrices) transpose-B might matter;
  at N=300 (720KB) it doesn't.

ledger_update:
  classes_touched: [tier2-dense-matrix-kind]
  new_class_introduced: null
  sub_pattern_learned: >
    M4's prefetcher + L2 cache handle stride-N DenseMatrix access
    patterns well when the matrix fits in L2. Cache-layout
    optimizations (transpose, tiling) only matter above L2 size.
    For the 22-bench suite, all matrix benches fit in L2 — cache
    optimizations won't help them.

notes: >
  16 rounds remain. Pivoting away from cache-layout and back to
