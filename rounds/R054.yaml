  classes_touched: [tier2-dense-matrix-kind]
  new_class_introduced: null
  sub_pattern_learned: >
    DenseMatrix port gives consistent 40-50% wall-time reductions
    on numeric array workloads. Three-bench track record:
      matmul       0.117 → 0.038s  (-67.5%)
      nbody        0.254 → 0.180s  (-29.1%)
      spectral_norm 0.045 → 0.024s  (-46.7%)
    The DenseMatrix pattern effectively caps the "typed-array"
    side of tier2-typed-array-ic forward class. Future work on
    remaining gap is JIT-side (LDP pairing, inlining across calls)
    rather than runtime.

notes: >
  spectral_norm_dense gap_factor: 5.625 → 3.0 (still 3× LuaJIT 0.008s).
  Remaining gap is likely:
    - A() function call per inner iter (N²=250K calls) — call overhead
    - multiplyAv/multiplyAtv not inlined into outer loop
    - Power-iteration loop (10 iterations × 2 matrix mul × N²) dominated
      by call stack

  Next round candidates (5 remaining):
