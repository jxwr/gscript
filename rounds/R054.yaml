# R54: spectral_norm ported to DenseMatrix vectors — bench-win.
round: 54
date: 2026-04-18
follows: 53

type: tactical

target:
  benchmark: spectral_norm_dense
  current_wall_sec: 0.045
  luajit_wall_sec: 0.008
  gap_factor: 5.625

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Port spectral_norm to use matrix.dense(N, 1) for its u/v/tmp
    vectors. Inner loop becomes matrix.getf/setf with column=0.
    Expect -40 to -60% wall time, parallel to nbody_dense's
    experience (minus the DCE tax since R52 fix is already in).
  expected_gain_pct: [30, 60]
  expected_gain_mechanism: >
    spectral_norm's hot path is multiplyAv/multiplyAtv: N² inner
    iterations, each with a v[j] table-array access. Current cost:
    array-kind dispatch + bounds + NaN unbox. With matrix.getf:
    Flat + Stride (hoisted) + direct LDR from backing.
  counterfactual_check: >
    A() is a pure function with 4 arithmetic ops; it's unchanged.
    matrix.dense(N, 1) has stride=1 so each getf is essentially
    flat[j]. Output must match bit-identical (deterministic,
    same initial conditions).

