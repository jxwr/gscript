# R151: strategy — formally close R147 call-path arc (halt-cond #2 tripped
#       by R150 findings), open a new hypothesis on the hasCallInLoop
#       gate. 6 benchmarks currently blocked from Tier 2 by that gate;
#       if we can prove the post-emit_call_native cost model makes it
#       safe to widen, we unlock Cluster D — "inline-gated promotion".
round: 151
date: 2026-04-19
follows: 150

type: strategy

target:
  benchmark: multi

hypothesis:
  class: tier2-bounded-recursive-inline
  claim: >
    The `hasCallInLoop` gate (tiering_manager.go:492) was added in
    commit a6234be when Tier 2's OpCall was exit-resume (~30-80ns vs
    Tier 1's ~10ns native BLR, spectral_norm regressed 7.1× → 0.82×).
    Post-R108 (mono IC), R110 (static self), R111 (ctx skip), R144
    (single-body collapse), Tier 2's native BLR for OpCall is now
    ~50 insns/call ≈ 20ns on M4. The 3-5× ratio vs Tier 1's native
    BLR remains, but the absolute cost is now in the same order of
    magnitude. A narrow exception — e.g. "allow OpCall in loop iff
    the callee was inline-attempted but rejected for reasons not
    related to in-loop execution cost" — could unlock Tier 2 for
    6 currently-blocked benchmarks: create_and_sum, transform_chain
    (object_creation), sort's main, sieve's main, binary_trees'
    hot fn, table_field_access's hot fn.
  expected_gain_pct: null  # strategy round; no direct gain
  expected_gain_mechanism: >
    Tier 2 vs Tier 1 gain varies by benchmark shape. For
    object_creation, the hot proto `create_and_sum` does N iterations
    of ~8 table/field ops plus 2 function calls. At Tier 1 (all
    boxed, no LICM, no type spec), that's ~40 insns/iter × N. At
    Tier 2, we get type specialization, LICM of loop-invariants,
    FPR for floats. Historical R72/R73 main-driver-promote yielded
    ~20-30% on similar driver loops.
  counterfactual_check: >
    If the inline pass (MaxRecursion=5) is already handling the
    create_and_sum → vec3_add → new_vec3 call tree, then the OpCall
    in loop shouldn't exist post-inline. diag/object_creation/stats
    shows `create_and_sum` has `skip_reason: has OpCall inside loop`
    — i.e. inline FAILED or left residual OpCall. R152 must first
    read the post-inline IR to understand WHY before any gate widen.
    Without that, we'd widen the gate and inherit the 7× spectral
    regression a6234be prevented.

