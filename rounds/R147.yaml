  #
  # 3. WHY THIS IS A BIG-LEVER, NOT A SINGLE-CASE, OPTIMIZATION:
  #    The static-self-call fast path subsystem, once built, gates
  #    every Tier 2 call where callee == caller (known statically).
  #    Benchmarks that benefit without additional work:
  #      - fib, fib_recursive   (self-recursive)
  #      - ackermann            (self-recursive)
  #      - binary_trees         (recursive tree walk)
  #    With R155's cluster extension:
  #      - mutual_recursion     (F↔M proto cluster)
  #      - method_dispatch      (monomorphic intra-cluster dispatch)
  #
  # 4. WHAT WE ARE *NOT* DOING:
  #    - Single-bench micro-optimization: user explicitly ruled out
  #      "局部针对单个case的优化".
  #    - IR-specialization rounds: memory-note project_r87_r102_arc_final
