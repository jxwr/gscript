  #      correct attack is to REMOVE work, not add clever IR rewrites.
  #
  # 5. DECISION Q1→Q2→Q3 PER CLAUDE.md RULE 9:
  #    Q1 (global architecture): yes — introduce a new emit subsystem
  #      (static-self-call fast path) that did not exist as an explicit
  #      path before. This IS an architectural move by definition.
  #    Q2 (module boundary): emit_call_native.go gains a new branch +
  #      possibly a sibling file emit_call_self_fast.go once size grows.
  #    Q3 (local pass/emit): skipping individual insns is Q3, but each
  #      skip is justified by the Q1 architectural decision.

