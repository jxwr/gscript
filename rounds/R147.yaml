  #
  # 2. WHY R145 FAILED:
  #    Tier 2 caller-side path ~50 insns/call (measured empirically
  #    via R145 outcome notes: IC + closure guard + proto extract +
  #    bounds + CallCount + scratch save/restore + args + BL + scratch
