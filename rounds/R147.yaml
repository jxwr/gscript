hypothesis:
  class: tier2-recursion-closure
  claim: >
    A static-self-call fast path in emit_call_native.go (predicate:
    callee proto == caller proto + statically-resolved) can skip
    ~16 insns/call of Tier-2 caller-side setup, enough to bring ack
    Tier 2 below Tier 1 (0.271s) by R152 and fib below 0.85s.
  expected_gain_pct: [-35, -25]   # aggregate across fib/ack/mut
  expected_gain_mechanism: >
    Tier 2 caller-side native call is ~50 insns/call today. For a
    statically-proven self-call, IC (2 insns), closure type guard
    (2), MaxStack bounds (3), CallCount inc (3), ClosurePtr/Constants/
    GlobalCache save+restore (6) are provably redundant. Saving 16
    insns × ~1.3M calls on ack ≈ 20ms; × ~1M on fib ≈ 15ms. R153+
    (regalloc symmetry + thin self-entry) adds another ~15-20 insns.
  counterfactual_check: >
    Benchmarks not on a self-recursive pattern (mandelbrot, nbody,
    fannkuch, matmul) do not take the static-self-call path and
    are unaffected by construction. Tier 1 is untouched. A mis-
    specialized self-call would violate correctness (callee
    receives wrong closure), so we check: every skip is gated on
    `staticallyCallsOnlySelf(proto)` (R132 infra) AND on the
    compile-time known callee identity inside that path's emit.

