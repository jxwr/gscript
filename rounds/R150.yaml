revert_cost_model_delta: |
  R148 audit: 44-insn dead-budget for static-self.
  Actual safe dead-budget: ~9 insns (CallCount 5 + Closure save 2 + ctx writes 2).
  The 35-insn difference is MaxStack bounds (7) + IC/type/extract/proto (18) + ctx.ClosurePtr STR (1) + frame save shaved (4) + CallMode/GlobalCache (5 in !staticSelf, already skipped).
  Of those, only MaxStack bounds (7) is UNSAFE to skip; the rest
  are technically safe but each is tiny and M4's superscalar
  pipeline absorbs them. Net safe savings: 1-3% inside noise.
revert_prevention: |
  Future cost-model audits on emit-layer skips must distinguish:
    (a) PER-CALL dead work (e.g. IC for compile-time-constant callee) — truly skippable.
    (b) CUMULATIVE safety checks (e.g. MaxStack bounds that
        guard against register-file overflow across deep
        recursion) — NOT skippable even for static self.
    (c) MICRO-CUTS (≤5 insn savings) — M4 pipeline absorbs
        them; not worth the emit complexity.
  R148 conflated (a) and (b). The R33 "IR-diff required" rule
  should be amended to require *runtime cost model* for any skip
  involving stack/heap bounds.

