current_state_audit_summary: |
  # CORE FINDING (invalidates R147 ADR's cost model):
  #
  # R148 audited emit_call_native's static-self path and listed
  # 44 insns of "dead work" to skip. The audit was WRONG on
  # MaxStack bounds (line 152-164): it is NOT dead. The check
  # ensures `callee_frame_base + callee.MaxStack * 8 <= regsEnd`,
  # which is CUMULATIVE across recursion depth. Same proto ≠ same
  # check outcome: at recursion depth N, the Nth call needs
  # (N * maxStack * 8) bytes ahead of caller's frame. When this
  # exceeds regsEnd, the emit's job is to fall to slow path so the
  # Go-side handler can grow the register file.
  #
  # Skipping MaxStack = wild writes past the slice → SIGSEGV.
  #
  # With MaxStack restored (the only safe configuration), the
  # remaining safe skips produce ~1.5% on fib. Well inside warm-
  # bench noise. The call-path lever is **NOT** -25% to -40% safely
  # achievable. It's ~1-3% at best.
  #
  # This matches memory-note project_r87_r102_arc_final: "Call-heavy
  # (fib/ack/mut_rec 45-55x) untouched — trace-JIT territory. DO NOT
  # do more IR-specialization micro-rounds." Emit-level micro-cuts
  # on the call path have been exhausted. The real gap to LuaJIT
  # for recursive workloads requires a different JIT architecture
  # (trace JIT), not method-JIT emit tweaks.
  #
  # HALT CONDITION #2 from R147 ADR TRIPPED:
  #   "Null wall-time movement — fib stays within ±1.5% of R146's
  #    0.912s across 5-sample median despite shipped code."
  # R150 measurement: 0.891s vs 0.904s = -1.4%. Exactly at the
  # noise floor. The ADR is explicit: pivot to Cluster C.

