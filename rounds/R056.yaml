# R56: inline-max-callee-size bump pre-flight — no measurable effect.
round: 56
date: 2026-04-18
follows: 55

type: diagnostic

target:
  benchmark: multi
  current_wall_sec: null
  luajit_wall_sec: null
  gap_factor: null

hypothesis:
  class: tier2-bounded-recursive-inline
  claim: >
    Bump inlineMaxCalleeSize from 80 → 200 so medium-sized callees
    like nbody's advance() (~150 bytecode ops) can inline into their
    callers, eliminating 500K Tier1→Tier2 BLR round trips per run.
    Expect -10 to -25% on nbody_dense.
  expected_gain_pct: [10, 25]
  expected_gain_mechanism: >
    Each nbody advance() call: BLR + prologue + epilogue + BLR return
    ≈ 100-200ns per call. 500K × 150ns = 75ms of call overhead in a
    180ms bench. Inlining eliminates this entirely.
  counterfactual_check: >
    Main function at Tier 0/1 (per diag: main has 0 generated insns)
    means inlining can't occur caller-side regardless of callee size.
    R35-class risk is avoided (inlining, not promotion) but may be
    inert if main isn't Tier 2.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.33         # tier2-bounded-recursive-inline: R31+R34+R35 → 1/3
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: false

pre_flight:
  required:
    - description: nbody_dense must not regress, should see -5%+ gain
      acceptance: nbody_dense_jit <= 0.171
      halt_on_fail: true
  result: >
    Median-of-3 after bump:
      matmul_dense 0.039s | nbody_dense 0.183s | nbody 0.252s
      spectral_norm 0.046s | spectral_norm_dense 0.025s
      sort 0.051s | sieve 0.086s | fib 1.45s
      fannkuch 0.049s | mandelbrot 0.058s
    Zero measurable deltas beyond noise. Pre-flight fails acceptance
