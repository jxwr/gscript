revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: >
  Predicted -10 to -25%. Measured 0%. Cost model was wrong: main
  isn't Tier 2 compiled (stats.json: main insn_count=0), so
  inlining can't run caller-side regardless of callee size.
  The 500K call overhead must be attacked via main promotion,
  not callee inlining.
revert_prevention: >
  Pre-flight this class of change must verify: IS the caller
  function at Tier 2? If not, inlining is a no-op. Check via diag
  stats.json — if main.insn_count == 0, inline changes won't fire.

ledger_update:
  classes_touched: [tier2-bounded-recursive-inline]
  new_class_introduced: null
  sub_pattern_learned: >
    Inlining is a CALLER-side transformation. To eliminate call
    overhead, the CALLER must be Tier 2 compiled. Bumping
    inlineMaxCalleeSize is necessary but not sufficient — you also
    need main_promote_to_tier2 work (future forward class?). For
    nbody where main is a simple N-iter driver loop, forced
    promotion would be a cross-class composable win.

notes: >
  Mandelbrot parity: gscript 0.058s = LuaJIT 0.058s. Frozen reference
  had gscript at 0.063 (R7 era), so the gap has closed since then —
  probably via R29+R32 tight-loop + R45 various pipeline changes.
  First LuaJIT-parity benchmark in the suite.

