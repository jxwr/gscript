# R108: Monomorphic call IC — skip type checks + proto/entry lookup on cache hit.
round: 108
date: 2026-04-19
follows: 107

type: architecture

target:
  benchmark: fib
  current_wall_sec: 1.440
  reference_wall_sec: 0.133
  luajit_wall_sec: 0.026
  gap_factor: 55.3

hypothesis:
  class: tier2-recursion-closure
  claim: >
    Per-call-site inline cache of (boxed_closure_value, direct_entry_addr).
    On hit: skip the ~13-insn prelude (tag check + subtype check + Proto
    load + DirectEntry load + CBZ). On miss: full path, write cache.
    V8's mono-IC pattern; expected to move recursive calls where the
    call target is stable.
  expected_gain_pct: [1, 5]
  expected_gain_mechanism: >
    18M fib calls × ~7 insns saved per hit = 126M insns ≈ 9ms wall time
    theoretical ceiling. ARM64 absorption may flatten this further, but
    the removed load-use dependency chain (Proto → DirectEntry) is
    sequential, so realistic benefit closer to 2-3%.
  counterfactual_check: >
    Polymorphic call sites (multiple targets) would miss repeatedly —
    but fall-back to current behavior (just extra 4-5 overhead insns).
    No correctness risk — cache is a hint.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.5
  mitigation_required: false
  current_state_audit_performed: true
  current_state_audit_summary: >
    - emit_call_native.go emits ~22 insns of setup BEFORE the BLR: tag
      check (3), subtype check (5), extract ptr (1), LDR Proto (1),
      LDR DirectEntry (1), CBZ (1), bounds check (6), call count (4).
    - R40 already has HasSelfCalls fast path (Proto compare + lightweight
      t2_self_entry), but ONLY when HasSelfCalls flag set.
    - ExecContext already has Tier2GlobalCache pointer for OpGetGlobal;
      I'll add Tier2CallCache by the same mechanism.

pre_flight:
  required:
    - description: correctness test — monomorphic + polymorphic call sites match VM
      acceptance: new tests green
      halt_on_fail: true
    - description: full methodjit suite green
      acceptance: go test ./internal/methodjit/... ok
      halt_on_fail: true
    - description: fib bench improvement
      acceptance: fib median < 1.40s
      halt_on_fail: false
  result: >
    Suite green. Bench (15-sample interleaved medians):
      fib:              r107 1.443 → r108 1.436 (-0.5%)
      ackermann:        r107 0.272 → r108 0.270 (-0.7%)
      mutual_recursion: r107 0.190 → r108 0.191 (noise)
      fib_recursive:    r107 14.335 → r108 14.281 (-0.4%)
      object_creation:  r107 1.012 → r108 1.008 (-0.4%)
      method_dispatch:  r107 0.090 → r108 0.091 (noise)
      fannkuch:         r107 0.047 → r108 0.047 (same)
      sort:             r107 0.055 → r108 0.055 (same, earlier 5-sample
                        saw 0.055→0.054 but 15-sample median ties)
      sieve:            r107 0.085 → r108 0.086 (noise)
      matmul_dense:     0.035 → 0.035
    Call-heavy benches (fib/ack/fib_recursive) show consistent small
    improvement; others within noise. IC hits are firing as intended.
  passed: partial                # small wins; IC infrastructure shipped

  surgical_scope: >
    emit.go: add Tier2CallCache uintptr to ExecContext + offset.
    emit_call_native.go: emit IC fast path in both emitCallNative and
    emitCallNativeTail (R107).
    tiering_manager.go + emit_execute.go: set ctx.Tier2CallCache.
    emit_compile.go: allocate CallCache []uint64 sized 2×numCallSites.

outcome:
  status: bench-win               # small but consistent across 3 call-heavy benches
  bench_deltas:
    fib:              {r107: 1.443, r108: 1.436, pct: -0.5}
    ackermann:        {r107: 0.272, r108: 0.270, pct: -0.7}
    fib_recursive:    {r107: 14.335, r108: 14.281, pct: -0.4}
    object_creation:  {r107: 1.012, r108: 1.008, pct: -0.4}
  regressions: []
  shipped_code: true
  commit: null
  deliverables:
    - internal/methodjit/emit.go — Tier2CallCache field + offset constant
    - internal/methodjit/emit.go — CallCache []uint64 on CompiledFunction
    - internal/methodjit/emit_compile.go — nextCallCacheIndex + allocation
    - internal/methodjit/emit_call_native.go — IC fast path in emitCallNative + emitCallNativeTail
    - internal/methodjit/emit_execute.go + tiering_manager.go — set ctx.Tier2CallCache
    - rounds/R108.yaml — this card

ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null
  sub_pattern_learned: >
    Mono call IC delivers modest (~0.5-0.7%) gains on call-heavy
    benches. Theoretical ceiling (7-12 insns saved per hit × N calls)
    matches measured result — no ARM64 load-use-shadow absorption
    because the removed work includes a serial Proto→DirectEntry
    dependency chain. This is the first round in the R87-R108 arc
    that moved call-heavy numbers at all. Scale-up options:
      - Cache Proto too (skip one more LDR on hit).
      - Cache Constants pointer (skip setup before BLR).
      - Polymorphic IC (2-4 target slots for dynamic dispatch).
