# R80: BLOCKER-A root-caused and fix landed-then-reverted (correctness-vs-perf tradeoff).
round: 80
date: 2026-04-19
follows: 79

type: tactical

target:
  benchmark: sort
  current_wall_sec: 0.051
  luajit_wall_sec: 0.010
  gap_factor: 5.10

hypothesis:
  class: correctness-bug-fix
  claim: >
    BLOCKER-A root cause: emitIntCmp (OpLt/OpLe/OpEq dispatch) treats
    NaN-boxed FLOATS as ints via SBFX of lower 48 bits. For LCG-overflow
    values (promoted to float at int48 boundary), compare gives garbage.
    Fix: add runtime type check + deopt for generic OpLe/OpLt/OpEq
    with unknown operand types.
  expected_gain_pct: null
  expected_gain_mechanism: >
    Correctness — no wall-time gain. Cost: ~5 insns per generic compare
    (type check + branch).
  counterfactual_check: >
    If type check adds too much cost to hot paths (sort's inner
    partition), the cost may dominate and make the fix net-negative.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.20
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Chased BLOCKER-A via v5.2:

    Bisect chain narrowed to:
      - qs on all-int manual array: PASS
      - qs on LCG-overflow float values: FAIL at depth-2 recursion
      - Small LCG (no overflow): PASS
      - Large LCG (overflow to float): FAIL

    Key insight: LCG `x * 1103515245 + 12345` overflows int48 at
    iter 2+, promoting x to float. `arr[i] = x` stores float. Tier 2
    quicksort's `arr[j] <= pivot` dispatches to emitIntCmp which
    treats NaN-boxed float bits as if they were tagged int → wrong.

    Root cause location: internal/methodjit/emit_arith.go:emitIntCmp
    resolves both operands via resolveRawInt (SBFX extract). For
    float values, SBFX gives garbage bits. Compare returns wrong.

pre_flight:
  required:
    - description: TestTier2_Quicksort_LCG_N11 passes after fix
      acceptance: test green
      halt_on_fail: true
    - description: no major bench regression (>10%)
      acceptance: sort within 10% of baseline
      halt_on_fail: true
  result: >
    Clause 1: PASS. Fix correctly handles LCG N=11 (test green;
    CLI sort_strip.gs returns TRUE where pre-fix returned FALSE).
    Clause 2: FAIL. sort.gs 0.051 → 0.089s (+75% regression).
    The type-guard overhead is ~5 insns per compare; sort's hot
    partition runs O(N²) compares at Tier 2 → multiplies up.

    Pre-R80 sort.gs CLI output was correct (not wrong!) because
    make_random_array Tier 2 compile failed via R77's unresolved
    arith_done_13 label path (a separate bug), so LCG computed
    at Tier 1 (correct). Fix-on-top made it Tier-2-compilable
    which then miscompiled with my R80 fix adding expensive guards.

    Net: R80 fix is CORRECT but too EXPENSIVE for the hot sort path.
    Reverted.

  failing_test: internal/methodjit/emit_qs_t2_correctness_test.go:TestTier2_Quicksort_LCG_N11
  failing_output: "pre-R80: float mismatch VM=105359168 JIT=486008448; post-R80: PASS but sort +75%"
  surgical_scope: "emit_arith.go:emitIntCmp (single function, added type-check branch)"
  ir_diff_before: "emitIntCmp → resolveRawInt → SBFX + CMP directly"
  ir_diff_after: "emitIntCmp generic-op path → emitCheckIsInt × 2 + BCond → unbox + CMP, OR deopt"
  bisect_range: "Single-function quicksort Tier 2, LCG-overflow floats triggering generic OpLe emit_arith.go:300"

outcome:
  status: no-win                  # fix found but reverted due to perf cost
  bench_deltas: {}
  regressions: []                 # revert restored baseline
  shipped_code: false
  commit: null
  deliverables: []

revert_class: cost-model-error
revert_root_cause_location: "emit_arith.go:emitIntCmp — added 5 insns per generic compare"
revert_cost_model_delta: >
  Predicted: correctness fix with modest overhead. Measured: +75% on
  sort hot partition. Cost model didn't account for O(N²) compare
  frequency on randomized input.
revert_prevention: >
  For correctness fixes that add insns to HOT comparison paths,
  pre-flight MUST include sort/fib/quicksort-like bench with
  median-of-5 acceptance clause. A "test passes" signal alone
  insufficient; need "test passes AND bench within noise".

ledger_update:
  classes_touched: [correctness-bug-fix]
  new_class_introduced: tier2-generic-cmp-polymorphic   # proposed forward class
  sub_pattern_learned: >
    Correctness fix identified and implemented; reverted due to
    unavoidable O(N²) hot-path cost. The proper long-term fix
    requires either:
      (a) graph_builder: insert GuardType TypeFloat/TypeInt after
          GetTable based on MONO-typed feedback, so downstream
          OpLe gets specialized to OpLeFloat/OpLeInt via TypeSpec
      (b) a new pass that analyzes comparison operand types and
          inserts run-time tag guards only when they're needed
          for correctness, not on every hot-path compare

    Neither is a single-round fix. Deferred as forward class.

    v5.2 again validated: tests captured red→green→revert cycle
    in 3 min; kept the baseline protected.

notes: >
  R79-R80 summary:
    ✓ BLOCKER-A fully diagnosed (line of code identified)
    ✓ Fix implemented, tested, validated correct
    ✗ Fix reverted because hot-path cost (+75% sort)

  The bug is REAL but EFFECTIVELY INERT in the current benchmark
  suite (make_random_array stays Tier 1 due to R77-style label bug
  that persists in some call paths; float values never reach
  Tier 2 quicksort). So the practical impact of leaving the bug
  is zero on current benches. Forward class records it for future.

  V8-inlining arc is blocked on BLOCKER-C (driver-loop SIGSEGV)
  which is independent. Could attack that next.

  HONEST META: R77 was 4-line surgical fix that actually moved a
  benchmark. R79-R80 found a REAL bug that's TOO EXPENSIVE to fix
  directly without deeper infrastructure. That's reality of
  correctness work on an immature JIT.
