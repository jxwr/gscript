  notes: >
    R131 halts the numeric-conv arc. Resuming layer 4/5 before
    fixing Tier 2 promotion for recursive-self protos is wasted
    work: the emit never runs.

    Next direction options (to be written up as R132 or as an ADR):

    (A) Root-cause and fix the Tier 2 promotion path for recursive-
        self protos. Tier 1's self-call emits CallCount++ + BEQ
