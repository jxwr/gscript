    Methodjit tests passed; correctness was preserved. Median-of-15
    bench vs R130 showed fib +0.6% and ack +1.1% — real regressions
    on BOTH call-heavy targets.

    Following CLAUDE.md rule 7 ("contradicted diagnostic data halts
    the round"), rooted-caused WHY saving insns regressed wall-time.
    Hypothesis was M4 pipeline sensitivity (R109-R114 pattern).
    Actual finding is far worse: `gscript -jit-stats` on fib, ack,
    and mutual_recursion reports "Tier 2 compiled: 0 functions" for
    the target protos. Neither fib nor ack (nor mut) run Tier 2 code
    at all — only <main> is attempted for Tier 2, and <main> is
    rejected ("has OpCall inside loop, performance-blocked").

    The recursive protos themselves are never even ATTEMPTED:
    `tier2Attempts` stays at 0 or 1 (only <main>), and a local debug
    `fmt.Fprintf` added to compileTier2's entry confirmed zero
    invocations for proto="fib".

