ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null
  sub_pattern_learned: >
    The numeric calling convention is a multi-layer stack:
      1. Caller raw-int dispatch (R124 ✅).
      2. Entry raw storage + skip box (needs body awareness — NOT shipped).
      3. Body GuardType elision + raw LoadSlot (needs dual emit).
      4. Raw return + caller raw consume.
      5. Deopt path boxing.
    R121-R124 covered layer 1. Layers 2-5 are inter-dependent; a
    half-layer (R119/R120 attempt) REGRESSES because the memory
    round-trip survives. Future arcs should commit to full dual-
    body emission as a single multi-round effort, not incremental.

