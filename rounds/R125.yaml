future_work: >
  Dual-body emission (for real fib gain):
    1. Add numericMode flag + numericParamSlots set to emitContext.
    2. Second compile pass inside same Compile(): numeric prologue
       (raw args → raw regs[0..N-1]) + body emit with prefixed block
       labels ("num_B0" etc) + numeric epilogue (raw X0 return).
    3. emitLoadSlot: if numericMode && slot ∈ numericParamSlots, emit
       LDR + storeRawInt (not NaN-boxed).
    4. emitGuardType: if arg is already rawInt (param slot result),
       pass-through via storeRawInt.
    5. Deopt handling: at every deopt site in numeric body, box all
       live rawIntRegs before exit-resume (so runtime sees boxed state).
    6. Return: in numeric body, skip NaN-box + regs[0] store + ctx
       store; leave raw X0 for caller to consume via storeRawInt.

  Estimated 3-5 rounds. Projected fib additional gain: 10-30% on top
  of current -2.8%.

