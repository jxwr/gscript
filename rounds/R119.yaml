      halt_on_fail: true
    - description: full methodjit suite green
      acceptance: go test ./internal/methodjit/... ok
      halt_on_fail: true
    - description: fib correctness — fib(10) = 55
      acceptance: compareTier2Result passes
      halt_on_fail: true
    - description: fib bench no regression > 0.5%
      acceptance: 15-sample median within 0.5% of R118
      halt_on_fail: false
  result: >
    Full methodjit suite green (go test -count=1 ./internal/methodjit/... ok).
    Bench measurement deferred: user reports GPU workload on the
    machine making wall-time samples unreliable. Will re-bench
    after system quiesces. Code is shipped; R120 will pick up
    bench verification + extend to raw return / multi-arg.
  passed: partial       # correctness verified; bench deferred

  surgical_scope: >
    emit_compile.go: emit t2_numeric_self_entry_1 label (only when
    fn qualifies: 1 int arg, int return, no upvals, no nested protos).
    emit_call_native.go: new detection + emit path for numeric-
    qualified static-self calls.
    No changes to body emit.

outcome:
  status: adr-win               # pilot infrastructure shipped; bench deferred
  bench_deltas: {}
  regressions: []
  shipped_code: true
  commit: null
  deliverables:
    - internal/methodjit/emit_compile.go — t2_numeric_self_entry_1 label
    - internal/methodjit/emit_call_native.go — isNumericSelfCall + routed call path (skip Step 8 copy + BL to numeric entry with raw int in X0)

ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null

notes: >
  Rationale from R118 analysis: fib @ 1.4s (55x LuaJIT) reflects
  missing method-JIT features, not absence of trace-JIT. HotSpot
  does fib in ~50-100ms (2-4x LuaJIT) with its method JIT. Our gap
  is ~ 10-20x over HotSpot-class method JITs — this is the gap
  closeable by numeric calling convention + deeper inline (R120+).
