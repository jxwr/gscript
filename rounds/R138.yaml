# R138: ack hang bisected to MID-COMPILE transition; fix attempted but
#       kills fib promotion. Test preserved (SKIP) for future R139.
round: 138
date: 2026-04-19
follows: 137

type: correctness-bug-fix

target:
  benchmark: ackermann

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R136 narrowed the ack hang to pure Tier 2 emit for 2-param
    recursive-self int protos, with numeric-conv ruled out. R138
    writes a rule-26 failing test and bisects further:

      (1) Force-compile ack Tier 2 up-front, then run ack(3,4)x500
          via BLR to Tier 2 direct entry.
      (2) Result: WORKS in ~470ms. The Tier 2 emit code is correct.

      (3) Let ack compile mid-recursion (widen gate to np>=2 without
          up-front compile).
      (4) Result: HANGS. The mid-compile transition is the trigger.

    Root cause: when ack's CallCount hits threshold=2 DURING a deep
    self-recursion (via tier1_call.go:331-332's `BCond EQ slowLabel`),
    the baseline_exit / direct_exit machinery unwinds the current
    Tier 1 self-call frame, Go compiles Tier 2, then resumes at
    pc+1. But the Tier 1 recursion stack is still live; post-compile
    recursive calls interact with pre-compile state in a way that
    doesn't terminate for the ack(3,4) call tree. fib(35) survives
    the same transition because fib's recursion has simpler state
    (1 param, no mixed tail/non-tail pattern).

  expected_gain_pct: [-30, -10]   # if fixed, ack -10 to -30%

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25
  mitigation_required: true

pre_flight:
  required:
    - description: failing Go test in-tree (rule 26)
      acceptance: TestR138_AckTier2Hang times out on current code
      halt_on_fail: true
    - description: bisect_range established (rule 29)
      acceptance: documented
      halt_on_fail: true
  result: >
    TestR138_AckTier2Hang reproduces the hang in <5s via a scripted
    `for r := 1..500 { ack(3,4) }` + `promoteAckOverride=true` to
    widen the gate to np>=2. Test SKIPS in CI until a fix is in
    place (real fix deferred — see outcome).

    Bisect range:
      - ack(2,2) = 9 (27 calls): Tier 2 WORKS
      - ack(3,3) = 61 (2432 calls): WORKS up-front, HANGS mid-compile
      - ack(3,4) = 125 (10307 calls): HANGS both ways in bench

    A `warm := ack(2,2)` call BEFORE the main loop (which forces the
    Tier 2 compile to happen during the small ack(2,2) stack, not
    during ack(3,4)) makes the bench pass. Confirms the mid-compile
    + deep-stack interaction is the trigger.
  passed: true

surgical_scope: >
  internal/methodjit/func_profile.go: added promoteAckOverride test
  hook (var; production keeps default false).
  internal/methodjit/r138_ack_hang_test.go: new test reproducing the
  bug in-tree; currently `t.Skip`-gated pending a real fix.

current_state_audit_summary: |
  # R138 bisection log (selected):

  # Experiment A: force Tier 2 compile BEFORE main loop
  #   warm := ack(2, 2)                    # triggers CallCount → compile
  #   for r := 1..500 { result = ack(3,4) } # all Tier 2, works
  #                                          → PASS in ~470ms

  # Experiment B: no warmup, compile triggers mid ack(3,4)
  #   result = 0
  #   for r := 1..500 { result = ack(3,4) } # Tier 2 compile inside
  #                                          # first deep recursion
  #                                          → HANG

  # Experiment C: disable Tier 2's tail-call emit (ackDisableTailCall)
  #                                          → STILL HANG (not tail)
  # Experiment D: disable numeric BL (ackDisableNumeric)
  #                                          → STILL HANG (not numeric)
  # Experiment E: disable R110 self-call shortcut (ackDisableSelfCall)
  #                                          → STILL HANG (not R110)
  # Experiment F: remove Tier 2 promotion trigger in Tier 1's
  #   self-call path (tier1_call.go:331-332):
  #                                          → ack test PASSES, fib
  #                                            regressed: fib's only
  #                                            promotion trigger was
  #                                            the self-call path
  #                                            (<main>→fib is called
  #                                            once per run). REVERTED.

outcome:
  status: adr-win
  shipped_code: true
  primary_finding: >
    ack's hang is in the mid-recursion Tier 2 compile transition,
    specifically the interaction between a live deep Tier 1 ack
    recursion stack and the post-compile resume path. NOT in
    tail-call, numeric-BL, R110 self-call, nor pure Tier 2 emit —
    those all work when ack is Tier 2 compiled cleanly up-front.
  shipped_artifact: >
    internal/methodjit/r138_ack_hang_test.go: rule-26 reproducer
    (t.Skip-gated pending fix). internal/methodjit/func_profile.go:
    promoteAckOverride test hook.
  notes: >
    Why the simple fix (remove self-call threshold trigger) fails:
    fib's entire workload is inside one <main>→fib call. The only
    promotion trigger fib can reach is from the SELF-CALL path
    during recursion. Removing that trigger kills fib's Tier 2
    promotion entirely (fib bench regresses 0.924s → 1.464s, pure
    Tier 1).

    The real fix requires a mechanism that:
      (a) Triggers Tier 2 compile at a SAFE point (not mid-
          recursion) for protos like ack that have outer loops,
      OR  (b) Makes the mid-compile transition work correctly for
          np>=2 recursions (actual bug-hunt in the resume
          machinery — requires understanding baseline_exit /
          direct_exit PC restoration semantics deeply).

    R139+ direction: instrument handleCall and handleBaselineOpExit
    to log what Tier 1 state exists when the transition fires, then
    trace the post-resume PC / frame chain for ack(3,4). The
    `warm := ack(2,2)` workaround suggests the hang is specifically
    when the DEEP Tier 1 recursion stack resumes after the Tier 2
    compile returns control — maybe the stored BaselinePC is stale
    or a frame pointer is corrupted.
