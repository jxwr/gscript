# R34: relax inline-gate; discover fib isn't even at Tier 2.
round: 34
date: 2026-04-17
follows: 33

type: tactical

target:
  benchmark: fib
  current_wall_sec: 1.429
  reference_wall_sec: null       # excluded from reference
  luajit_wall_sec: 0.024
  gap_factor: 59

hypothesis:
  class: tier2-bounded-recursive-inline
  claim: >
    Per R31 ADR, relax `findInlineableGetGlobal` to allow recursive
    callees, since the inline pass's MaxRecursion=2 already bounds
    unrolling. This is R31 step 1 (minimum viable).
  expected_gain_pct: [25, 40]
  expected_gain_mechanism: >
    Removing the isRecursive + name-match early block lets
    canPromoteWithInlining return true for self-recursive functions.
    Inline pass then unrolls fib/ackermann up to depth 2. Per ADR
    projection: fib 1.429 → 1.07s (depth-2).
  counterfactual_check: >
    Inline pass MaxRecursion=2 bounds depth. Size budget (80
    bytecodes) bounds total expansion. Non-recursive callees
    unaffected. Zero correctness risk (inlining is textual substitution).

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    PRE-CHANGE: diag/fib/fib.ir.txt shows 2 OpCall remain (not
    inlined). tiering_manager.go:367 has isRecursive block.
    POST-CHANGE: tests pass; IR unchanged because fib doesn't
    reach Tier 2. Secondary audit via rule 23 amendment found
    func_profile.go:160-162 rejects "calls + no loop" functions
    from Tier 2 promotion. fib stays at Tier 1. The isInlineCandidate
    relaxation is correct but insufficient.

pre_flight:
  required:
    - description: fib wall-time improvement ≥10%
      acceptance: fib_jit < 1.3s
      halt_on_fail: true
  result: >
    Spot-check median-of-3: 1.442s, 1.436s, 1.431s. No improvement.
    Pre-flight fails its own claim.
    BUT: the code change is still semantically correct — it removes
    a premature block that would prevent bounded recursive inline
    from ever running, regardless of Tier 2 promotion decisions.
    Change kept as partial-step towards R35+ full implementation.
  passed: false

outcome:
  status: hold                     # code change kept, no perf win
  bench_deltas: {}
  regressions: []
  commit: 202d8f3
  deliverables:
    - internal/methodjit/tiering_manager.go — findInlineableGetGlobal recursion block relaxed
  audit_findings:
    - "fib at Tier 1 due to func_profile.go:160 'calls + no loop' gate"
    - "Inline pass MaxRecursion=2 already configured in pipeline, but unreachable without Tier 2 promotion"
    - "Promoting fib to Tier 2 requires loosening shouldPromoteTier2 for call-heavy-no-loop functions"
    - "Next round (R35) loosens shouldPromoteTier2 for functions with inlineable calls"

revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: >
  R31 ADR projected fib 1.4 → 0.18s (depth-3). R34 audit shows:
  (a) Inline pass already supports recursion via MaxRecursion (not a gap).
  (b) The REAL blocker is Tier 2 promotion rejecting fib for being
      "calls + no loop."
  (c) Fixing (b) is the next round's work.
revert_prevention: >
  Audit blind spot: R31 looked at isInlineCandidate (correct) but
  didn't trace the end-to-end promotion decision chain. Rule 23's
  IR-audit requirement helped ("IR shows 2 OpCalls remain"), but
  didn't reveal WHY. For Tier-1-vs-Tier-2 decisions, the audit must
  trace the promotion gate, not just inlining eligibility.

ledger_update:
  classes_touched: [tier2-bounded-recursive-inline]
  new_class_introduced: null
  sub_pattern_learned: >
    Tier 2 promotion gate (shouldPromoteTier2) is MORE load-bearing
    than the inline-pass's own eligibility check. For recursion
    closure work, the gate needs loosening first.
