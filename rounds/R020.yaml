# Second architecture round: recursion/call closure plan.
round: 20
date: 2026-04-17
follows: 19

type: architecture

target:
  benchmark: multi
  current_wall_sec: null
  reference_wall_sec: null
  luajit_wall_sec: 0.024         # fib(35)
  gap_factor: 59                 # fib's LuaJIT gap at session open

hypothesis:
  class: tier2-recursion-closure
  claim: >
    fib 59× and ackermann 44× gaps are call-cost-bound. Without
    adopting trace JIT (3-year project), we can close most of the
    gap via five strategies: self-call specialization, typed
    calling convention, recursion inlining, tail-call optimization,
    and integer-specialized arith inside calls. Projected fib gap:
    59× → 21×. Projected ackermann: 44× → 13×.
  expected_gain_pct: null
  expected_gain_mechanism: >
    Current ~78 ns/call on fib is dominated by steps 1-12 of
    emit_call_native.go, most of which are either UNNECESSARY for
    self-calls (closure check, DirectEntryPtr load, bounds check) or
    UNNECESSARY with typed args (regs[] round-trip, NaN-box).
    Eliminating the common-case overhead brings us to ~20-30 ns/call,
    at which point recursion inlining halves the call count again.
  counterfactual_check: >
    Self-call spec + typed CC preserve correctness via feedback
    flags: callee prologue knows its convention, cross-call paths
    use the existing generic BLR. Risk is I-cache bloat from
    inlining; capped at depth 3. No regression pathway on
    non-recursive benchmarks (they don't hit self-call path).

