# Post-mortem round: revert R12. Surfaced by R14's bench hang.
round: 15
date: 2026-04-17
follows: 14

type: tactical               # code change; reverts a previous commit

target:
  benchmark: math_intensive   # the bench that failed under R12
  current_wall_sec: null      # hung
  reference_wall_sec: 0.070
  luajit_wall_sec: null

hypothesis:
  class: correctness-bug-fix
  claim: >
    R12's fix of "unresolved label arith_done" removed an early
    return in emitFloatBinOp's intBinMod arm. This let tier-2 emit
    succeed for functions using `%` on potentially-float operands —
    but the resulting tier-2 code is INCORRECT for collatz-style
    int-int mod hot loops. math_intensive JIT executes indefinitely
    (observed: 3+ minutes @ 100% CPU on a benchmark that normally
    takes 0.07 s). tests missed this because
    TestTieringManager_SmartPromotion_GCD only runs gcd twice;
    collatz's million-iteration loop amplifies the corruption.

    The correct move: revert R12 and restore tier-2 compile failure
    as a DEFENSIVE mechanism (tier1 fallback is functionally correct,
    just slower). File the deeper tier-2 intBinMod emit bug as a
    new forward class for a future round.
  expected_gain_pct: null     # correctness, not performance
  expected_gain_mechanism: >
    Reverting R12 restores tier2_failed=true for gcd-style protos,
    which falls back to Tier 1 execution. Tier 1 handles
    intBinMod correctly (interprets in Go). Math_intensive runs
    in 0.065s with R12 reverted (verified).
  counterfactual_check: >
    Revert affects only intBinMod's tier-2 compile. Other ops
    (add, sub, mul, div) still compile at tier2. Benchmarks
    without `%` on potentially-float types are unaffected.
    Binary tree, object_creation, sieve, etc. don't use %.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0      # correctness-bug-fix: 1 win, 0 reverts
                               # (after this round: 1 win, 1 revert)
  mitigation_required: false
  mitigation_description: >
    NEW mitigation learned this round for correctness-bug-fix class:
    "Test coverage must exercise the actual hot path, not just a
    token call." Regression tests that call a function twice do not
    catch emission bugs that amplify over millions of iterations.
    Future fixes in this class MUST add a benchmark-scale regression
    (at least 1M iterations) before claiming win.

pre_flight:
  required:
    - description: >
        Run math_intensive after revert; must complete in <1s and
        produce correct output.
      acceptance: math_intensive_jit_seconds < 1.0 && correct_output
      halt_on_fail: true
  result: >
    /tmp/gscript_bench_noR12 -jit math_intensive.gs:
      leibniz_pi(5M):   0.006s
      collatz(50K):     0.054s
      distance(1M):     0.002s
      gcd(10K):         0.002s
      total Time:       0.065s
    Correct output, below 1s threshold.
  passed: true

outcome:
  status: win                  # revert restores correctness
  bench_deltas:
    math_intensive: {from: infinite_hang, to: 0.065, pct: -100}
  regressions: []
  commit: pending
  deliverables:
    - internal/methodjit/emit_call.go — restored early `return` in intBinMod
    - internal/methodjit/func_profile_test.go — restored tolerant assertions
    - rounds/R015.yaml — this card
    - program/ledger.yaml — correctness-bug-fix gets 1 revert + mitigation

revert_class: correctness        # reverts R12 which introduced a correctness regression
revert_root_cause_location: "internal/methodjit/emit_call.go:emitFloatBinOp intBinMod"
revert_cost_model_delta: >
  R12 predicted: tier-2 compile now succeeds for mod ops → small
  perf win on gcd-like functions. Reality: tier-2 emit for intBinMod
  has a latent correctness bug that the "unresolved label" guard
  had been silently covering. math_intensive (collatz) enters an
  infinite loop under the R12-enabled tier-2 code.

  The bug is NOT in R12's diff per se — R12's diff is a mechanical
  label-resolution fix. The bug is in SOMETHING tier-2 mod emit does
  that the R12 fix allowed to reach runtime. Root-cause investigation
  deferred to a future forward class.
revert_prevention: >
  R12's verification was "go test ... → ok" + "scripts/diag.sh sort".
  Neither exercised a million-iteration mod loop. A pre-flight that
  ran `math_intensive` at production iteration counts would have
  caught the hang in seconds.

  Ledger mitigation for correctness-bug-fix now REQUIRES a
  production-scale regression run before declaring win.

ledger_update:
  classes_touched: [correctness-bug-fix]
  new_class_introduced: null
  sub_pattern_learned: >
    Tier-2 emit bugs can hide behind compile-time failures that look
    like minor defects. Fixing the "cosmetic" failure exposes the
    deeper bug. Before fixing a tier-2 compile failure, check
    whether it is DEFENSIVE (guards a deeper bug) or GENUINE (a
    real label-resolution typo).
  forward_classes_proposed:
    - tier2-intbinmod-correctness
