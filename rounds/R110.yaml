# R110: static self-call detection — skip runtime Proto compare.
round: 110
date: 2026-04-19
follows: 109

type: tactical

target:
  benchmark: fib
  current_wall_sec: 1.436

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R40's self-call fast path runs a 6-insn runtime Proto compare
    before picking between BLR X2 (non-self) and BL t2_self_entry
    (self). When the OpCall's fn arg is statically an OpGetGlobal of
    ec.fn.Proto.Name, we KNOW at compile time it's a self-call.
    Skip the compare entirely; emit single BL t2_self_entry.
  expected_gain_pct: [0.5, 2]

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.5
  mitigation_required: false

pre_flight:
  required:
    - description: methodjit suite green
      acceptance: ok
      halt_on_fail: true
    - description: correctness — fib, ack, mutual_recursion tests unchanged
      acceptance: R107 TCO + standard call tests green
      halt_on_fail: true
  result: >
    Suite green. Bench measurement is under heavy system load so
    numbers are unreliable (r108 baseline drifted from 1.44s to
    2-3s). The change is purely a code-size reduction on the static
    self-call path (replaces 6 insns with 1). 36M self-call execs on
    fib × 5-insn save = ~180M insns theoretical ≈ 1% ceiling.
  passed: partial

  surgical_scope: >
    emit_call_native.go: add isStaticSelfCall(instr) helper; when
    true and HasSelfCalls is true, emit just BL t2_self_entry instead
    of the runtime Proto-compare block.

outcome:
  status: adr-win                # infrastructure; bench unmeasurable due to load
  bench_deltas: {}
  regressions: []
  shipped_code: true
  commit: null
  deliverables:
    - internal/methodjit/emit_call_native.go — isStaticSelfCall + new branch

ledger_update:
  classes_touched: [tier2-recursion-closure]
  new_class_introduced: null
  sub_pattern_learned: >
    Compile-time self-call detection is cheap (one OpGetGlobal +
    proto name compare) and emits strictly less code when firing.
    Pattern scales to any "callee known statically" scenario: if
    graph_builder or a later pass identifies the callee, runtime
    Proto check is redundant.
