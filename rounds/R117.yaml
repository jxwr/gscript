design_sketch: >
  Poly call IC layout (4-way):
    cacheSlot[i] = {boxed_closure[0..3], direct_entry[0..3]}  (8 uint64 per site)

  Emit:
    LDR X0, [regs, funcSlot]
    LDR X3, [ctx, CallCache]
    // Unrolled 4-way compare (branch predictor handles well on M4):
    LDR X4, [X3, #slot+0]
    CMP X0, X4
    B.EQ hit0
    LDR X4, [X3, #slot+16]
    CMP X0, X4
    B.EQ hit1
    LDR X4, [X3, #slot+32]
    CMP X0, X4
    B.EQ hit2
    LDR X4, [X3, #slot+48]
    CMP X0, X4
    B.EQ hit3
    B miss
    hit0: LDR X2, [X3, #slot+8]; B continue
    hit1: LDR X2, [X3, #slot+24]; B continue
    hit2: LDR X2, [X3, #slot+40]; B continue
    hit3: LDR X2, [X3, #slot+56]; B continue

  Fast path: 4 LDR + 4 CMP + 4 BCond + 1 LDR + 1 B = ~14 insns.
  Worst case miss: 4 × (LDR+CMP+BCond) + B = 13 insns then miss.
  Mono IC R108: 4 insns on hit. Poly adds ~10 insns overhead.

  So poly IC only helps WHEN the call site is actually polymorphic
  AND each target's callee is heavy enough to amortize 10 extra
  insns. method_dispatch: probably. fib: no, mono.

  Cache update policy on miss: replace LRU slot with new target.
  Store-to-load hazard on update → rare, ignore.

  Estimated ROI: method_dispatch 0.091s with maybe 2 targets per
  site → ~50% hit rate on 2-way → -5% wall. Maybe.

