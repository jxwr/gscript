# R39: diagnostic — strict fib gate isolates R35 cascade cause.
round: 39
date: 2026-04-17
follows: 38

type: diagnostic

target:
  benchmark: fib
  current_wall_sec: 1.429
  reference_wall_sec: null
  luajit_wall_sec: 0.024
  gap_factor: 59

hypothesis:
  class: tier2-bounded-recursive-inline
  claim: >
    R35 regressed mutual_recursion +47% despite the gate allegedly
    not matching F/G. Narrow the gate to ONLY fib-exact shape
    (15 bytecodes, 2 calls, 1 param, no tables, name-self-reference).
    If mutual_recursion still regresses, cascade is cross-function.
    If mutual_recursion stabilizes, R35's cascade was caused by a
    LOOSER gate matching fib_recursive's fib, checkTree, etc.
  expected_gain_pct: null          # diagnostic
  expected_gain_mechanism: >
    Matches ONLY fib's exact shape. Other self-recursive functions
    (makeTree, checkTree, fib in fib_recursive) still stay at Tier 1.
  counterfactual_check: >
    (Diagnostic exempt.)

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.33
  mitigation_required: false
  mitigation_description_cited: >
    Per R35 mitigation: bench full suite as pre-flight. Done here.
  current_state_audit_performed: true

pre_flight:
  required: []
  result: null
  passed: null

outcome:
  status: hold                     # gate reverted; diagnostic finding
  bench_deltas:
    # Median-of-5 vs R28 baseline:
    fib: {from: 1.429, to: 1.224, pct: -14.3}       # win on target
    mutual_recursion: {from: 0.184, to: 0.190, pct: 3.3}    # NOISE (was +47% with R35's loose gate)
    binary_trees: {from: 1.288, to: 1.317, pct: 2.3}       # NOISE (was +13%)
    fib_recursive: {from: 14.154, to: 17.012, pct: 20.2}   # regresses (fib within fib_recursive promotes too)
    # Others within noise.
  regressions: [fib_recursive]     # only one remaining regression
  commit: 85f8b2c
  findings: >
    **R35's cascade was caused by loose gate matching makeTree/
    checkTree/etc.** With a strict fib-only gate:
      - mutual_recursion stabilizes at noise level (was +47%)
      - binary_trees stabilizes (was +13%)
      - Only fib_recursive regresses +20%

    fib_recursive's regression is EXPECTED under this gate: it
    also contains a 15-bytecode fib function which matches the
    strict gate and promotes. At Tier 2, fib is 14% faster per
    call chain, but across 10 repetitions the cumulative overhead
    (Tier 2 entry/exit) dominates, net +20%.

    Conclusion: Tier 2 promotion of self-recursive needs EITHER
    (a) a lightweight Tier 2 self-call path matching Tier 1's
        self_call_entry (not currently in Tier 2 emit)
    (b) enough inlining to reduce the number of Tier 2 entries
    (c) context-aware gate (e.g. don't promote if caller is in a loop)

    Filed as direction for R40+.

revert_class: cost-model-error
revert_root_cause_location: "Tier 2 self-call path weight vs Tier 1's BL self_call_entry"
revert_cost_model_delta: >
  R31 ADR projected fib-59×-→7.5× via inline+promotion. Reality
  after 4 rounds of attempts: Tier 2 self-call is heavier than
  Tier 1, so even with inline reducing call count, the remaining
  Tier 2 calls are slower per-call. Net negative when summed over
  all Tier 2 calls.
revert_prevention: >
  Gate filter needs a "caller context" component: don't promote
  self-recursive functions if they have a CallCount > N in an
  outer loop caller (= fib_recursive pattern). Requires inter-
  function analysis; filed for future work.

ledger_update:
  classes_touched: [tier2-bounded-recursive-inline]
  new_class_introduced: null
  sub_pattern_learned: >
    Tier 2 self-call is heavier than Tier 1 self-call. Promoting
    a self-recursive function to Tier 2 saves work PER CALL CHAIN
    but adds per-call-entry overhead. For deep-recursion benchmarks
    called in an outer loop, the entry overhead dominates.
    Tier 2 needs its own BL self_call_entry equivalent before
    promotion becomes a suite-wide win.
