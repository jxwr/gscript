hypothesis:
  class: workflow-evolution
  claim: >
    v4's round-loop shape produced 1 win in 6 rounds because nothing
    read across rounds. Replacing it with a program loop (persistent
    ledger + structured round cards + 1M-context reading discipline)
    will improve the wins/rounds ratio and eliminate same-class reverts.
  expected_gain_pct: null       # not measured in benchmarks
  expected_gain_mechanism: >
    (1) Hypothesis-class lookup at Step 3 prevents R1→R2 class repetition.
    (2) Structured round cards + fixed revert_class enum make the ledger
        mechanically updatable, not prose-dependent.
    (3) Step 0 Recap + expanded Step 3 reading list force the agent to
        re-read cross-round state every round — the artifacts stop being
        sediment.
    (4) Commit schema makes round outcomes grep-computable.
  counterfactual_check: >
    Simulated v5 against R1–R6: R2 would have been flipped to strategy
    at Step 3 (prior_reject_rate=1.0 for go-gc-scan-reduction after R1).
    R6 would have consulted tier-routing-gate's composability constraint
    and added a Tier 1 → Tier 0 BLR cost microbench in pre-flight (Wave 3
    blocks it, Wave 1 would not but documents the constraint). On no
    benchmark does v5 make a round worse than v4 made it.

