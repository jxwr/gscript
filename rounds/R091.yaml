      sort:         r90 0.055s → r91 0.055s (0%)
      sieve:        r90 0.086s → r91 0.086s (0%, 10 samples)
      matmul_dense: r90 0.036s → r91 0.036s (0%)
    Flag elision fires at compile time when two SetTables on same
    table land in single-pred chain (fannkuch B11). Wall time
