# R91: keysDirty flag-write elision within block.
round: 91
date: 2026-04-19
follows: 90

type: tactical

target:
  benchmark: fannkuch
  current_wall_sec: 0.048
  reference_wall_sec: 0.048
  luajit_wall_sec: 0.020
  gap_factor: 2.40

hypothesis:
  class: tier2-typed-array-ic
  claim: >
    Every SetTable emit writes TableOffKeysDirty = 1 via MOVimm16+STRB
    (2 insns). When multiple SetTables on the same table occur in one
    block, the 2nd..Nth emissions are redundant (flag is idempotent —
    already 1 after first write). Mirror kindVerified cache pattern.
  expected_gain_pct: [0, 4]
  expected_gain_mechanism: >
    Fannkuch B11 has 2 SetTables on v1 → 1 elision × 2 insns × 5M iters
    = 10M insns saved. STRB is a store; M4 retires 2/cycle. Saves
    ~5M cycles ≈ 1.4ms on fannkuch 48ms base ≈ 3%. Same ARM64 absorp-
    tion risk.
  counterfactual_check: >
    Sieve's marking loop has 1 SetTable per iter — no benefit there.
    Sort's quicksort swap has 2 consecutive SetTables per swap
    branch — small benefit.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  current_state_audit_performed: true
  current_state_audit_summary: >
    emit_table_array.go has 6 keysDirty write sites (Mixed/Int-const/
    Int-raw/Int-slow/Float/Bool). All write MOVimm16 X5, 1 + STRB X5,
    [X0, TableOffKeysDirty]. No elision currently.

