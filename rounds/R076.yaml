hypothesis:
  class: workflow-evolution
  claim: >
    R65-R75 attempted 7 separate fixes to JIT codegen/regalloc/pass
    paths. 6 out of 7 regressed or reverted. Post-mortem shows all
    6 share the same methodology failures:
      (a) jumped to broad refactors instead of surgical one-path fixes
      (b) no failing-test-first discipline
      (c) no IR-diff capture when modifying emit/pass
      (d) no recorded bisect range when bug-hunting
    v5.1 rules assumed perf rounds as the common case; correctness-
    bug-fix rounds follow a different discipline that the current
    rules don't enforce. Add rules 26-29 to make that discipline
    mandatory for correctness rounds.
  expected_gain_pct: null
  expected_gain_mechanism: >
    Rules 26-29 force a test-first, surgical, IR-evidence-based,
    bisect-disciplined approach for correctness rounds. Immediate
    next-arc test case: quicksort Phi codegen bug (R75 blocker).
    Under old rules R74-R75 burned 2 rounds on wrong diagnosis;
    under new rules the failing Go test would be written R76a.1
    and the bisect locked scope before any code change.
  counterfactual_check: >
    If rules 26-29 are too heavy for simple bug fixes, they'll
    generate friction for R52-style 2-line obvious fixes. Mitigation:
    rules apply when class is correctness-bug-fix AND the change
    modifies emit/pass/regalloc code. Trivial dce.go hasSideEffect
    additions don't need IR dump.

