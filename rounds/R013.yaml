# Architecture round: ADR for tier2-inline-cache.
round: 13
date: 2026-04-17
follows: 12

type: architecture

target:
  benchmark: multi          # sieve + sort + method_dispatch + matmul
  current_wall_sec: null
  reference_wall_sec: null
  luajit_wall_sec: null
  gap_factor: null

hypothesis:
  class: tier2-inline-cache
  claim: >
    An IC per-PC cache for GetField/SetField/GetTable/SetTable is the
    structural answer to the LuaJIT 8.8× gap (R3) and the sort drift
    (R11). Both diagnostics converge on the same missing layer.
  expected_gain_pct: null
  expected_gain_mechanism: >
    Guard+hit is a single compare + branch + offset load, vs current
    arrayKind switch + shape lookup + RawGetInt. LuaJIT closes similar
    gaps this way. Per-site monomorphization captures the vast
    majority of real-world access patterns (observed across sieve,
    sort, matmul, method_dispatch).
  counterfactual_check: >
    Polymorphic sites DON'T benefit — they freeze to the current
    generic dispatch. Benchmarks with many distinct shapes or
    arrayKinds mid-run would hit the miss path often and pay more
    than they save. Countermeasure: record miss-rate in diagnostics;
    if miss rate > 30% for a site, consider increasing freeze
    threshold or deopting.

