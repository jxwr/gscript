round: 145
date: 2026-04-19
follows: 144

type: architecture

target:
  benchmark: ackermann
  also_measured: [fib, mut_recursion, mandelbrot, nbody_dense, matmul_dense, sieve, fannkuch]

hypothesis:
  class: tier2-recursion-closure
  claim: >
    A lightweight 16-byte Tier 2 self-entry (matching Tier 1's
    self_call_entry frame shape) + CallMode=2 discriminator for
    routing emitReturn to a matching light epilogue would let ack
    Tier 2 (tail-call-dominated, np=2) beat its Tier 1 baseline
    (0.271s). The user rejected the np==1/hasTailCall gate and
    required Tier 2 to be unconditionally faster than Tier 1.

  expected_gain_pct: [-45, -30]  # ack 0.446 → ~0.25s if 16B frame wins

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25
  mitigation_required: false

pre_flight:
  required:
    - description: all methodjit tests green, no bench regressions
      acceptance: ok
      halt_on_fail: true
  result: >
    Two code changes attempted:

    1. func_profile.go — removed the np==1 gate on
       `if staticallyCallsOnlySelf(proto) { qualifyForNumeric ... }`.
       With the gate removed, ack (np=2) and mut now qualify for Tier 2
       promotion when runtimeCallCount >= 2. hasTailCall() helper
       stays reserved (unused) per R144 landing. **SHIPPED.**

    2. emit_compile.go + emit_return.go + emit_call_native.go —
       lightweight self-entry (STPpre X29/X30 SP -16; MOVimm CallMode=2;
       LDR regs; B B0) + matching t2_self_epilogue_light (LDPpost SP 16;
       RET) + emitReturn CMPimm + BCond CondEQ routing. t2_numeric_self_entry_N
       also switched to 16-byte frame + CallMode=2. Caller-side
       CallMode save/restore un-gated (callee overwrites to 2, caller
       needs to restore to original 1). **ATTEMPTED AND REVERTED.**

  passed: true

