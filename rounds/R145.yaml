outcome:
  status: no-win
  shipped_code: true
  primary_win_bench: none
  primary_win_pct: 0
  reverted_in_round: partial  # change #2 reverted; change #1 kept
  notes: |
    User directive ("ack 不要stays Tier 1，直接优化tier2") drove the
    gate-open decision. Ack now promotes to Tier 2 but is +64% slower
    than its Tier 1 baseline (0.271 → 0.446s). This is a shipped
    regression that documents the cost boundary. The gate opening
    itself is irreversible-by-design — reverting it would re-accept
    the "stays Tier 1" posture the user explicitly rejected.

    ROOT CAUSE of ack Tier 2 being slower than Tier 1:

    Tier 2's emit_call_native.go caller-side path is ~50 insns per
    call (IC cached-closure compare + closure type guard + proto
    extract + MaxStack bounds + CallCount inc-with-threshold-check +
    64B scratch save of ClosurePtr/Consts/CallMode/GlobalCache +
    Constants/ClosurePtr/GlobalCache setup + NativeCallDepth inc/dec +
    BL + 64B scratch restore + ctx.Regs/Constants restore + ExitCode
    check + BRV → result slot + emitReloadSelectiveForCall).

    Tier 1's tier1_call.go self-call path (emitSelfCallEntryPrologue +
    caller steps 4-S through 8-S) is ~26 insns — static self-call
    skips IC, proto extract, bounds check, CallCount inc, most of the
    scratch frame save, and Constants/Globals setup (all invariant
    for same-proto self-call).

    The ~24 insn-per-call difference × ~1.3M ack self-calls ≈ 30ms
    static overhead. Add the SSA spill/reload per call (ack has
    ~3-4 live GPRs across the recursive call site) ≈ 8-10 insns
    extra per call. Combined: Tier 2's per-call cost is ~2.5× Tier 1.

    R146+ PATH to make ack Tier 2 < Tier 1:

      (A) Static-self-call fast path in emitCallNative — dedicated
          emit branch for `isStaticSelfCall && isNumericStaticSelfCall`
          that skips IC, closure type guard, proto extract, MaxStack
          bounds, CallCount inc, and most of the scratch frame save.
          Minimal scratch: 32B for X29/X30 + mRegRegs.
          Optimistic savings: ~30-40 insns/call = ~15-20ms on ack.
          Not enough alone to beat Tier 1 (would need ~50ms saved).

      (B) Skip SSA spill/reload on self-call by exploiting regalloc
          symmetry (same proto → same ValueRegs assignment). Values
          in caller's physRegs are the SAME physRegs callee will use,
          so spill-reload is round-trip work. Risk: register contents
          differ semantically (caller's v[X] != callee's v[X] even
          when both use same phys reg); needs careful SSA→phys
          tracking across the call boundary.
          Harder but potentially 15-20ms more saved.

      (C) Lightweight 16-byte Tier 2 self-entry (today's attempted
          change #2). Re-try AFTER (A) and (B) land, because then
          the CallMode save/restore cost is amortized over a much
          thinner call path and its 10-insn frame save actually
          wins.

    Collectively (A)+(B)+(C) should bring ack Tier 2 to ~0.25-0.28s,
    beating Tier 1.

    Gate-open decision is a precondition for all three. Shipping R145
    locks in the direction; R146+ do the real work.
