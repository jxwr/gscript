revert_cost_model_delta: >
  Predicted 2-6% fannkuch gain; actual ~0% (or slight regression
  0.047→0.048 within noise). Consistent with R87/R88 lesson: generic-
  to-typed op specialization reduces insn count but the saved insns
  retire in the shadow of the LDR's load-use latency on ARM64's
  superscalar pipeline. Full IR cleanup (Le=0, Sub=0, etc.) is now
  available for future rounds that do bigger restructurings
  (e.g., RangeAnalysis-driven bounds elision, LICM kind hoist).
revert_prevention: >
  This is the THIRD round in a row (R87, R88, R89) where infra
  specialization gave adr-win but no bench-win. Pattern: ARM64 6-8
  superscalar absorbs 2-5-insn hot-loop savings. Future rounds in
  this direction must demonstrate ≥ 5 insn/iter save in a SEQUENTIAL
  dep chain (not speculative shadow), OR target a truly out-of-cache
  data access pattern. Rotating direction in R90+.

ledger_update:
  classes_touched: [tier2-tight-loop]
  new_class_introduced: null
  sub_pattern_learned: >
    insertParamGuards's ConstInt-only heuristic was too narrow —
    Phase 1d (R89) closes the gap by using type-propagation results.
    Now ANY param used in a numeric op with inferred-int neighbor
    gets TypeInt speculation. Future: also extend to table/struct
    guards (GuardType TypeTable) on params used as table args.
    Wall-time payoff limited by ARM64 absorption of small-insn saves.
