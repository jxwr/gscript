# R89: insertIntParamGuards — cover "i <= n" pattern where n is a
# param used in numeric ops with inferred-int neighbors (not just ConstInt).
round: 89
date: 2026-04-19
follows: 88

type: tactical

target:
  benchmark: fannkuch
  current_wall_sec: 0.048
  reference_wall_sec: 0.048
  luajit_wall_sec: 0.020
  gap_factor: 2.40

hypothesis:
  class: tier2-tight-loop
  claim: >
    pass_typespec.go's insertParamGuards heuristic is too narrow — it
    only marks a param as int-like when paired with OpConstInt. For
    fannkuch, param n is compared with v17 = AddInt (TypeInt), not
    ConstInt, so no guard is inserted. Post-warmup IR shows Le=3 still
    generic at the three `i <= n` bounds checks. Adding a Phase 1d
    insertIntParamGuards that runs AFTER type propagation and inserts
    TypeInt guards for still-unguarded params whose neighbor has
    inferred TypeInt will cascade Le → LeInt, eliminating ~4-6 insns
    per outer-loop iter.
  expected_gain_pct: [2, 6]
  expected_gain_mechanism: >
    Generic Le emits per-operand int-tag checks (2 LSR + 2 CMPreg) +
    fused compare-branch. LeInt emits only CMPreg + B.cc (2 insns).
    Save: ~4 insns per iter × ~3-5M iters = 12-20M insn reduction.
    Also indirectly benefits other Sub/Lt/Eq ops where operands
    become TypeInt (cascades).
  counterfactual_check: >
    sort's quicksort has a similar "i < N" pattern — might also
    benefit. matmul/spectral (float-heavy) unaffected because their
    params are float-like (already handled by insertFloatParamGuards).
    Risk: a param that LOOKS int-like but is actually float at runtime
    would trigger deopt on the guard — correctness-preserving but
    perf-negative. Mitigation: only guard when neighbor type is
    UNAMBIGUOUSLY TypeInt (not also TypeFloat).

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0           # tier2-tight-loop: 1 ADR, 0 reverts, 2 holds
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Read warm IR (r89_warm_ir_test.go) after JIT-warmup fannkuch:
      Sub=0 SubInt=4 Add=0 AddInt=9 Mul=0
      Lt=0 LtInt=3 Le=3 LeInt=1 Eq=0 EqInt=2 GuardType=9
    The 3 Le are all `<var> <= v0` where v0 = LoadSlot(0) = param n.
    insertParamGuards's intLikeParams heuristic (pass_typespec.go:262)
    only matches ConstInt partner, missing v17 = AddInt, v40 = AddInt,
    v155 = AddInt. Fix: cascade check via ts.argType after Phase 1a
    propagation.
    Rule 23: warm IR is the IR-level audit; confirmed the gap exists.
    Rule 23 amendment (R32): IR-level reads required — satisfied.

