  gap_factor: 2.2

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    R43's OpMatrixGetF is a single monolithic op that re-loads dmFlat +
    dmStride on every inner-loop access. Splitting it into three IR
    ops (OpMatrixFlat, OpMatrixStride, OpMatrixLoadFAt) lets LICM hoist
    Flat/Stride out of loops where m is invariant. matmul's k-inner-loop
    has a and b loop-invariant, so post-LICM:
       preheader:  flat_a, stride_a = MatrixFlat/Stride(a)
                   flat_b, stride_b = MatrixFlat/Stride(b)
       k body:     MUL + ADD + LDR  (load a[i][k])
                   MUL + ADD + LDR  (load b[k][j])
                   FMULd + FADDd
    Per inner iter: 8 insns → matches LuaJIT's inner loop shape.
  expected_gain_pct: [20, 30]
  expected_gain_mechanism: >
    Before R45: each matrix.getf inside inner loop does
      EmitExtractPtr (1) + LDRW stride + CBZ (2) + LDRW stride (1) +
      MUL + ADD (2) + LDR flat (1) + LDRreg (1) = ~8 insns after R44
      cache + still redundant stride reload.
    After R45: LICM hoists Flat (2 loads) and Stride (1 load) to
      preheader. Inner body: MUL + ADD + LDRreg = 3 insns/load.
      At 2 getf per iter × 27M iter × ~5 insns saved = 270M insns
      ≈ 135 ms. matmul_dense 0.046 → ~0.032s projected.

  counterfactual_check: >
    OpMatrixFlat and OpMatrixStride carry the stride>0 guard
    (dmVerified cache avoids repeating). If hoisted out of a loop
    with a call inside that reallocated m, the hoisted guards would
    be stale — but LICM ALREADY gates on hasLoopCall for GetField/
    GetGlobal; same gate protects us here (pass_licm.go:canHoistOp
    whitelists Flat/Stride, the in-loop guard still blocks hoisting
    past calls). Zero emergent-risk versus existing hoisting patterns.

