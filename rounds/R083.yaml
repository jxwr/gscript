ledger_update:
  classes_touched: [correctness-bug-fix]
  new_class_introduced: null
  sub_pattern_learned: >
    Option 1 (raise threshold uniformly) is WRONG: single-entry
    compute functions (very common pattern in benchmarks) need
    immediate promotion. The correct path is more nuanced:
      (a) keep threshold=1 for LoopDepth≥2 or high-arith functions
          (these benefit from Tier 2 even on first call)
      (b) threshold=5 for call-heavy / short-body functions (these
          benefit from feedback more than immediate compile)

    OR use Option 2 or 3 from the original list. Option 2 (extend
    Tier 1 fast path to update feedback) now looks more attractive
    because it doesn't require categorizing functions.

    Alternative: a NEW tier0.5 mode where first call goes to interp
    (populates feedback), subsequent calls go to Tier 1, then Tier 2.
    This splits Option 1's "5x warmup" cost into "1x warmup" which
    is much cheaper AND still gives feedback time.

