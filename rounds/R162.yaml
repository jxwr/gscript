# R162: Session 1 / B.5 — smart gate: widen OSR to LoopDepth>=1
#       with a depth-aware filter that keeps existing Tier 2 winners
#       unchanged and gates new widen-candidates on an EA-clean body.
#       Also fixes R154's env-var-in-hot-path regression. Net:
#       object_creation 0.906s → 0.008s (100×) shipped; no other
#       benchmark regresses.
round: 162
date: 2026-04-21
follows: 161

type: tactical

target:
  benchmark: multi

hypothesis:
  class: escape-analysis-scalar-replacement
  claim: >
    A depth-aware promotion gate widens OSR to LoopDepth>=1 WITH
    a stricter post-pipeline filter (hasExitResumeInLoop, rejects
    dynamic table ops / NewTable / calls / upvals in loops) for
    the newly-admitted bucket. Existing LoopDepth>=2 candidates
    keep the old hasCallInLoop filter (OpCall only). Result:
    object_creation (EA-clean after R161) gets its 100× speedup
    without regressing fannkuch/sieve/other.
  expected_gain_pct: [-99, -50]  # object_creation only

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null

pre_flight:
  required:
    - description: >
        Identify why the naive widen (LoopDepth>=1 + unchanged
        filter) regressed fannkuch (+79%) and sieve. Diagnose:
        typed-array benchmarks rely on OpGetTable/OpSetTable
        native fast paths; a strict filter rejecting them would
        regress what already works.
      acceptance: tier1↔tier2 flow understood per bench shape
      halt_on_fail: true
    - description: >
        Identify why R146-era fib was 0.86s but R155-era fib was
        1.08s on the same machine. Bisect to R154's env-var-in-
        hot-path (os.Getenv called from executeTier2 loop and
        TryCompile on every dispatch = syscall overhead on hot
        recursion).
      acceptance: 25% fib regression root-caused
      halt_on_fail: true
  result: |
    Diagnosis #1: depth-aware design. LoopDepth>=2 (mandelbrot,
    spectral_norm, fannkuch, nbody_dense) stayed Tier 2 under
    old gate; adding stricter filter only hurts them (fannkuch
    rejected due to OpSetTable in loop despite its typed-array
    fast-path elsewhere). LoopDepth<2 (create_and_sum,
    transform_chain, sort/<main>) was BLOCKED under old gate;
    widening allows them AS LONG AS post-EA body is clean.
    Split filter by depth.

    Diagnosis #2: R154's `os.Getenv("R154_TRACE")` calls were
    placed inside TryCompile and inside executeTier2's main
    `for { CallJIT; switch }` loop. os.Getenv is ~100-300ns per
    call on macOS (syscall + internal mutex). For fib(35) with
    9.2M Tier 2 invocations, that's 2.0s of pure env-var
    lookup — directly matching the ~220ms regression observed.
    Fix: cache env vars once in TieringManager struct at
    NewTieringManager() time.

  passed: true
  failing_test: null
  failing_output: null
  surgical_scope: >
    tiering_manager.go: +envR154Trace, +envTier2NoFilter struct
      fields; NewTieringManager caches them once; replace all hot-
      path os.Getenv calls with cached bool checks.
      +hasExitResumeInLoop (R162 strict filter).
      compileTier2: depth-aware gate (strict for LoopDepth<2,
      classic for LoopDepth>=2).
    OSR gate widened from LoopDepth>=2 to LoopDepth>=1
      unconditionally (the new filter catches bad shapes).
    tiering_manager_diag_test.go: set GSCRIPT_TIER2_NO_FILTER=1
      inside runParity so parity tests exercise sieve's Tier 2
      compile even though sieve is correctly rejected by the
      strict filter in production.
  ir_diff_before: null
  ir_diff_after: null
  bisect_range: null

