# --- architecture deliverable: ADR summary ---
adr_summary:
  title: "DenseStruct — homogeneous-float named-field Table layout"
  core_design: >
    A Table constructed via struct.dense({fields}) carries the same
    runtime promises as matrix.dense (flat []float64 backing,
    JIT-stampable meta), but the field dimension has named slots
    instead of integer indices. Underneath, it IS a DenseMatrix
    with 1 row and N field columns (or N rows × 1 column, depending
    on shape convention) OR a flat []float64 of length N per struct
    instance.

  runtime_choices:
    - name: factory_signature
      chosen: "struct.dense(fieldNames, count)"
      rationale: >
        Returns an array of `count` pre-allocated struct-tables
        sharing one flat []float64 backing of length count*len(fieldNames).
        Parallel to matrix.dense(r, c).
    - name: field_access_form
      chosen: "struct.getf(obj, fieldIdx) / struct.setf(obj, fieldIdx, v)"
      rationale: >
        Parallel to matrix.getf/setf. fieldIdx is resolved at
        struct.dense() construction time via the field-name table
        (compile-time constant in typical usage).
    - name: intrinsic_rewrite
      chosen: "reuse OpMatrixGetF/SetF with stride=1 special case"
      rationale: >
        A struct instance is row=instanceIdx, col=fieldIdx in an
        N×F DenseMatrix. All existing matrix.dense infrastructure
        (flat backing, dmFlat/dmStride, MatrixLowerPass, LoadFAt
        emit, R45 LICM hoist) applies unchanged. No new JIT op
        needed. R50's work is purely a runtime facade that exposes
        `struct.dense` as syntactic sugar over matrix.dense.
    - name: source_impact_on_nbody
      chosen: "rewrite bodies construction + field accesses in nbody.gs"
      rationale: >
        R42-R45 required rewriting matmul_dense.gs to use matrix.dense
        + getf/setf. Same pattern for nbody.gs. Keep legacy nbody.gs
        as-is for regression; add nbody_dense.gs as parallel benchmark.

