# R50: architecture — DenseStruct (homogeneous-float struct layout) for nbody/spectral_norm.
round: 50
date: 2026-04-18
follows: 49

type: architecture

target:
  benchmark: nbody
  current_wall_sec: 0.250
  luajit_wall_sec: 0.035
  gap_factor: 7.14

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Generalize the R42-R45 DenseMatrix pattern (shared flat []float64
    backing + JIT intrinsic direct-load) from rectangular numeric
    arrays to named-field structs with homogeneous-float layout.
    nbody's `bodies` (array of 5 tables, each with 7 float fields
    x/y/z/vx/vy/vz/mass) is identical in shape-memory terms to a
    DenseMatrix(5, 7). Shipping a `struct.dense({name: "x", name: "y", ...})`
    factory that returns a flat-backed Table lets nbody's field
    accesses lower to single-LDR FPR loads, bypassing NaN-box +
    shape-guard + slot-offset dispatch.
  expected_gain_pct: [30, 50]
  expected_gain_mechanism: >
    nbody's advance() j-inner-loop has 10 GetField + 6 SetField per
    iter on 4 distinct field slots (vx/vy/vz of bi and bj; bi's
    x/y/z are LICM-hoisted per R32 finding). In the NaN-boxed
    shape-IC path, each field op costs ~5 insns (shape-guard CMP+BNE
    + slot-offset compute + Value LDR + unbox). With flat float64
    backing and JIT intrinsic, each op becomes ~2 insns
    (base+offset LDR directly to FPR). For 5M iters × 16 ops × 3
    insns saved = 240M fewer insns. At M4's ~8 IPC effective,
    that's ~30-50ms.
  counterfactual_check: >
    Does DenseStruct compose with other benches? spectral_norm uses
    flat numeric vectors (applies directly — 1D case of
    DenseMatrix, already covered by matrix.dense). sort uses
    mixed-type tables — DOESN'T apply. method_dispatch operates
    on heterogeneous tables — DOESN'T apply. Risk: if nbody's
    `bodies[1]` table escape analysis isn't tight (e.g. passed to
    functions that assume NaN-box layout), we corrupt. Mitigation:
    DenseStruct is an opt-in factory; legacy tables unchanged.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0            # tier2-dense-matrix-kind: 5 win + 2 hold = 0%
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Read diag/nbody/advance.ir.txt + graph_builder.go + pass_typespec.go
    + pass_load_elim.go. Concrete findings:
      (1) LoadEliminationPass already runs and does block-local
          GetField CSE + SetField→GetField store-forwarding + GuardType
          CSE. 126 lines in pass_load_elim.go confirm nbody's
          redundant loads are not the bottleneck.
      (2) nbody cold IR shows NO GuardType ops because diag.sh does
          cold compile. Per R24 ledger evidence, WARM production
          nbody does have FBFloat feedback → GuardType inserted →
          downstream arith specialized. So the bottleneck is NOT
          typespec coverage.
      (3) The remaining 16 field ops per j-iter are on DISTINCT
          slots (field[6]=vx, [7]=mass, [8]=vy, [9]=vz). They are
          not redundant; they are genuinely needed.
      (4) Each warm-path field op costs ~5 insns: shape-CMP,
          slot-LDR-Value, unbox (LSR+CMP+BNE for type tag), then
          float residency. At 5M × 16 × 5 = 400M insns, that's
          ~400M × 0.3ns = 120ms of pure field-access cost in a
          benchmark currently taking 250ms.
      (5) DenseMatrix pattern (R42-R45) reduced matmul_dense's
          getf/setf cost from ~5 insns → ~2 insns (flat LDR with
          base+offset addressing). Applying same pattern to
          named-field structs is a direct port.

