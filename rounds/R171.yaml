# R171: sum_primes guarded ModInt fast path under existing Tier 2 gate.
round: 171
date: 2026-04-27
follows: 170

type: tactical

target:
  benchmark: sum_primes
  current_wall_sec: 0.006
  reference_wall_sec: 0.004
  luajit_wall_sec: 0.002
  gap_factor: 3.0

hypothesis:
  class: tier2-tight-loop
  claim: >
    Keep the current <main> gate closed, but reduce the hot Tier 2 callee
    by using range facts to emit a guarded scalar fast path for positive
    integer modulo sites in is_prime.
  expected_gain_pct: [0, 8]
  expected_gain_mechanism: >
    is_prime has four ModInt sites. On the proven positive/non-zero paths,
    ARM64 SDIV/MSUB already matches Lua modulo semantics, so the emitter can
    remove CBZ, sign-check, TBNZ, ADD, and branch scaffolding per site.
  counterfactual_check: >
    Forcing <main> Tier 2 should remain slower because global sum/count
    read/write exits are independent of ModInt emission.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false

pre_flight:
  required:
    - description: Confirm current <main> gate still protects sum_primes
      acceptance: diagnose_tier2 shows default entered=1/failed=1 and no-filter slower
      halt_on_fail: true
  result: |
    Base 9b2887c:
      default:   0.006s, T2 entered=1 failed=1, exits=0
      no-filter: 0.009s, T2 entered=2 failed=0, exits=38402

    Hot sites under no-filter remain 9592 GetGlobal/SetGlobal exits each for
    sum and count. Do not open the <main> gate.
  passed: true

outcome:
  status: no-win
  shipped_code: true
  bench_deltas:
    sum_primes: {from: 0.006s, to: 0.006s, pct: 0.0}
  regressions: []
  commit: null

ledger_update:
  classes_touched:
    - tier2-tight-loop
  new_class_introduced: null

notes: |
  Shipped a safe general scalar fast path:
    - RangeAnalysisPass now records IntModNonZeroDivisor and
      IntModNoSignAdjust facts.
    - emitIntModX0X1 skips the zero guard and sign-adjust only at proven sites.

  is_prime code shape improved:
    before: 293 ARM64 instructions, 1172 bytes, 70 branch instructions
    after:  244 ARM64 instructions,  976 bytes, 46 branch instructions

  Measured wall-time stayed at suite resolution:
    pre-change GScript JIT 11-sample median:  0.006s
    post-change GScript JIT 11-sample median: 0.006s
    LuaJIT 11-sample median:                 0.002s

  This closes the "guarded scalar fast path" probe for sum_primes as a safe
  code-size win but not a benchmark win. Remaining useful designs are
  top-level global/local residency or a Tier 1 caller -> Tier 2 raw-int entry
  path for non-recursive numeric callees.
