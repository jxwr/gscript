# R42: DenseMatrix Phase 1 — shared flat backing, -18% matmul.
round: 42
date: 2026-04-18
follows: 41

type: tactical

target:
  benchmark: matmul
  current_wall_sec: 0.116
  reference_wall_sec: 0.124
  luajit_wall_sec: 0.021
  gap_factor: 5.5

hypothesis:
  class: tier2-dense-matrix-kind      # promoted from forward_classes
  claim: >
    R30 ADR Phase 1: implement DenseMatrix as a factory that returns
    a table-of-tables where all row tables share ONE flat []float64
    backing. Compatible with existing JIT (no new ArrayKind; outer
    is plain ArrayMixed, rows are normal ArrayFloat). Memory layout
    benefit: single contiguous allocation → better cache locality,
    GC sees 1 backing object instead of N row backings.
  expected_gain_pct: [10, 25]         # bench-micro showed neutral; end-to-end TBD
  expected_gain_mechanism: >
    Shared backing reduces GC scan to a single region and gives CPU
    cache the contiguous layout it prefers for matmul's k-sequential
    b[k] sweep. No JIT changes needed: JIT emits its usual
    ArrayMixed outer + ArrayFloat row paths; the hot-loop FLDR from
    row.floatArray lands on a cached flat backing.

    Phase 2+ (future rounds) can add JIT-level recognition for a
    DenseMatrix flag and emit a single-load shortcut for t[i][j]
    (bypass row wrapper), unlocking the 3.5× microbench ceiling.
  counterfactual_check: >
    NO new ArrayKind — outer Table looks like ArrayMixed; row Tables
    look like ArrayFloat. Zero impact on existing JIT fast paths.
    Zero impact on benchmarks that don't opt-in via matrix.dense().

    Correctness: row wrappers alias shared backing via bounded
    sub-slices (start:end:end). Append past capacity grows a new
    slice (rare; user code doesn't append to fixed-size matrix rows).

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Inspected Table struct + RawGetInt/RawSetInt paths + JIT emit
    for ArrayKind cases. Confirmed: adding a new ArrayKind would
    require JIT emit_table_array changes (kind-guard cascade DEOPTs
    on unknown kinds). Phase 1 uses the compatible design: no new
    ArrayKind, just a constructor that wires shared backing through
    existing ArrayFloat rows.

