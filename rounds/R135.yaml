# R135: audit of revert-under-dead-Tier2 candidates — R112 + R113 re-applied,
#       measured neutral/+0.5% fib, confirming the original reverts were
#       genuine, NOT noise. M4 pipeline-sensitivity rule stands.
round: 135
date: 2026-04-19
follows: 134

type: diagnostic

target:
  benchmark: fib

hypothesis:
  class: tier2-recursion-closure
  claim: >
    R131 → R132 found that rounds R107-R130 targeted Tier 2 emit
    code that was dead for fib/ack/mut. So any revert from that
    window that cited a perf regression MIGHT have been measuring
    noise on dead code. R132 made fib Tier 2 live; this round
    re-measures two representative reverts (R112 skip Constants,
    R113 skip ClosurePtr) to test the noise hypothesis.

    Counter-hypothesis (from feedback_m4_pipeline_sensitivity.md):
    the reverts were genuine M4-pipeline regressions, not noise on
    dead code. Confirming or refuting this hypothesis steers
    R136+ work.

  expected_gain_pct: [-3, 0]   # IF the reverts were noise

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.25

pre_flight:
  required:
    - description: methodjit suite green
      acceptance: ok
      halt_on_fail: true
  result: >
    Re-applied R112 + R113 in emit_call_native.go:
      R112: gate `LDR mRegConsts ← Proto.Constants; STR ctx.Constants`
            on `if !staticSelf { ... }` (skip 2 insns for self-calls).
      R113: gate `STR X0 (closure) → ctx.BaselineClosurePtr` on a new
            skipClosurePtr flag, true iff static self + no upvalues
            + no nested protos (skip 1 insn per qualifying call).

    Built and measured under live Tier 2 (fib now compiled to Tier 2
    via R132 gate). 9-sample median per side:

      R134 baseline (no re-apply):  0.943s
      R135 (R112 + R113 re-apply):  0.948s   (+0.5%, neutral / slight regression)

    Suite green throughout. Re-apply REVERTED (restored pre-R135
    code) — no shipping.

  passed: false   # hypothesis disconfirmed

current_state_audit_summary: |
  # Test:                     fib median (9 samples)
  # R134 baseline              0.943s
  # R135 (R112 + R113)         0.948s   → +0.5% (noise / flat)
  # Expected under noise hyp:  -3 to 0% (3+ insns × 29M calls saved)
  # Actual:                    0%+0.5%

  # Conclusion: even with Tier 2 live, skipping the Constants LDR+STR
  # and the ClosurePtr STR on static self-calls does NOT translate to
  # wall-time improvement on fib. The insns being removed must be
  # filling scheduling slots the M4 frontend would otherwise stall on.
  # This matches the feedback_m4_pipeline_sensitivity.md prediction.

outcome:
  status: adr-win
  shipped_code: false
  primary_finding: >
    The R112 + R113 reverts (and by extension the M4 pipeline-
    sensitivity rule derived from R109-R114) are GENUINE. Re-applying
    under live Tier 2 still shows no gain — the reverts were not
    noise on dead code. Option B ("revive dead-code-killed reverts")
    is NOT a productive direction for further tier2-recursion-closure
    wins.
  notes: >
    Implications:
      - The insn-count savings predicted by R109-R114 don't translate
        to wall-time on M4. The existing call-context block is tuned.
      - Future wins in this class should target DIFFERENT mechanisms,
        not micro-cuts in the call-context block:
          (i) Fix the ack np>=2 hang (R133-R134 trail; inline-form
              register-packing bug in JIT emit) — unlocks ~-30% on
              ack.
          (ii) Layer 4 of numeric-conv (raw int return; R131 attempted
               + reverted due to +0.6% fib regression on DEAD code —
               that regression WAS noise and Layer 4 should be
               re-tried under live Tier 2).
          (iii) Investigate whether fib's Tier 2 body itself has
                tight-loop micro-optimizations remaining (profile the
                recursive-call hot path under Tier 2, not the Tier 1
                BLR trampoline).

    The M4 pipeline-sensitivity rule stays.
