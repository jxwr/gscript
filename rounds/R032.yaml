  commit: e605cc5
  findings: >
    **R29 ADR's premise was partially WRONG.** Inspecting
    diag/nbody/advance.ir.txt reveals:

    - advance's `bi = bodies[i]` (v9) is assigned in B1 (i-loop body).
    - A separate block B9 (preds: B1) holds:
        v20 = GetField v9.field[1]   ← bi.x
        v23 = GetField v9.field[2]   ← bi.y
        v26 = GetField v9.field[3]   ← bi.z
        v59 = GetField v9.field[7]   ← bi.mass
    - B9 jumps to B3 (j-loop check). B9 runs ONCE per i, NOT per j.
    - Therefore LICM (pass_licm.go line 237+) HAS ALREADY hoisted
      the loop-invariant bi.* field reads.
    - B2 (j-loop body) reads bj fields (v18 = bodies[j], plus v21,
      v24, v27, v41, v58, v64, v70) — these VARY with j, cannot
      be hoisted in principle.
    - B2 also reads and writes bi.vx/vy/vz (v40-v57) — read-write
      self-dependency prevents hoisting.

    **Remaining per-iter cost on inner loop:**
    - 7 GetField on bj (varying) — structural; only compressible
      via dense struct layout (R30 ADR, deferred multi-session)
    - 3 GetField + 3 SetField on bi.v* — structural; can't hoist

    My R29 audit was INCOMPLETE — I read the emit code but didn't
    cross-check the actual post-LICM IR. Rule 23 (current-state
    audit) was partially applied but the audit missed the LICM
    output. A better audit would have spent 5 minutes on diag's
    IR before writing the ADR.

  unresolved_opportunity: >
    Svals-pointer CSE across consecutive GetFields on same table:
