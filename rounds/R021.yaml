# Third architecture round: tight-loop tier-2 strategy.
round: 21
date: 2026-04-17
follows: 20

type: architecture

target:
  benchmark: multi            # matmul, nbody, spectral_norm, sieve, fannkuch
  current_wall_sec: null
  reference_wall_sec: null
  luajit_wall_sec: 0.021      # matmul reference; per-bench gaps 5-7×
  gap_factor: 5.5             # matmul

hypothesis:
  class: tier2-tight-loop
  claim: >
    The 5-8× LuaJIT gaps on numeric tight loops (sieve, nbody,
    spectral_norm, matmul, fannkuch) are caused by a type-propagation
    gap: typed-array GetTable + shape-guarded GetField return `any`
    in the IR, so downstream Mul/Add routes through the generic
    type-dispatch emit path instead of the already-implemented raw-FPR
    fast path. Fixing typespec to propagate Float/Int types from
    typed loads yields an estimated 40-60% speedup on these
    benchmarks with no new emit machinery.
  expected_gain_pct: null
  expected_gain_mechanism: >
    (1) emitTypedFloatBinOp raw-float path EXISTS but is gated on
        instr.Type == TypeFloat. typespec currently doesn't mark
        GetTable/GetField results as float even when feedback says
        ArrayFloat. Fix: propagate feedback kind into result type.
    (2) Loop-carried FPR residency already works when the IR is
        typed. The bottleneck is upstream type loss.
    (3) Int-side (fannkuch) gets the same fix at zero additional cost.
  counterfactual_check: >
    Risks are limited because typespec only NARROWS types (any →
    float) when feedback is monomorphic. A miss deopts as today.
    Benchmarks without typed-array hot loops are unaffected. The
    raw-FPR emit path is already tested (see emit_test.go coverage).

