  - program/ledger.yaml — add note that pre-R49 entries use legacy
    win-taxonomy; post-R49 separate bench_wins vs adr_wins.

outcome:
  status: adr-win
  bench_deltas: {}            # meta round; no benchmark movement expected
  regressions: []
  shipped_code: true          # schema changes to CLAUDE.md, TEMPLATE.yaml, round.sh, luajit_gap.yaml

revert_class: null
revert_root_cause_location: null
revert_cost_model_delta: null
revert_prevention: null

ledger_update:
  classes_touched: [workflow-evolution]
  new_class_introduced: null
  sub_pattern_learned: >
    Audit-driven meta rounds produce clearer specs than
    reactive-correction meta rounds (cf. R33 reacted to R29-R32
    drift; R49 proactively audits before drift compounds). Consider
    a periodic audit cadence: every 15-20 rounds run a read-only
    workflow audit and rotate ceremonies that have drifted from
    practice.

notes: >
  Rationale for each change:

  (1) bench-win vs adr-win:
      class-gate's prior_reject_rate now measures only rounds that
      tried to move a benchmark. An ADR round is inherently separate
      from a code round in its contribution to the class's perf
      track record. A reverted ADR is rare (architecture rounds
      don't revert; they get disproven in a later tactical round).

  (2) rule 17 + 18 removal:
      Both were calibration attempts that the session dynamics
      never respected. A round IS a hypothesis-closure unit, not a
      time unit. Multi-round sessions (R29-R41, R42-R46) were net
      productive — forcing them into 1-round-per-session chunks
      would have added ceremony without improving signal.

  (3) post-commit auto-fill:
      User asked for a post-commit hook. On inspection, the sha
      field is redundant with the commit message schema: the
      closing commit of round N is `git log --grep='^round N \['
      -1 --format=%H`. Eliminating the field entirely beats
      automating its fill — no new hook, no amended commit (which
      would conflict with "never amend" guidance). The card's
      `commit:` field becomes optional metadata, not load-bearing.

  (4) hold/null-result merge:
      New enum: {bench-win | adr-win | revert | no-win}. The
      orthogonal axis `shipped_code: bool` captures what hold vs
      null-result used to distinguish. Cleaner 4-way × 2-way
      matrix; easier grep.

  (5) luajit_gap.yaml:
      Per-benchmark append-only log makes Step 3 "what's the biggest
      gap right now" a one-file read. Complements ledger's
      hypothesis-class view. Seeded from benchmarks/data/reference.json
      plus current (R48) state for benchmarks we've touched.

  Historical continuity:
    - Pre-R49 cards stay untouched (append-only).
    - ledger.yaml entries pre-R49 use legacy `wins` count; a top-level
      note documents the taxonomy shift.
    - Rule numbers 17/18 kept as `REMOVED by R49` markers so that the
      ~15 historical references still resolve.
