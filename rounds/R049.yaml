# R49: Workflow v5.1 refinements based on R1-R48 audit.
round: 49
date: 2026-04-18
follows: 48

type: meta

target:
  benchmark: workflow
  current_wall_sec: null
  luajit_wall_sec: null
  gap_factor: null

hypothesis:
  class: workflow-evolution
  claim: >
    After 48 rounds of v5, five mechanical defects are visible:
      (1) "win" is inflated — 8/8 architecture-win + 8/8 meta-win
          share a label with bench-moving wins, so prior_reject_rate
          is computed on a liberal denominator and never fires rule 21;
      (2) rules 17 (one-session-per-round) and 18 (3-hour budget) are
          routinely violated in practice (R29-R41: 13 rounds/session;
          R42-R46: 5 rounds/session) — neither ever triggered a revert;
      (3) every closing commit is followed by a manual
          `follow-up: fill sha` commit — pure mechanical noise (10
          such commits in the last 15);
      (4) hold vs null-result distinguish on cosmetic grounds (R46
          "hold" shipped code; R48 "null-result" didn't) but both
          represent "no benchmark moved" — the split spams the
          outcome dimension;
      (5) there's no per-benchmark global progress view — ledger
          is hypothesis-class-organized, so "which benchmark has the
          widest LuaJIT gap right now" requires manual collation.
    Fix all five in a single meta round. Pre-R49 cards stay as-is
    (append-only history); new fields apply from R50 onward.
  expected_gain_pct: null
  expected_gain_mechanism: >
    Cleaner taxonomy lets class-gate (rule 21) actually fire on
    classes that are genuinely exhausted, instead of being diluted
    by ADR-wins. Eliminating rule 17/18 aligns rules with practice.
    No-sha cards remove 10+ ceremonial commits per 50 rounds.
    luajit_gap.yaml gives Step 3 direction a one-read answer for
    "which bench next." Net effect: more rounds per unit time spent
    on actual code; fewer rounds spent on workflow-self-correction
    (which historically is 11/48 ≈ 23%).
  counterfactual_check: >
    If the new outcome enum still hides real failures under adr-win
    (e.g. a meta round that introduces a bug), we'll catch it via
    rule 20 (no sunk cost) — next tactical round stuck on workflow
    bug will force meta re-visit.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0            # workflow-evolution: 11 wins, 0 reverts
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Audited all 48 round cards and cross-referenced with ledger.
    Key concrete findings:
      - tactical rounds: 22 total, 12 win (55%), 5 revert, 5 hold
      - architecture rounds: 8/8 labelled "win" (100%) but R21's win
        was disproven by R24 diagnostic — label is inflated
      - revert root causes: cost-model-error ×5 (most common)
      - rule 18 (3h budget): never fired auto-revert across 48 rounds
      - rule 21 class-gate (>0.5 reject + >=3 attempts): only
        `go-gc-scan-reduction` approaches the threshold — most
        classes dilute their reject-rate with ADR-wins
      - meta+strategy+kb+diag: 18/48 rounds (37.5%) — overhead is
        real but partly necessary (R33's IR-reading amendment came
        from real lesson)
    The five defects are grounded; fix is cleanup, not invention.

pre_flight:
  required: []
  result: null
  passed: null

# --- workflow deliverables (meta round) ---
deliverables:
  - CLAUDE.md — rules 17 and 18 marked REMOVED; rule 22 commit schema
    updated to new outcome enum; add luajit_gap.yaml update to Step 6.
  - rounds/TEMPLATE.yaml — outcome.status enum refactored to
    {pending | bench-win | adr-win | revert | no-win}; add
    outcome.shipped_code bool; drop requirement for commit sha
    (derivable via `git log --grep='^round N \['`).
  - program/luajit_gap.yaml — NEW. Append-only log of per-benchmark
    gscript_jit_sec vs luajit_sec per verify step. Seed from
