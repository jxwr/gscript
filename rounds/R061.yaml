# R61: ADR — IR-level unroll-and-jam for float reductions.
round: 61
date: 2026-04-18
follows: 60

type: architecture

target:
  benchmark: matmul_dense
  current_wall_sec: 0.038
  luajit_wall_sec: 0.021
  gap_factor: 1.81

hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    Implement an IR-level UnrollAndJamPass that detects float-reduction
    loops of the canonical form `acc = acc + x` (where acc is a
    loop-carried Phi) and unrolls them by factor 2 with split
    accumulators (acc0, acc1). This breaks the serial FMA dependency
    chain that R47 identified; downstream FMAFusionPass can then
    fuse into each partial sum without pipeline penalty. Target:
    matmul_dense 0.038s → ~0.025s (gap 1.19x — below LuaJIT becomes
    reachable with subsequent work).
  expected_gain_pct: [20, 40]
  expected_gain_mechanism: >
    Matmul inner k-loop body with Phi-skip disabled FMA:
      load_a + load_b + FMUL + FADD(phi_serial)
    Critical path per iter: FADD ~3 cycles. N=27M iters ≈ 81M cycles ≈ 23ms.
    With 2-way sum-split + FMA:
      load_a0 + load_b0 + load_a1 + load_b1 + FMA0(phi0) + FMA1(phi1)
    Two independent critical paths each FMA ~4 cycles, throughput
    1/cycle on M4's 2 FMA pipes. Theoretical: 27M/2 × 4 = 54M cycles = 15ms.
    Plus shared load latency folded in. Realistic target: 0.025-0.028s.
  counterfactual_check: >
    Source-level 2-way unroll regresses (R48 pre-flight, confirmed in
    R60 re-test: 0.068s vs baseline 0.038s). The regression comes
    from DOUBLING the getf call count + call-site setup. IR-level
    unroll-and-jam keeps the SAME number of matrix loads (just
    with different indices k and k+1), so per-getf setup doesn't
    scale up. The R48 cost model proves this: per-call MatrixLoadFAt
    cost dominates; IR unroll doesn't add calls.

class_gate:
  ledger_consulted: true
  prior_reject_rate: 0.0
  mitigation_required: false
  mitigation_description: null
  current_state_audit_performed: true
  current_state_audit_summary: >
    Read diag/matmul_dense/matmul.ir.txt. Inner body B3:
        v32 = MatrixLoadFAt(flat_a, stride_a, i_invariant, k)
        v37 = MatrixLoadFAt(flat_b, stride_b, k, j_invariant)
        v38 = MulFloat(v32, v37)
        v40 = AddFloat(v52, v38)
      with v52 = Phi[B9:v19, B3:v40] (the loop-carried sum accumulator).

    Read internal/methodjit/loops.go: loopInfo has headerBlocks,
    blockInnerHeader, loopPhis. Enough to identify the pattern.
    internal/methodjit/emit_compile.go uses loopInfo for emit.
    Pass loading is additive via pipeline.go.

    Verified: no existing unroll-and-jam pass (grep'd all pass_*.go files).
    FMAFusionPass (pass_fma_fusion.go:82) explicitly skips Phi
    accumulators — removing that skip alone regresses +13% (R60).
    Unroll-and-jam is the prerequisite architectural move.

# --- ADR outline ---
adr_summary:
  title: "UnrollAndJamPass — 2-way IR-level unroll for float reductions"
  pipeline_position: "after TypeSpecialize, before FMAFusionPass"

  detection_criteria:
    - Loop header H has exactly 1 Phi(TypeFloat) whose back-edge input
      is AddFloat(phi, X) where X is an SSA value defined in the loop body.
    - Loop has a single back-edge and a known scalar induction variable
      (Phi(int) with Add IV, step=const).
    - Loop trip count is a dynamic variable; support odd trip counts
      via a tail block.

  transform:
    - Clone the body block's instructions with fresh SSA IDs.
    - Replace the induction-variable SSA reference in the cloned body
      with iv + (step * 1) — i.e. the next iteration's IV.
    - Add a second Phi(TypeFloat) acc1 to the loop header (init 0,
      back-edge receives AddFloat(acc1, X_clone)).
    - Double the step in the back-edge IV update.
    - Add a tail block that handles the last iteration if trip count
      is odd (single non-unrolled body).
    - At loop exit: insert epilogue acc = acc0 + acc1 (combines partial sums).

  risks_and_mitigations:
    - "Cloning SSA values: must maintain SSA validity (no two definitions
       of same ID). Use a fresh-ID allocator threaded from Function.newValueID."
    - "IV bumping: source source-IR may have IV of form Phi(int) + Const(1).
       Unrolled IV needs +Const(2). Must detect+rewrite step."
    - "Even/odd trip counts: always insert a tail block for safety; skip
       the tail if loop bounds prove evenness at const time (defer)."
    - "Correctness tests: add TestUnrollAndJam_MatmulPattern + mechanical
       IR-shape tests verifying the post-pass IR contains 2 Phi(float)
       accumulators and 2 MulFloat+Add chains."
    - "Regression risk: this is a new pass on float reductions; benchmarks
       other than matmul with float reductions may also transform. Need
       full-suite bench post-integration."

  scope_bounds:
    in: 2-way unroll for float reductions. R61 = ADR only.
    out: 3/4/N-way unroll (future rounds if 2-way wins)
    out: integer reductions (deferred to IntDense forward class)
    out: non-reduction unroll (loops without accumulator)

