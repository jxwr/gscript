  sub_pattern_learned: >
    The R47 → R48 → R60 loop of "try to enable FMA on Phi" consistently
    regresses matmul due to pipeline serialization. The textbook fix
    is sum-splitting via unroll-and-jam, but at IR level not source
    level (since source level hits per-getf-call cost). Building
    UnrollAndJamPass unlocks both (a) Phi-FMA win via split Phis,
    (b) 2-way ILP throughput on M4's dual FMA pipes.

