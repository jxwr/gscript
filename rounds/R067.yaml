hypothesis:
  class: tier2-dense-matrix-kind
  claim: >
    computeLoopPhiArgs skips float values (line 65 `!hasReg || pr.IsFloat`).
    For float values defined in a Phi's direct predecessor block,
    phi-only-safety is trivially true — the FPR contents survive within
    that block. Extend by removing the float guard for this trivial case.
    Expected: float loop-phi args skip memory write-through, saving one
    FMOV+STR per back-edge.
  expected_gain_pct: [2, 8]
  expected_gain_mechanism: elide FMOVtoGP + STR for phi-only float args
  counterfactual_check: regalloc side effects on non-float benches

